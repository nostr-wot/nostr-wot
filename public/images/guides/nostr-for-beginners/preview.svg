<svg width="800" height="450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nfb-p-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#312e81;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4c1d95;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="nfb-p-glow" cx="50%" cy="43%" r="45%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:0" />
    </radialGradient>
    <filter id="nfb-p-key-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#a78bfa" flood-opacity="0.7"/>
    </filter>
    <filter id="nfb-p-node-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#4ade80" flood-opacity="0.5"/>
    </filter>
    <filter id="nfb-p-step-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#4ade80" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#nfb-p-bg)"/>
  <rect width="100%" height="100%" fill="url(#nfb-p-glow)"/>

  <!-- Trust rings -->
  <circle cx="400" cy="200" r="190" fill="none" stroke="rgba(167,139,250,0.06)" stroke-width="1" stroke-dasharray="4,8"/>
  <circle cx="400" cy="200" r="145" fill="none" stroke="rgba(167,139,250,0.10)" stroke-width="1" stroke-dasharray="4,8"/>
  <circle cx="400" cy="200" r="100" fill="none" stroke="rgba(167,139,250,0.14)" stroke-width="1" stroke-dasharray="4,8"/>

  <!-- Connection nodes -->
  <g filter="url(#nfb-p-node-glow)">
    <circle cx="210" cy="110" r="3" fill="rgba(74,222,128,0.7)"/>
    <circle cx="160" cy="240" r="2.5" fill="rgba(74,222,128,0.5)"/>
    <circle cx="240" cy="350" r="3" fill="rgba(74,222,128,0.6)"/>
    <circle cx="590" cy="120" r="3" fill="rgba(74,222,128,0.7)"/>
    <circle cx="640" cy="260" r="2.5" fill="rgba(74,222,128,0.5)"/>
    <circle cx="570" cy="360" r="3" fill="rgba(74,222,128,0.6)"/>
  </g>

  <!-- Connection lines -->
  <line x1="210" y1="110" x2="330" y2="155" stroke="rgba(74,222,128,0.2)" stroke-width="1"/>
  <line x1="160" y1="240" x2="290" y2="215" stroke="rgba(74,222,128,0.2)" stroke-width="1"/>
  <line x1="590" y1="120" x2="480" y2="155" stroke="rgba(74,222,128,0.2)" stroke-width="1"/>
  <line x1="640" y1="260" x2="510" y2="215" stroke="rgba(74,222,128,0.2)" stroke-width="1"/>

  <!-- Central key icon -->
  <g filter="url(#nfb-p-key-glow)">
    <circle cx="400" cy="165" r="28" fill="none" stroke="rgba(167,139,250,0.85)" stroke-width="2.5"/>
    <circle cx="400" cy="165" r="20" fill="none" stroke="rgba(167,139,250,0.4)" stroke-width="1.2"/>
    <circle cx="400" cy="165" r="10" fill="rgba(167,139,250,0.3)"/>
    <line x1="400" y1="193" x2="400" y2="265" stroke="rgba(167,139,250,0.85)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="400" y1="240" x2="416" y2="240" stroke="rgba(167,139,250,0.85)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="400" y1="253" x2="412" y2="253" stroke="rgba(167,139,250,0.85)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="400" y1="265" x2="414" y2="265" stroke="rgba(167,139,250,0.7)" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Glow ring around key -->
  <circle cx="400" cy="210" r="65" fill="none" stroke="rgba(74,222,128,0.25)" stroke-width="1.5" stroke-dasharray="5,4"/>
  <circle cx="400" cy="210" r="80" fill="none" stroke="rgba(74,222,128,0.12)" stroke-width="1" stroke-dasharray="3,5"/>

  <!-- Step indicators -->
  <g filter="url(#nfb-p-step-glow)">
    <circle cx="280" cy="135" r="14" fill="rgba(74,222,128,0.12)" stroke="rgba(74,222,128,0.6)" stroke-width="1.2"/>
    <text x="280" y="140" font-family="sans-serif" font-size="11" font-weight="bold" fill="rgba(74,222,128,0.8)" text-anchor="middle">1</text>
  </g>
  <g filter="url(#nfb-p-step-glow)">
    <circle cx="320" cy="300" r="14" fill="rgba(74,222,128,0.12)" stroke="rgba(74,222,128,0.6)" stroke-width="1.2"/>
    <text x="320" y="305" font-family="sans-serif" font-size="11" font-weight="bold" fill="rgba(74,222,128,0.8)" text-anchor="middle">2</text>
  </g>
  <g filter="url(#nfb-p-step-glow)">
    <circle cx="480" cy="300" r="14" fill="rgba(74,222,128,0.12)" stroke="rgba(74,222,128,0.6)" stroke-width="1.2"/>
    <text x="480" y="305" font-family="sans-serif" font-size="11" font-weight="bold" fill="rgba(74,222,128,0.8)" text-anchor="middle">3</text>
  </g>
  <g filter="url(#nfb-p-step-glow)">
    <circle cx="520" cy="135" r="14" fill="rgba(250,204,21,0.12)" stroke="rgba(250,204,21,0.6)" stroke-width="1.2"/>
    <text x="520" y="140" font-family="sans-serif" font-size="11" font-weight="bold" fill="rgba(250,204,21,0.8)" text-anchor="middle">4</text>
  </g>

  <!-- Path connecting steps -->
  <path d="M280,149 C270,230 300,290 320,286" fill="none" stroke="rgba(74,222,128,0.2)" stroke-width="1.2" stroke-dasharray="4,4"/>
  <path d="M334,300 L466,300" fill="none" stroke="rgba(74,222,128,0.2)" stroke-width="1.2" stroke-dasharray="4,4"/>
  <path d="M480,286 C500,290 530,230 520,149" fill="none" stroke="rgba(250,204,21,0.15)" stroke-width="1.2" stroke-dasharray="4,4"/>

  <!-- Sparkles -->
  <line x1="445" y1="145" x2="445" y2="133" stroke="rgba(74,222,128,0.7)" stroke-width="1.5"/>
  <line x1="439" y1="139" x2="451" y2="139" stroke="rgba(74,222,128,0.7)" stroke-width="1.5"/>
  <line x1="355" y1="150" x2="355" y2="140" stroke="rgba(250,204,21,0.6)" stroke-width="1.5"/>
  <line x1="350" y1="145" x2="360" y2="145" stroke="rgba(250,204,21,0.6)" stroke-width="1.5"/>
  <circle cx="370" cy="270" r="1.5" fill="rgba(74,222,128,0.6)"/>
  <circle cx="450" cy="180" r="1.5" fill="rgba(250,204,21,0.6)"/>

</svg>