<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nfb-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#312e81;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4c1d95;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="nfb-glow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:0" />
    </radialGradient>
    <filter id="nfb-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#a78bfa" flood-opacity="0.5"/>
    </filter>
    <filter id="nfb-key-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#a78bfa" flood-opacity="0.7"/>
    </filter>
    <filter id="nfb-node-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#4ade80" flood-opacity="0.5"/>
    </filter>
    <filter id="nfb-step-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#4ade80" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#nfb-bg)"/>
  <rect width="100%" height="100%" fill="url(#nfb-glow)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="white" stroke-width="0.5">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="200" y1="0" x2="1200" y2="500"/>
    <line x1="0" y1="200" x2="1000" y2="630"/>
    <line x1="400" y1="0" x2="1200" y2="400"/>
    <line x1="0" y1="400" x2="800" y2="630"/>
    <line x1="1200" y1="0" x2="0" y2="630"/>
    <line x1="1000" y1="0" x2="0" y2="500"/>
    <line x1="1200" y1="200" x2="200" y2="630"/>
  </g>

  <!-- Trust rings -->
  <circle cx="600" cy="280" r="270" fill="none" stroke="rgba(167,139,250,0.06)" stroke-width="1" stroke-dasharray="4,8"/>
  <circle cx="600" cy="280" r="210" fill="none" stroke="rgba(167,139,250,0.10)" stroke-width="1" stroke-dasharray="4,8"/>
  <circle cx="600" cy="280" r="150" fill="none" stroke="rgba(167,139,250,0.14)" stroke-width="1" stroke-dasharray="4,8"/>

  <!-- Connection nodes scattered -->
  <g filter="url(#nfb-node-glow)">
    <circle cx="340" cy="140" r="4" fill="rgba(74,222,128,0.7)"/>
    <circle cx="260" cy="310" r="3" fill="rgba(74,222,128,0.5)"/>
    <circle cx="370" cy="460" r="3.5" fill="rgba(74,222,128,0.6)"/>
    <circle cx="870" cy="160" r="4" fill="rgba(74,222,128,0.7)"/>
    <circle cx="940" cy="320" r="3" fill="rgba(74,222,128,0.5)"/>
    <circle cx="830" cy="460" r="3.5" fill="rgba(74,222,128,0.6)"/>
    <circle cx="450" cy="90" r="3" fill="rgba(250,204,21,0.6)"/>
    <circle cx="760" cy="80" r="3" fill="rgba(250,204,21,0.6)"/>
    <circle cx="470" cy="530" r="3" fill="rgba(250,204,21,0.5)"/>
    <circle cx="740" cy="540" r="3" fill="rgba(250,204,21,0.5)"/>
    <circle cx="180" cy="200" r="2.5" fill="rgba(248,113,113,0.5)"/>
    <circle cx="1020" cy="210" r="2.5" fill="rgba(248,113,113,0.5)"/>
  </g>

  <!-- Connection lines from nodes toward center -->
  <line x1="340" y1="140" x2="500" y2="220" stroke="rgba(74,222,128,0.25)" stroke-width="1"/>
  <line x1="260" y1="310" x2="440" y2="290" stroke="rgba(74,222,128,0.2)" stroke-width="1"/>
  <line x1="870" y1="160" x2="710" y2="220" stroke="rgba(74,222,128,0.25)" stroke-width="1"/>
  <line x1="940" y1="320" x2="760" y2="290" stroke="rgba(74,222,128,0.2)" stroke-width="1"/>
  <line x1="180" y1="200" x2="340" y2="140" stroke="rgba(248,113,113,0.15)" stroke-width="1"/>
  <line x1="1020" y1="210" x2="870" y2="160" stroke="rgba(248,113,113,0.15)" stroke-width="1"/>

  <!-- Central key icon -->
  <g filter="url(#nfb-key-glow)">
    <!-- Key head (circle) -->
    <circle cx="600" cy="240" r="38" fill="none" stroke="rgba(167,139,250,0.85)" stroke-width="3"/>
    <circle cx="600" cy="240" r="28" fill="none" stroke="rgba(167,139,250,0.4)" stroke-width="1.5"/>
    <circle cx="600" cy="240" r="14" fill="rgba(167,139,250,0.3)"/>
    <!-- Key shaft -->
    <line x1="600" y1="278" x2="600" y2="370" stroke="rgba(167,139,250,0.85)" stroke-width="3" stroke-linecap="round"/>
    <!-- Key teeth -->
    <line x1="600" y1="340" x2="620" y2="340" stroke="rgba(167,139,250,0.85)" stroke-width="3" stroke-linecap="round"/>
    <line x1="600" y1="358" x2="615" y2="358" stroke="rgba(167,139,250,0.85)" stroke-width="3" stroke-linecap="round"/>
    <line x1="600" y1="370" x2="618" y2="370" stroke="rgba(167,139,250,0.7)" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Glow ring around key -->
  <circle cx="600" cy="295" r="90" fill="none" stroke="rgba(74,222,128,0.25)" stroke-width="1.5" stroke-dasharray="6,4"/>
  <circle cx="600" cy="295" r="110" fill="none" stroke="rgba(74,222,128,0.12)" stroke-width="1" stroke-dasharray="3,6"/>

  <!-- Step indicators in arc around the key -->
  <!-- Step 1 -->
  <g filter="url(#nfb-step-glow)">
    <circle cx="420" cy="180" r="18" fill="rgba(74,222,128,0.12)" stroke="rgba(74,222,128,0.6)" stroke-width="1.5"/>
    <text x="420" y="186" font-family="sans-serif" font-size="14" font-weight="bold" fill="rgba(74,222,128,0.8)" text-anchor="middle">1</text>
  </g>
  <!-- Step 2 -->
  <g filter="url(#nfb-step-glow)">
    <circle cx="480" cy="420" r="18" fill="rgba(74,222,128,0.12)" stroke="rgba(74,222,128,0.6)" stroke-width="1.5"/>
    <text x="480" y="426" font-family="sans-serif" font-size="14" font-weight="bold" fill="rgba(74,222,128,0.8)" text-anchor="middle">2</text>
  </g>
  <!-- Step 3 -->
  <g filter="url(#nfb-step-glow)">
    <circle cx="720" cy="420" r="18" fill="rgba(74,222,128,0.12)" stroke="rgba(74,222,128,0.6)" stroke-width="1.5"/>
    <text x="720" y="426" font-family="sans-serif" font-size="14" font-weight="bold" fill="rgba(74,222,128,0.8)" text-anchor="middle">3</text>
  </g>
  <!-- Step 4 -->
  <g filter="url(#nfb-step-glow)">
    <circle cx="780" cy="180" r="18" fill="rgba(250,204,21,0.12)" stroke="rgba(250,204,21,0.6)" stroke-width="1.5"/>
    <text x="780" y="186" font-family="sans-serif" font-size="14" font-weight="bold" fill="rgba(250,204,21,0.8)" text-anchor="middle">4</text>
  </g>

  <!-- Path connecting steps (dashed arc) -->
  <path d="M420,198 C410,310 440,410 480,402" fill="none" stroke="rgba(74,222,128,0.2)" stroke-width="1.5" stroke-dasharray="5,4"/>
  <path d="M498,420 L702,420" fill="none" stroke="rgba(74,222,128,0.2)" stroke-width="1.5" stroke-dasharray="5,4"/>
  <path d="M720,402 C760,410 790,310 780,198" fill="none" stroke="rgba(250,204,21,0.15)" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- Sparkle effects -->
  <g opacity="0.8">
    <line x1="660" y1="205" x2="660" y2="190" stroke="rgba(74,222,128,0.7)" stroke-width="1.5"/>
    <line x1="652" y1="197" x2="668" y2="197" stroke="rgba(74,222,128,0.7)" stroke-width="1.5"/>
    <line x1="535" y1="215" x2="535" y2="203" stroke="rgba(250,204,21,0.6)" stroke-width="1.5"/>
    <line x1="529" y1="209" x2="541" y2="209" stroke="rgba(250,204,21,0.6)" stroke-width="1.5"/>
    <line x1="640" y1="375" x2="640" y2="388" stroke="rgba(167,139,250,0.7)" stroke-width="1.5"/>
    <line x1="633" y1="381" x2="647" y2="381" stroke="rgba(167,139,250,0.7)" stroke-width="1.5"/>
    <circle cx="555" cy="365" r="2" fill="rgba(74,222,128,0.6)"/>
    <circle cx="670" cy="260" r="2" fill="rgba(250,204,21,0.6)"/>
  </g>

</svg>