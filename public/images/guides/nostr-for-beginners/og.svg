<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nfb-og-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#312e81;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4c1d95;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="nfb-og-glow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:0" />
    </radialGradient>
    <filter id="nfb-og-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#a78bfa" flood-opacity="0.5"/>
    </filter>
    <filter id="nfb-og-key-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#a78bfa" flood-opacity="0.7"/>
    </filter>
    <filter id="nfb-og-node-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#4ade80" flood-opacity="0.5"/>
    </filter>
    <filter id="nfb-og-step-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#4ade80" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#nfb-og-bg)"/>
  <rect width="100%" height="100%" fill="url(#nfb-og-glow)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="white" stroke-width="0.5">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="200" y1="0" x2="1200" y2="500"/>
    <line x1="0" y1="200" x2="1000" y2="630"/>
    <line x1="400" y1="0" x2="1200" y2="400"/>
    <line x1="0" y1="400" x2="800" y2="630"/>
    <line x1="1200" y1="0" x2="0" y2="630"/>
    <line x1="1000" y1="0" x2="0" y2="500"/>
    <line x1="1200" y1="200" x2="200" y2="630"/>
  </g>

  <!-- Trust rings -->
  <circle cx="600" cy="280" r="270" fill="none" stroke="rgba(167,139,250,0.06)" stroke-width="1" stroke-dasharray="4,8"/>
  <circle cx="600" cy="280" r="210" fill="none" stroke="rgba(167,139,250,0.10)" stroke-width="1" stroke-dasharray="4,8"/>
  <circle cx="600" cy="280" r="150" fill="none" stroke="rgba(167,139,250,0.14)" stroke-width="1" stroke-dasharray="4,8"/>

  <!-- Connection nodes -->
  <g filter="url(#nfb-og-node-glow)">
    <circle cx="330" cy="150" r="4" fill="rgba(74,222,128,0.7)"/>
    <circle cx="250" cy="320" r="3" fill="rgba(74,222,128,0.5)"/>
    <circle cx="360" cy="470" r="3.5" fill="rgba(74,222,128,0.6)"/>
    <circle cx="880" cy="150" r="4" fill="rgba(74,222,128,0.7)"/>
    <circle cx="950" cy="330" r="3" fill="rgba(74,222,128,0.5)"/>
    <circle cx="840" cy="470" r="3.5" fill="rgba(74,222,128,0.6)"/>
    <circle cx="460" cy="80" r="3" fill="rgba(250,204,21,0.6)"/>
    <circle cx="750" cy="75" r="3" fill="rgba(250,204,21,0.6)"/>
    <circle cx="480" cy="540" r="3" fill="rgba(250,204,21,0.5)"/>
    <circle cx="730" cy="550" r="3" fill="rgba(250,204,21,0.5)"/>
    <circle cx="170" cy="190" r="2.5" fill="rgba(248,113,113,0.5)"/>
    <circle cx="1030" cy="200" r="2.5" fill="rgba(248,113,113,0.5)"/>
    <circle cx="190" cy="480" r="2.5" fill="rgba(248,113,113,0.4)"/>
    <circle cx="1010" cy="470" r="2.5" fill="rgba(248,113,113,0.4)"/>
  </g>

  <!-- Connection lines -->
  <line x1="330" y1="150" x2="490" y2="220" stroke="rgba(74,222,128,0.25)" stroke-width="1"/>
  <line x1="250" y1="320" x2="430" y2="290" stroke="rgba(74,222,128,0.2)" stroke-width="1"/>
  <line x1="880" y1="150" x2="720" y2="220" stroke="rgba(74,222,128,0.25)" stroke-width="1"/>
  <line x1="950" y1="330" x2="770" y2="290" stroke="rgba(74,222,128,0.2)" stroke-width="1"/>
  <line x1="170" y1="190" x2="330" y2="150" stroke="rgba(248,113,113,0.15)" stroke-width="1"/>
  <line x1="1030" y1="200" x2="880" y2="150" stroke="rgba(248,113,113,0.15)" stroke-width="1"/>

  <!-- Central key icon — slightly shifted for OG variant -->
  <g filter="url(#nfb-og-key-glow)">
    <circle cx="600" cy="230" r="40" fill="none" stroke="rgba(167,139,250,0.85)" stroke-width="3"/>
    <circle cx="600" cy="230" r="30" fill="none" stroke="rgba(167,139,250,0.4)" stroke-width="1.5"/>
    <circle cx="600" cy="230" r="15" fill="rgba(167,139,250,0.3)"/>
    <line x1="600" y1="270" x2="600" y2="375" stroke="rgba(167,139,250,0.85)" stroke-width="3" stroke-linecap="round"/>
    <line x1="600" y1="340" x2="622" y2="340" stroke="rgba(167,139,250,0.85)" stroke-width="3" stroke-linecap="round"/>
    <line x1="600" y1="355" x2="617" y2="355" stroke="rgba(167,139,250,0.85)" stroke-width="3" stroke-linecap="round"/>
    <line x1="600" y1="370" x2="620" y2="370" stroke="rgba(167,139,250,0.7)" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Glow ring around key -->
  <circle cx="600" cy="290" r="95" fill="none" stroke="rgba(74,222,128,0.25)" stroke-width="1.5" stroke-dasharray="6,4"/>
  <circle cx="600" cy="290" r="115" fill="none" stroke="rgba(74,222,128,0.12)" stroke-width="1" stroke-dasharray="3,6"/>

  <!-- Step indicators in arc -->
  <g filter="url(#nfb-og-step-glow)">
    <circle cx="410" cy="175" r="20" fill="rgba(74,222,128,0.12)" stroke="rgba(74,222,128,0.6)" stroke-width="1.5"/>
    <text x="410" y="181" font-family="sans-serif" font-size="15" font-weight="bold" fill="rgba(74,222,128,0.8)" text-anchor="middle">1</text>
  </g>
  <g filter="url(#nfb-og-step-glow)">
    <circle cx="470" cy="430" r="20" fill="rgba(74,222,128,0.12)" stroke="rgba(74,222,128,0.6)" stroke-width="1.5"/>
    <text x="470" y="436" font-family="sans-serif" font-size="15" font-weight="bold" fill="rgba(74,222,128,0.8)" text-anchor="middle">2</text>
  </g>
  <g filter="url(#nfb-og-step-glow)">
    <circle cx="730" cy="430" r="20" fill="rgba(74,222,128,0.12)" stroke="rgba(74,222,128,0.6)" stroke-width="1.5"/>
    <text x="730" y="436" font-family="sans-serif" font-size="15" font-weight="bold" fill="rgba(74,222,128,0.8)" text-anchor="middle">3</text>
  </g>
  <g filter="url(#nfb-og-step-glow)">
    <circle cx="790" cy="175" r="20" fill="rgba(250,204,21,0.12)" stroke="rgba(250,204,21,0.6)" stroke-width="1.5"/>
    <text x="790" y="181" font-family="sans-serif" font-size="15" font-weight="bold" fill="rgba(250,204,21,0.8)" text-anchor="middle">4</text>
  </g>

  <!-- Path connecting steps -->
  <path d="M410,195 C400,320 430,420 470,412" fill="none" stroke="rgba(74,222,128,0.2)" stroke-width="1.5" stroke-dasharray="5,4"/>
  <path d="M490,430 L710,430" fill="none" stroke="rgba(74,222,128,0.2)" stroke-width="1.5" stroke-dasharray="5,4"/>
  <path d="M730,412 C770,420 800,320 790,195" fill="none" stroke="rgba(250,204,21,0.15)" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- Sparkles -->
  <g opacity="0.8">
    <line x1="665" y1="200" x2="665" y2="185" stroke="rgba(74,222,128,0.7)" stroke-width="1.5"/>
    <line x1="657" y1="192" x2="673" y2="192" stroke="rgba(74,222,128,0.7)" stroke-width="1.5"/>
    <line x1="530" y1="210" x2="530" y2="198" stroke="rgba(250,204,21,0.6)" stroke-width="1.5"/>
    <line x1="524" y1="204" x2="536" y2="204" stroke="rgba(250,204,21,0.6)" stroke-width="1.5"/>
    <line x1="645" y1="380" x2="645" y2="393" stroke="rgba(167,139,250,0.7)" stroke-width="1.5"/>
    <line x1="638" y1="386" x2="652" y2="386" stroke="rgba(167,139,250,0.7)" stroke-width="1.5"/>
    <circle cx="550" cy="370" r="2" fill="rgba(74,222,128,0.6)"/>
    <circle cx="675" cy="255" r="2" fill="rgba(250,204,21,0.6)"/>
  </g>

</svg>