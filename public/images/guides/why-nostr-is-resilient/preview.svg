<svg width="800" height="450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wnr-p-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#312e81;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4c1d95;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="wnr-p-glow" cx="50%" cy="43%" r="45%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:0" />
    </radialGradient>
    <filter id="wnr-p-node-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#4ade80" flood-opacity="0.6"/>
    </filter>
    <filter id="wnr-p-dead-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#f87171" flood-opacity="0.4"/>
    </filter>
    <filter id="wnr-p-mesh-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#4ade80" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#wnr-p-bg)"/>
  <rect width="100%" height="100%" fill="url(#wnr-p-glow)"/>

  <!-- Trust rings -->
  <circle cx="400" cy="210" r="190" fill="none" stroke="rgba(167,139,250,0.05)" stroke-width="1" stroke-dasharray="4,8"/>
  <circle cx="400" cy="210" r="145" fill="none" stroke="rgba(167,139,250,0.08)" stroke-width="1" stroke-dasharray="4,8"/>
  <circle cx="400" cy="210" r="100" fill="none" stroke="rgba(167,139,250,0.12)" stroke-width="1" stroke-dasharray="4,8"/>

  <!-- Live nodes -->
  <g filter="url(#wnr-p-node-glow)">
    <circle cx="260" cy="95" r="6" fill="rgba(74,222,128,0.2)" stroke="rgba(74,222,128,0.7)" stroke-width="1.2"/>
    <circle cx="400" cy="75" r="6" fill="rgba(74,222,128,0.2)" stroke="rgba(74,222,128,0.7)" stroke-width="1.2"/>
    <circle cx="540" cy="95" r="6" fill="rgba(74,222,128,0.2)" stroke="rgba(74,222,128,0.7)" stroke-width="1.2"/>
    <circle cx="200" cy="190" r="6" fill="rgba(74,222,128,0.2)" stroke="rgba(74,222,128,0.7)" stroke-width="1.2"/>
    <circle cx="340" cy="175" r="6" fill="rgba(74,222,128,0.2)" stroke="rgba(74,222,128,0.7)" stroke-width="1.2"/>
    <circle cx="600" cy="190" r="6" fill="rgba(74,222,128,0.2)" stroke="rgba(74,222,128,0.7)" stroke-width="1.2"/>
    <circle cx="240" cy="300" r="6" fill="rgba(74,222,128,0.2)" stroke="rgba(74,222,128,0.7)" stroke-width="1.2"/>
    <circle cx="400" cy="310" r="6" fill="rgba(74,222,128,0.2)" stroke="rgba(74,222,128,0.7)" stroke-width="1.2"/>
    <circle cx="560" cy="300" r="6" fill="rgba(74,222,128,0.2)" stroke="rgba(74,222,128,0.7)" stroke-width="1.2"/>
    <circle cx="320" cy="390" r="6" fill="rgba(74,222,128,0.2)" stroke="rgba(74,222,128,0.7)" stroke-width="1.2"/>
    <circle cx="480" cy="390" r="6" fill="rgba(74,222,128,0.2)" stroke="rgba(74,222,128,0.7)" stroke-width="1.2"/>
  </g>

  <!-- Dead nodes -->
  <g filter="url(#wnr-p-dead-glow)">
    <circle cx="470" cy="175" r="6" fill="rgba(248,113,113,0.1)" stroke="rgba(248,113,113,0.4)" stroke-width="1.2" stroke-dasharray="3,2"/>
    <line x1="465" y1="170" x2="475" y2="180" stroke="rgba(248,113,113,0.6)" stroke-width="1.2"/>
    <line x1="475" y1="170" x2="465" y2="180" stroke="rgba(248,113,113,0.6)" stroke-width="1.2"/>
    <circle cx="350" cy="265" r="6" fill="rgba(248,113,113,0.1)" stroke="rgba(248,113,113,0.4)" stroke-width="1.2" stroke-dasharray="3,2"/>
    <line x1="345" y1="260" x2="355" y2="270" stroke="rgba(248,113,113,0.6)" stroke-width="1.2"/>
    <line x1="355" y1="260" x2="345" y2="270" stroke="rgba(248,113,113,0.6)" stroke-width="1.2"/>
  </g>

  <!-- Mesh connections -->
  <g filter="url(#wnr-p-mesh-glow)">
    <line x1="260" y1="95" x2="400" y2="75" stroke="rgba(74,222,128,0.25)" stroke-width="0.8"/>
    <line x1="400" y1="75" x2="540" y2="95" stroke="rgba(74,222,128,0.25)" stroke-width="0.8"/>
    <line x1="260" y1="95" x2="200" y2="190" stroke="rgba(74,222,128,0.2)" stroke-width="0.8"/>
    <line x1="260" y1="95" x2="340" y2="175" stroke="rgba(74,222,128,0.2)" stroke-width="0.8"/>
    <line x1="400" y1="75" x2="340" y2="175" stroke="rgba(74,222,128,0.2)" stroke-width="0.8"/>
    <line x1="540" y1="95" x2="600" y2="190" stroke="rgba(74,222,128,0.2)" stroke-width="0.8"/>
    <line x1="200" y1="190" x2="340" y2="175" stroke="rgba(74,222,128,0.18)" stroke-width="0.8"/>
    <line x1="340" y1="175" x2="600" y2="190" stroke="rgba(74,222,128,0.1)" stroke-width="0.8" stroke-dasharray="3,3"/>
    <line x1="200" y1="190" x2="240" y2="300" stroke="rgba(74,222,128,0.2)" stroke-width="0.8"/>
    <line x1="340" y1="175" x2="400" y2="310" stroke="rgba(74,222,128,0.2)" stroke-width="0.8"/>
    <line x1="600" y1="190" x2="560" y2="300" stroke="rgba(74,222,128,0.2)" stroke-width="0.8"/>
    <line x1="240" y1="300" x2="400" y2="310" stroke="rgba(74,222,128,0.22)" stroke-width="0.8"/>
    <line x1="400" y1="310" x2="560" y2="300" stroke="rgba(74,222,128,0.22)" stroke-width="0.8"/>
    <line x1="240" y1="300" x2="320" y2="390" stroke="rgba(74,222,128,0.2)" stroke-width="0.8"/>
    <line x1="400" y1="310" x2="320" y2="390" stroke="rgba(74,222,128,0.18)" stroke-width="0.8"/>
    <line x1="400" y1="310" x2="480" y2="390" stroke="rgba(74,222,128,0.18)" stroke-width="0.8"/>
    <line x1="560" y1="300" x2="480" y2="390" stroke="rgba(74,222,128,0.2)" stroke-width="0.8"/>
    <line x1="320" y1="390" x2="480" y2="390" stroke="rgba(74,222,128,0.22)" stroke-width="0.8"/>
  </g>

  <!-- Broken connections to dead nodes -->
  <line x1="340" y1="175" x2="470" y2="175" stroke="rgba(248,113,113,0.12)" stroke-width="0.8" stroke-dasharray="2,3"/>
  <line x1="540" y1="95" x2="470" y2="175" stroke="rgba(248,113,113,0.12)" stroke-width="0.8" stroke-dasharray="2,3"/>
  <line x1="240" y1="300" x2="350" y2="265" stroke="rgba(248,113,113,0.12)" stroke-width="0.8" stroke-dasharray="2,3"/>
  <line x1="400" y1="310" x2="350" y2="265" stroke="rgba(248,113,113,0.12)" stroke-width="0.8" stroke-dasharray="2,3"/>

  <!-- Sparkles -->
  <line x1="435" y1="60" x2="435" y2="48" stroke="rgba(74,222,128,0.7)" stroke-width="1.5"/>
  <line x1="429" y1="54" x2="441" y2="54" stroke="rgba(74,222,128,0.7)" stroke-width="1.5"/>
  <line x1="165" y1="175" x2="165" y2="165" stroke="rgba(250,204,21,0.6)" stroke-width="1.5"/>
  <line x1="160" y1="170" x2="170" y2="170" stroke="rgba(250,204,21,0.6)" stroke-width="1.5"/>
  <circle cx="630" cy="175" r="1.5" fill="rgba(74,222,128,0.6)"/>
  <circle cx="140" cy="310" r="1.5" fill="rgba(250,204,21,0.6)"/>

</svg>