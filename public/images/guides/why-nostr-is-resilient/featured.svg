    <line x1="0" y1="630" x2="1200" y2="0"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
  </g>

  <!-- ─── LEFT SIDE: Centralized / Collapsed ─── -->

  <!-- LEFT label -->
  <text x="300" y="68" font-family="'Inter', sans-serif" font-size="13" font-weight="600" fill="rgba(248,113,113,0.7)" text-anchor="middle" letter-spacing="3">CENTRALIZED</text>

  <!-- Central cloud server (the single point of failure) -->
  <g filter="url(#wnr-dead-glow)" opacity="0.85">
    <!-- Cloud shape -->
    <path d="M230,200 Q210,180 220,160 Q230,138 255,140 Q260,122 280,118 Q300,114 315,128 Q330,115 350,118 Q375,120 378,145 Q398,148 400,170 Q402,192 382,200 Z"
