<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wnr-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#312e81;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4c1d95;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="wnr-glow-left" cx="28%" cy="50%" r="35%">
      <stop offset="0%" style="stop-color:#f87171;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="wnr-glow-right" cx="72%" cy="50%" r="35%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:0.14" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:0" />
    </radialGradient>
    <filter id="wnr-dead-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#f87171" flood-opacity="0.5"/>
    </filter>
    <filter id="wnr-live-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#4ade80" flood-opacity="0.6"/>
    </filter>
    <filter id="wnr-node-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#4ade80" flood-opacity="0.5"/>
    </filter>
    <filter id="wnr-center-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#a78bfa" flood-opacity="0.6"/>
    </filter>
    <filter id="wnr-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#wnr-bg)"/>
  <rect width="1200" height="630" fill="url(#wnr-glow-left)"/>
  <rect width="1200" height="630" fill="url(#wnr-glow-right)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="white" stroke-width="0.5">
