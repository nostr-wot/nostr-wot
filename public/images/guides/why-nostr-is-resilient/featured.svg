  <line x1="300" y1="202" x2="300" y2="290" stroke="rgba(248,113,113,0.25)" stroke-width="1" stroke-dasharray="3,4"/>
  <line x1="335" y1="200" x2="415" y2="290" stroke="rgba(248,113,113,0.25)" stroke-width="1" stroke-dasharray="3,4"/>

