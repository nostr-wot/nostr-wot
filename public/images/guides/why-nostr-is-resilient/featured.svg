    <circle cx="780" cy="410" r="20" fill="rgba(30,27,75,0.9)" stroke="rgba(74,222,128,0.7)" stroke-width="1.5"/>
    <rect x="771" y="401" width="18" height="12" rx="2" fill="rgba(74,222,128,0.25)" stroke="rgba(74,222,128,0.4)" stroke-width="0.8"/>
