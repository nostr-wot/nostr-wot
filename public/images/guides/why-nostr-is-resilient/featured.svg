    <text x="185" y="318" font-family="'Inter', sans-serif" font-size="22" font-weight="800" fill="rgba(248,113,113,0.5)" text-anchor="middle">𝕏</text>
    <text x="185" y="340" font-family="'Inter', sans-serif" font-size="9" fill="rgba(248,113,113,0.4)" text-anchor="middle">OFFLINE</text>
