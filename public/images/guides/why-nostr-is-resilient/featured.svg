    <rect x="245" y="290" width="110" height="72" rx="8" fill="rgba(20,15,50,0.8)" stroke="rgba(248,113,113,0.35)" stroke-width="1"/>
    <text x="300" y="318" font-family="'Inter', sans-serif" font-size="14" font-weight="800" fill="rgba(248,113,113,0.45)" text-anchor="middle">in</text>
    <text x="300" y="340" font-family="'Inter', sans-serif" font-size="9" fill="rgba(248,113,113,0.4)" text-anchor="middle">OFFLINE</text>
