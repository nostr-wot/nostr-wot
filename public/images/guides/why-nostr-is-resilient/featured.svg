    <!-- Server rack lines inside cloud -->
    <rect x="270" y="155" width="90" height="8" rx="2" fill="rgba(248,113,113,0.25)" stroke="rgba(248,113,113,0.3)" stroke-width="0.5"/>
    <rect x="270" y="167" width="90" height="8" rx="2" fill="rgba(248,113,113,0.2)" stroke="rgba(248,113,113,0.3)" stroke-width="0.5"/>
    <rect x="270" y="179" width="90" height="8" rx="2" fill="rgba(248,113,113,0.15)" stroke="rgba(248,113,113,0.3)" stroke-width="0.5"/>
    <!-- Small dots on server racks (status lights - all red) -->
    <circle cx="278" cy="159" r="2" fill="rgba(248,113,113,0.8)"/>
    <circle cx="278" cy="171" r="2" fill="rgba(248,113,113,0.6)"/>
    <circle cx="278" cy="183" r="2" fill="rgba(248,113,113,0.4)"/>
  </g>

