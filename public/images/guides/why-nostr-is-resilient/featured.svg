  <text x="600" y="562" font-family="'Inter', sans-serif" font-size="11" fill="rgba(167,139,250,0.35)" text-anchor="middle" letter-spacing="2">AWS · AZURE · CLOUDFLARE  —  2025 OUTAGES</text>

