<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wnr-og-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#312e81;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4c1d95;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="wnr-og-glow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:0" />
    </radialGradient>
    <filter id="wnr-og-node-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#4ade80" flood-opacity="0.6"/>
    </filter>
    <filter id="wnr-og-dead-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#f87171" flood-opacity="0.4"/>
    </filter>
    <filter id="wnr-og-mesh-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#4ade80" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#wnr-og-bg)"/>
  <rect width="100%" height="100%" fill="url(#wnr-og-glow)"/>

  <!-- Subtle grid -->
  <g opacity="0.05" stroke="white" stroke-width="0.5">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="200" y1="0" x2="1200" y2="500"/>
    <line x1="0" y1="200" x2="1000" y2="630"/>
    <line x1="400" y1="0" x2="1200" y2="400"/>
    <line x1="0" y1="400" x2="800" y2="630"/>
    <line x1="1200" y1="0" x2="0" y2="630"/>
    <line x1="1000" y1="0" x2="0" y2="500"/>
    <line x1="1200" y1="200" x2="200" y2="630"/>
  </g>

  <!-- Trust rings -->
  <circle cx="600" cy="300" r="280" fill="none" stroke="rgba(167,139,250,0.05)" stroke-width="1" stroke-dasharray="4,8"/>
  <circle cx="600" cy="300" r="220" fill="none" stroke="rgba(167,139,250,0.08)" stroke-width="1" stroke-dasharray="4,8"/>
  <circle cx="600" cy="300" r="160" fill="none" stroke="rgba(167,139,250,0.12)" stroke-width="1" stroke-dasharray="4,8"/>

  <!-- Live nodes — slightly different positions from featured for OG variant -->
  <g filter="url(#wnr-og-node-glow)">
    <circle cx="390" cy="130" r="8" fill="rgba(74,222,128,0.2)" stroke="rgba(74,222,128,0.7)" stroke-width="1.5"/>
    <circle cx="600" cy="100" r="8" fill="rgba(74,222,128,0.2)" stroke="rgba(74,222,128,0.7)" stroke-width="1.5"/>
    <circle cx="810" cy="130" r="8" fill="rgba(74,222,128,0.2)" stroke="rgba(74,222,128,0.7)" stroke-width="1.5"/>
    <circle cx="290" cy="255" r="8" fill="rgba(74,222,128,0.2)" stroke="rgba(74,222,128,0.7)" stroke-width="1.5"/>
    <circle cx="490" cy="235" r="8" fill="rgba(74,222,128,0.2)" stroke="rgba(74,222,128,0.7)" stroke-width="1.5"/>
    <circle cx="910" cy="255" r="8" fill="rgba(74,222,128,0.2)" stroke="rgba(74,222,128,0.7)" stroke-width="1.5"/>
    <circle cx="340" cy="410" r="8" fill="rgba(74,222,128,0.2)" stroke="rgba(74,222,128,0.7)" stroke-width="1.5"/>
    <circle cx="600" cy="430" r="8" fill="rgba(74,222,128,0.2)" stroke="rgba(74,222,128,0.7)" stroke-width="1.5"/>
    <circle cx="860" cy="410" r="8" fill="rgba(74,222,128,0.2)" stroke="rgba(74,222,128,0.7)" stroke-width="1.5"/>
    <circle cx="440" cy="535" r="8" fill="rgba(74,222,128,0.2)" stroke="rgba(74,222,128,0.7)" stroke-width="1.5"/>
    <circle cx="760" cy="535" r="8" fill="rgba(74,222,128,0.2)" stroke="rgba(74,222,128,0.7)" stroke-width="1.5"/>
  </g>

  <!-- Dead nodes -->
  <g filter="url(#wnr-og-dead-glow)">
    <circle cx="710" cy="255" r="8" fill="rgba(248,113,113,0.1)" stroke="rgba(248,113,113,0.4)" stroke-width="1.5" stroke-dasharray="3,2"/>
    <line x1="704" y1="249" x2="716" y2="261" stroke="rgba(248,113,113,0.6)" stroke-width="1.5"/>
    <line x1="716" y1="249" x2="704" y2="261" stroke="rgba(248,113,113,0.6)" stroke-width="1.5"/>
    <circle cx="490" cy="375" r="8" fill="rgba(248,113,113,0.1)" stroke="rgba(248,113,113,0.4)" stroke-width="1.5" stroke-dasharray="3,2"/>
    <line x1="484" y1="369" x2="496" y2="381" stroke="rgba(248,113,113,0.6)" stroke-width="1.5"/>
    <line x1="496" y1="369" x2="484" y2="381" stroke="rgba(248,113,113,0.6)" stroke-width="1.5"/>
    <!-- Third dead node for more drama in OG -->
    <circle cx="750" cy="340" r="8" fill="rgba(248,113,113,0.1)" stroke="rgba(248,113,113,0.4)" stroke-width="1.5" stroke-dasharray="3,2"/>
    <line x1="744" y1="334" x2="756" y2="346" stroke="rgba(248,113,113,0.6)" stroke-width="1.5"/>
    <line x1="756" y1="334" x2="744" y2="346" stroke="rgba(248,113,113,0.6)" stroke-width="1.5"/>
  </g>

  <!-- Mesh connections between live nodes -->
  <g filter="url(#wnr-og-mesh-glow)">
    <line x1="390" y1="130" x2="600" y2="100" stroke="rgba(74,222,128,0.25)" stroke-width="1"/>
    <line x1="600" y1="100" x2="810" y2="130" stroke="rgba(74,222,128,0.25)" stroke-width="1"/>
    <line x1="390" y1="130" x2="290" y2="255" stroke="rgba(74,222,128,0.2)" stroke-width="1"/>
    <line x1="390" y1="130" x2="490" y2="235" stroke="rgba(74,222,128,0.2)" stroke-width="1"/>
    <line x1="600" y1="100" x2="490" y2="235" stroke="rgba(74,222,128,0.2)" stroke-width="1"/>
    <line x1="810" y1="130" x2="910" y2="255" stroke="rgba(74,222,128,0.2)" stroke-width="1"/>
    <line x1="290" y1="255" x2="490" y2="235" stroke="rgba(74,222,128,0.18)" stroke-width="1"/>
    <line x1="490" y1="235" x2="910" y2="255" stroke="rgba(74,222,128,0.1)" stroke-width="1" stroke-dasharray="4,4"/>
    <line x1="290" y1="255" x2="340" y2="410" stroke="rgba(74,222,128,0.2)" stroke-width="1"/>
    <line x1="490" y1="235" x2="340" y2="410" stroke="rgba(74,222,128,0.18)" stroke-width="1"/>
    <line x1="490" y1="235" x2="600" y2="430" stroke="rgba(74,222,128,0.2)" stroke-width="1"/>
    <line x1="910" y1="255" x2="860" y2="410" stroke="rgba(74,222,128,0.2)" stroke-width="1"/>
    <line x1="910" y1="255" x2="600" y2="430" stroke="rgba(74,222,128,0.1)" stroke-width="1" stroke-dasharray="4,4"/>
    <line x1="340" y1="410" x2="600" y2="430" stroke="rgba(74,222,128,0.22)" stroke-width="1"/>
    <line x1="600" y1="430" x2="860" y2="410" stroke="rgba(74,222,128,0.22)" stroke-width="1"/>
    <line x1="340" y1="410" x2="440" y2="535" stroke="rgba(74,222,128,0.2)" stroke-width="1"/>
    <line x1="600" y1="430" x2="440" y2="535" stroke="rgba(74,222,128,0.18)" stroke-width="1"/>
    <line x1="600" y1="430" x2="760" y2="535" stroke="rgba(74,222,128,0.18)" stroke-width="1"/>
    <line x1="860" y1="410" x2="760" y2="535" stroke="rgba(74,222,128,0.2)" stroke-width="1"/>
    <line x1="440" y1="535" x2="760" y2="535" stroke="rgba(74,222,128,0.22)" stroke-width="1"/>
  </g>

  <!-- Broken connections to dead nodes -->
  <line x1="490" y1="235" x2="710" y2="255" stroke="rgba(248,113,113,0.12)" stroke-width="1" stroke-dasharray="2,4"/>
  <line x1="810" y1="130" x2="710" y2="255" stroke="rgba(248,113,113,0.12)" stroke-width="1" stroke-dasharray="2,4"/>
  <line x1="910" y1="255" x2="710" y2="255" stroke="rgba(248,113,113,0.12)" stroke-width="1" stroke-dasharray="2,4"/>
  <line x1="340" y1="410" x2="490" y2="375" stroke="rgba(248,113,113,0.12)" stroke-width="1" stroke-dasharray="2,4"/>
  <line x1="600" y1="430" x2="490" y2="375" stroke="rgba(248,113,113,0.12)" stroke-width="1" stroke-dasharray="2,4"/>
  <line x1="910" y1="255" x2="750" y2="340" stroke="rgba(248,113,113,0.12)" stroke-width="1" stroke-dasharray="2,4"/>
  <line x1="860" y1="410" x2="750" y2="340" stroke="rgba(248,113,113,0.12)" stroke-width="1" stroke-dasharray="2,4"/>

  <!-- Bypass routes around dead nodes -->
  <path d="M490,235 C620,225 890,235 910,255" fill="none" stroke="rgba(74,222,128,0.3)" stroke-width="1.5" stroke-dasharray="6,3"/>
  <path d="M340,410 C410,370 560,390 600,430" fill="none" stroke="rgba(74,222,128,0.3)" stroke-width="1.5" stroke-dasharray="6,3"/>
  <path d="M910,255 C900,330 870,390 860,410" fill="none" stroke="rgba(74,222,128,0.3)" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- Outer scattered nodes -->
  <g filter="url(#wnr-og-node-glow)">
    <circle cx="160" cy="140" r="3" fill="rgba(250,204,21,0.6)"/>
    <circle cx="1050" cy="150" r="3" fill="rgba(250,204,21,0.6)"/>
    <circle cx="140" cy="460" r="3" fill="rgba(250,204,21,0.5)"/>
    <circle cx="1070" cy="450" r="3" fill="rgba(250,204,21,0.5)"/>
    <circle cx="600" cy="575" r="3" fill="rgba(250,204,21,0.5)"/>
  </g>
  <line x1="160" y1="140" x2="290" y2="255" stroke="rgba(250,204,21,0.12)" stroke-width="1"/>
  <line x1="1050" y1="150" x2="910" y2="255" stroke="rgba(250,204,21,0.12)" stroke-width="1"/>
  <line x1="140" y1="460" x2="340" y2="410" stroke="rgba(250,204,21,0.1)" stroke-width="1"/>
  <line x1="1070" y1="450" x2="860" y2="410" stroke="rgba(250,204,21,0.1)" stroke-width="1"/>

  <!-- Sparkles -->
  <g opacity="0.8">
    <line x1="650" y1="85" x2="650" y2="70" stroke="rgba(74,222,128,0.7)" stroke-width="1.5"/>
    <line x1="642" y1="77" x2="658" y2="77" stroke="rgba(74,222,128,0.7)" stroke-width="1.5"/>
    <line x1="250" y1="230" x2="250" y2="218" stroke="rgba(250,204,21,0.6)" stroke-width="1.5"/>
    <line x1="244" y1="224" x2="256" y2="224" stroke="rgba(250,204,21,0.6)" stroke-width="1.5"/>
    <line x1="950" y1="275" x2="950" y2="288" stroke="rgba(167,139,250,0.7)" stroke-width="1.5"/>
    <line x1="943" y1="281" x2="957" y2="281" stroke="rgba(167,139,250,0.7)" stroke-width="1.5"/>
    <circle cx="190" cy="360" r="2" fill="rgba(74,222,128,0.6)"/>
    <circle cx="1010" cy="350" r="2" fill="rgba(250,204,21,0.6)"/>
  </g>

</svg>