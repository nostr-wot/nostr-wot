<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#312e81;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4c1d95;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:0" />
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#a78bfa" flood-opacity="0.5"/>
    </filter>
    <filter id="shield-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#a78bfa" flood-opacity="0.65"/>
    </filter>
    <filter id="green-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#4ade80" flood-opacity="0.5"/>
    </filter>
    <filter id="red-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#f87171" flood-opacity="0.5"/>
    </filter>
    <filter id="bubble-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#a78bfa" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#glow)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="white" stroke-width="0.5">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="200" y1="0" x2="1200" y2="500"/>
    <line x1="0" y1="200" x2="1000" y2="630"/>
    <line x1="400" y1="0" x2="1200" y2="400"/>
    <line x1="0" y1="400" x2="800" y2="630"/>
    <line x1="1200" y1="0" x2="0" y2="630"/>
    <line x1="1000" y1="0" x2="0" y2="500"/>
    <line x1="1200" y1="200" x2="200" y2="630"/>
  </g>

  <!-- Trust rings -->
  <circle cx="600" cy="285" r="280" fill="none" stroke="rgba(167,139,250,0.06)" stroke-width="1" stroke-dasharray="4,8"/>
  <circle cx="600" cy="285" r="210" fill="none" stroke="rgba(167,139,250,0.10)" stroke-width="1" stroke-dasharray="4,8"/>
  <circle cx="600" cy="285" r="140" fill="none" stroke="rgba(167,139,250,0.14)" stroke-width="1" stroke-dasharray="4,8"/>

  <!-- Browser tabs -->
  <g opacity="0.4">
    <rect x="105" y="90" width="210" height="14" rx="3" ry="3" fill="rgba(167,139,250,0.15)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
    <rect x="105" y="104" width="210" height="125" rx="0" ry="0" fill="rgba(167,139,250,0.04)" stroke="rgba(167,139,250,0.2)" stroke-width="1"/>
    <rect x="110" y="92" width="52" height="10" rx="2" ry="2" fill="rgba(167,139,250,0.2)"/>
    <rect x="115" y="112" width="190" height="12" rx="3" ry="3" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.15)" stroke-width="0.5"/>
  </g>
  <line x1="315" y1="165" x2="525" y2="260" stroke="rgba(167,139,250,0.2)" stroke-width="1" stroke-dasharray="4,6"/>

  <g opacity="0.4">
    <rect x="885" y="75" width="210" height="14" rx="3" ry="3" fill="rgba(167,139,250,0.15)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
    <rect x="885" y="89" width="210" height="125" rx="0" ry="0" fill="rgba(167,139,250,0.04)" stroke="rgba(167,139,250,0.2)" stroke-width="1"/>
    <rect x="890" y="77" width="52" height="10" rx="2" ry="2" fill="rgba(167,139,250,0.2)"/>
    <rect x="895" y="97" width="190" height="12" rx="3" ry="3" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.15)" stroke-width="0.5"/>
  </g>
  <line x1="885" y1="150" x2="675" y2="255" stroke="rgba(167,139,250,0.2)" stroke-width="1" stroke-dasharray="4,6"/>

  <g opacity="0.35">
    <rect x="90" y="395" width="195" height="14" rx="3" ry="3" fill="rgba(167,139,250,0.15)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
    <rect x="90" y="409" width="195" height="115" rx="0" ry="0" fill="rgba(167,139,250,0.04)" stroke="rgba(167,139,250,0.2)" stroke-width="1"/>
    <rect x="95" y="397" width="48" height="10" rx="2" ry="2" fill="rgba(167,139,250,0.2)"/>
    <rect x="100" y="417" width="175" height="12" rx="3" ry="3" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.15)" stroke-width="0.5"/>
  </g>
  <line x1="285" y1="445" x2="530" y2="340" stroke="rgba(167,139,250,0.2)" stroke-width="1" stroke-dasharray="4,6"/>

  <g opacity="0.35">
    <rect x="915" y="410" width="195" height="14" rx="3" ry="3" fill="rgba(167,139,250,0.15)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
    <rect x="915" y="424" width="195" height="115" rx="0" ry="0" fill="rgba(167,139,250,0.04)" stroke="rgba(167,139,250,0.2)" stroke-width="1"/>
    <rect x="920" y="412" width="48" height="10" rx="2" ry="2" fill="rgba(167,139,250,0.2)"/>
    <rect x="925" y="432" width="175" height="12" rx="3" ry="3" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.15)" stroke-width="0.5"/>
  </g>
  <line x1="915" y1="460" x2="675" y2="345" stroke="rgba(167,139,250,0.2)" stroke-width="1" stroke-dasharray="4,6"/>

  <!-- Domain bubbles - allowed (green) -->
  <g filter="url(#bubble-glow)">
    <rect x="330" y="125" width="145" height="34" rx="17" ry="17" fill="rgba(74,222,128,0.08)" stroke="rgba(74,222,128,0.4)" stroke-width="1.2"/>
    <text x="378" y="147" fill="rgba(74,222,128,0.7)" font-family="monospace" font-size="12">relay.damus</text>
    <g filter="url(#green-glow)">
      <polyline points="339,137 343,143 350,134" fill="none" stroke="rgba(74,222,128,0.9)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <rect x="300" y="330" width="135" height="34" rx="17" ry="17" fill="rgba(74,222,128,0.08)" stroke="rgba(74,222,128,0.4)" stroke-width="1.2"/>
    <text x="348" y="352" fill="rgba(74,222,128,0.7)" font-family="monospace" font-size="12">primal.net</text>
    <g filter="url(#green-glow)">
      <polyline points="309,342 313,348 320,339" fill="none" stroke="rgba(74,222,128,0.9)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <rect x="725" y="135" width="155" height="34" rx="17" ry="17" fill="rgba(74,222,128,0.08)" stroke="rgba(74,222,128,0.4)" stroke-width="1.2"/>
    <text x="773" y="157" fill="rgba(74,222,128,0.7)" font-family="monospace" font-size="12">snort.social</text>
    <g filter="url(#green-glow)">
      <polyline points="734,147 738,153 745,144" fill="none" stroke="rgba(74,222,128,0.9)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Domain bubbles - denied (red) -->
  <g filter="url(#bubble-glow)">
    <rect x="750" y="340" width="155" height="34" rx="17" ry="17" fill="rgba(248,113,113,0.08)" stroke="rgba(248,113,113,0.4)" stroke-width="1.2"/>
    <text x="798" y="362" fill="rgba(248,113,113,0.7)" font-family="monospace" font-size="12">evil-site.co</text>
    <g filter="url(#red-glow)">
      <line x1="762" y1="352" x2="770" y2="360" stroke="rgba(248,113,113,0.9)" stroke-width="2" stroke-linecap="round"/>
      <line x1="770" y1="352" x2="762" y2="360" stroke="rgba(248,113,113,0.9)" stroke-width="2" stroke-linecap="round"/>
    </g>

    <rect x="440" y="470" width="140" height="34" rx="17" ry="17" fill="rgba(248,113,113,0.08)" stroke="rgba(248,113,113,0.4)" stroke-width="1.2"/>
    <text x="483" y="492" fill="rgba(248,113,113,0.7)" font-family="monospace" font-size="12">spam.xyz</text>
    <g filter="url(#red-glow)">
      <line x1="452" y1="482" x2="460" y2="490" stroke="rgba(248,113,113,0.9)" stroke-width="2" stroke-linecap="round"/>
      <line x1="460" y1="482" x2="452" y2="490" stroke="rgba(248,113,113,0.9)" stroke-width="2" stroke-linecap="round"/>
    </g>

    <rect x="630" y="480" width="165" height="34" rx="17" ry="17" fill="rgba(248,113,113,0.08)" stroke="rgba(248,113,113,0.4)" stroke-width="1.2"/>
    <text x="678" y="502" fill="rgba(248,113,113,0.7)" font-family="monospace" font-size="12">phishing.net</text>
    <g filter="url(#red-glow)">
      <line x1="642" y1="492" x2="650" y2="500" stroke="rgba(248,113,113,0.9)" stroke-width="2" stroke-linecap="round"/>
      <line x1="650" y1="492" x2="642" y2="500" stroke="rgba(248,113,113,0.9)" stroke-width="2" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Center: Shield with Lock -->
  <circle cx="600" cy="285" r="105" fill="rgba(167,139,250,0.06)"/>
  <circle cx="600" cy="285" r="80" fill="rgba(167,139,250,0.08)"/>
  <circle cx="600" cy="285" r="55" fill="rgba(139,92,246,0.1)"/>

  <g filter="url(#shield-glow)">
    <path d="M 600 210 L 665 238 L 665 300 C 665 342 638 368 600 382 C 562 368 535 342 535 300 L 535 238 Z" fill="rgba(167,139,250,0.12)" stroke="rgba(167,139,250,0.7)" stroke-width="2.5"/>
  </g>

  <!-- Lock body -->
  <rect x="578" y="280" width="44" height="34" rx="5" ry="5" fill="rgba(167,139,250,0.25)" stroke="rgba(167,139,250,0.6)" stroke-width="1.5"/>
  <!-- Lock shackle -->
  <path d="M 587 280 L 587 264 C 587 251 593 244 600 244 C 607 244 613 251 613 264 L 613 280" fill="none" stroke="rgba(167,139,250,0.7)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Keyhole -->
  <circle cx="600" cy="294" r="5.5" fill="rgba(167,139,250,0.5)"/>
  <rect x="598" y="294" width="4" height="9" rx="1" ry="1" fill="rgba(167,139,250,0.5)"/>

  <!-- Shield glow ring -->
  <circle cx="600" cy="285" r="115" fill="none" stroke="rgba(167,139,250,0.08)" stroke-width="1" stroke-dasharray="2,6"/>

</svg>