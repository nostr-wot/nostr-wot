<svg width="800" height="450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#312e81;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4c1d95;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="43%" r="45%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:0" />
    </radialGradient>
    <filter id="shield-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#a78bfa" flood-opacity="0.6"/>
    </filter>
    <filter id="green-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#4ade80" flood-opacity="0.5"/>
    </filter>
    <filter id="red-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#f87171" flood-opacity="0.5"/>
    </filter>
    <filter id="bubble-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#a78bfa" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#glow)"/>

  <!-- Trust rings -->
  <circle cx="400" cy="200" r="195" fill="none" stroke="rgba(167,139,250,0.06)" stroke-width="1" stroke-dasharray="4,8"/>
  <circle cx="400" cy="200" r="145" fill="none" stroke="rgba(167,139,250,0.10)" stroke-width="1" stroke-dasharray="4,8"/>
  <circle cx="400" cy="200" r="100" fill="none" stroke="rgba(167,139,250,0.14)" stroke-width="1" stroke-dasharray="4,8"/>

  <!-- Browser tab outlines -->
  <g opacity="0.35">
    <rect x="70" y="70" width="150" height="12" rx="3" ry="3" fill="rgba(167,139,250,0.15)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
    <rect x="70" y="82" width="150" height="90" fill="rgba(167,139,250,0.04)" stroke="rgba(167,139,250,0.2)" stroke-width="1"/>
    <rect x="75" y="72" width="40" height="8" rx="2" ry="2" fill="rgba(167,139,250,0.2)"/>
  </g>
  <line x1="220" y1="120" x2="345" y2="185" stroke="rgba(167,139,250,0.2)" stroke-width="1" stroke-dasharray="4,6"/>

  <g opacity="0.35">
    <rect x="580" y="55" width="150" height="12" rx="3" ry="3" fill="rgba(167,139,250,0.15)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
    <rect x="580" y="67" width="150" height="90" fill="rgba(167,139,250,0.04)" stroke="rgba(167,139,250,0.2)" stroke-width="1"/>
    <rect x="585" y="57" width="40" height="8" rx="2" ry="2" fill="rgba(167,139,250,0.2)"/>
  </g>
  <line x1="580" y1="110" x2="455" y2="180" stroke="rgba(167,139,250,0.2)" stroke-width="1" stroke-dasharray="4,6"/>

  <g opacity="0.3">
    <rect x="60" y="300" width="145" height="12" rx="3" ry="3" fill="rgba(167,139,250,0.15)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
    <rect x="60" y="312" width="145" height="85" fill="rgba(167,139,250,0.04)" stroke="rgba(167,139,250,0.2)" stroke-width="1"/>
    <rect x="65" y="302" width="38" height="8" rx="2" ry="2" fill="rgba(167,139,250,0.2)"/>
  </g>
  <line x1="205" y1="335" x2="350" y2="240" stroke="rgba(167,139,250,0.2)" stroke-width="1" stroke-dasharray="4,6"/>

  <g opacity="0.3">
    <rect x="600" y="310" width="145" height="12" rx="3" ry="3" fill="rgba(167,139,250,0.15)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
    <rect x="600" y="322" width="145" height="85" fill="rgba(167,139,250,0.04)" stroke="rgba(167,139,250,0.2)" stroke-width="1"/>
    <rect x="605" y="312" width="38" height="8" rx="2" ry="2" fill="rgba(167,139,250,0.2)"/>
  </g>
  <line x1="600" y1="345" x2="455" y2="245" stroke="rgba(167,139,250,0.2)" stroke-width="1" stroke-dasharray="4,6"/>

  <!-- Domain bubbles -->
  <g filter="url(#bubble-glow)">
    <!-- Allowed -->
    <rect x="225" y="95" width="110" height="26" rx="13" ry="13" fill="rgba(74,222,128,0.08)" stroke="rgba(74,222,128,0.4)" stroke-width="1"/>
    <text x="262" y="113" fill="rgba(74,222,128,0.7)" font-family="monospace" font-size="9">relay.damus</text>
    <g filter="url(#green-glow)">
      <polyline points="233,104 236,109 242,101" fill="none" stroke="rgba(74,222,128,0.9)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <rect x="230" y="250" width="100" height="26" rx="13" ry="13" fill="rgba(74,222,128,0.08)" stroke="rgba(74,222,128,0.4)" stroke-width="1"/>
    <text x="265" y="268" fill="rgba(74,222,128,0.7)" font-family="monospace" font-size="9">primal.net</text>
    <g filter="url(#green-glow)">
      <polyline points="238,258 241,263 247,255" fill="none" stroke="rgba(74,222,128,0.9)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Denied -->
    <rect x="480" y="100" width="115" height="26" rx="13" ry="13" fill="rgba(248,113,113,0.08)" stroke="rgba(248,113,113,0.4)" stroke-width="1"/>
    <text x="515" y="118" fill="rgba(248,113,113,0.7)" font-family="monospace" font-size="9">evil-site.co</text>
    <g filter="url(#red-glow)">
      <line x1="490" y1="108" x2="496" y2="114" stroke="rgba(248,113,113,0.9)" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="496" y1="108" x2="490" y2="114" stroke="rgba(248,113,113,0.9)" stroke-width="1.5" stroke-linecap="round"/>
    </g>

    <rect x="490" y="260" width="105" height="26" rx="13" ry="13" fill="rgba(248,113,113,0.08)" stroke="rgba(248,113,113,0.4)" stroke-width="1"/>
    <text x="525" y="278" fill="rgba(248,113,113,0.7)" font-family="monospace" font-size="9">spam.xyz</text>
    <g filter="url(#red-glow)">
      <line x1="500" y1="268" x2="506" y2="274" stroke="rgba(248,113,113,0.9)" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="506" y1="268" x2="500" y2="274" stroke="rgba(248,113,113,0.9)" stroke-width="1.5" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Center: Shield with Lock -->
  <circle cx="400" cy="200" r="72" fill="rgba(167,139,250,0.06)"/>
  <circle cx="400" cy="200" r="54" fill="rgba(167,139,250,0.08)"/>
  <circle cx="400" cy="200" r="36" fill="rgba(139,92,246,0.1)"/>

  <g filter="url(#shield-glow)">
    <path d="M 400 155 L 445 173 L 445 215 C 445 245 427 263 400 273 C 373 263 355 245 355 215 L 355 173 Z" fill="rgba(167,139,250,0.12)" stroke="rgba(167,139,250,0.7)" stroke-width="2"/>
  </g>

  <!-- Lock -->
  <rect x="385" y="205" width="30" height="22" rx="3" ry="3" fill="rgba(167,139,250,0.25)" stroke="rgba(167,139,250,0.6)" stroke-width="1.5"/>
  <path d="M 391 205 L 391 194 C 391 185 395 180 400 180 C 405 180 409 185 409 194 L 409 205" fill="none" stroke="rgba(167,139,250,0.7)" stroke-width="2" stroke-linecap="round"/>
  <circle cx="400" cy="214" r="3.5" fill="rgba(167,139,250,0.5)"/>
  <rect x="399" y="214" width="3" height="6" rx="1" ry="1" fill="rgba(167,139,250,0.5)"/>

</svg>