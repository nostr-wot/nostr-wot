<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#312e81;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4c1d95;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:0" />
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#a78bfa" flood-opacity="0.5"/>
    </filter>
    <filter id="shield-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#a78bfa" flood-opacity="0.6"/>
    </filter>
    <filter id="green-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#4ade80" flood-opacity="0.5"/>
    </filter>
    <filter id="red-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#f87171" flood-opacity="0.5"/>
    </filter>
    <filter id="bubble-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#a78bfa" flood-opacity="0.4"/>
    </filter>
    <filter id="lock-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#glow)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="white" stroke-width="0.5">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="200" y1="0" x2="1200" y2="500"/>
    <line x1="0" y1="200" x2="1000" y2="630"/>
    <line x1="400" y1="0" x2="1200" y2="400"/>
    <line x1="0" y1="400" x2="800" y2="630"/>
    <line x1="1200" y1="0" x2="0" y2="630"/>
    <line x1="1000" y1="0" x2="0" y2="500"/>
    <line x1="1200" y1="200" x2="200" y2="630"/>
  </g>

  <!-- Trust rings -->
  <circle cx="600" cy="280" r="280" fill="none" stroke="rgba(167,139,250,0.06)" stroke-width="1" stroke-dasharray="4,8"/>
  <circle cx="600" cy="280" r="210" fill="none" stroke="rgba(167,139,250,0.10)" stroke-width="1" stroke-dasharray="4,8"/>
  <circle cx="600" cy="280" r="140" fill="none" stroke="rgba(167,139,250,0.14)" stroke-width="1" stroke-dasharray="4,8"/>

  <!-- ============================================ -->
  <!-- BROWSER TAB OUTLINES connecting to shield    -->
  <!-- ============================================ -->

  <!-- Browser tab - top left -->
  <g opacity="0.4">
    <rect x="120" y="100" width="200" height="14" rx="3" ry="3" fill="rgba(167,139,250,0.15)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
    <rect x="120" y="114" width="200" height="120" rx="0" ry="0" fill="rgba(167,139,250,0.04)" stroke="rgba(167,139,250,0.2)" stroke-width="1"/>
    <!-- Tab -->
    <rect x="125" y="102" width="50" height="10" rx="2" ry="2" fill="rgba(167,139,250,0.2)"/>
    <!-- URL bar -->
    <rect x="130" y="122" width="180" height="12" rx="3" ry="3" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.15)" stroke-width="0.5"/>
  </g>
  <line x1="320" y1="170" x2="530" y2="260" stroke="rgba(167,139,250,0.2)" stroke-width="1" stroke-dasharray="4,6"/>

  <!-- Browser tab - top right -->
  <g opacity="0.4">
    <rect x="880" y="80" width="200" height="14" rx="3" ry="3" fill="rgba(167,139,250,0.15)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
    <rect x="880" y="94" width="200" height="120" rx="0" ry="0" fill="rgba(167,139,250,0.04)" stroke="rgba(167,139,250,0.2)" stroke-width="1"/>
    <rect x="885" y="82" width="50" height="10" rx="2" ry="2" fill="rgba(167,139,250,0.2)"/>
    <rect x="890" y="102" width="180" height="12" rx="3" ry="3" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.15)" stroke-width="0.5"/>
  </g>
  <line x1="880" y1="154" x2="670" y2="250" stroke="rgba(167,139,250,0.2)" stroke-width="1" stroke-dasharray="4,6"/>

  <!-- Browser tab - bottom left -->
  <g opacity="0.35">
    <rect x="100" y="400" width="190" height="14" rx="3" ry="3" fill="rgba(167,139,250,0.15)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
    <rect x="100" y="414" width="190" height="110" rx="0" ry="0" fill="rgba(167,139,250,0.04)" stroke="rgba(167,139,250,0.2)" stroke-width="1"/>
    <rect x="105" y="402" width="45" height="10" rx="2" ry="2" fill="rgba(167,139,250,0.2)"/>
    <rect x="110" y="422" width="170" height="12" rx="3" ry="3" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.15)" stroke-width="0.5"/>
  </g>
  <line x1="290" y1="440" x2="530" y2="330" stroke="rgba(167,139,250,0.2)" stroke-width="1" stroke-dasharray="4,6"/>

  <!-- Browser tab - bottom right -->
  <g opacity="0.35">
    <rect x="910" y="420" width="190" height="14" rx="3" ry="3" fill="rgba(167,139,250,0.15)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
    <rect x="910" y="434" width="190" height="110" rx="0" ry="0" fill="rgba(167,139,250,0.04)" stroke="rgba(167,139,250,0.2)" stroke-width="1"/>
    <rect x="915" y="422" width="45" height="10" rx="2" ry="2" fill="rgba(167,139,250,0.2)"/>
    <rect x="920" y="442" width="170" height="12" rx="3" ry="3" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.15)" stroke-width="0.5"/>
  </g>
  <line x1="910" y1="460" x2="670" y2="340" stroke="rgba(167,139,250,0.2)" stroke-width="1" stroke-dasharray="4,6"/>

  <!-- ============================================ -->
  <!-- DOMAIN BUBBLES around the shield             -->
  <!-- ============================================ -->

  <!-- Allowed domain bubbles (with green checkmarks) -->
  <g filter="url(#bubble-glow)">
    <!-- Bubble 1 - top left -->
    <rect x="340" y="130" width="140" height="32" rx="16" ry="16" fill="rgba(74,222,128,0.08)" stroke="rgba(74,222,128,0.4)" stroke-width="1.2"/>
    <text x="385" y="151" fill="rgba(74,222,128,0.7)" font-family="monospace" font-size="11">relay.damus</text>
    <g filter="url(#green-glow)">
      <polyline points="340,142 344,148 352,138" fill="none" stroke="rgba(74,222,128,0.9)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" transform="translate(8,2)"/>
    </g>

    <!-- Bubble 2 - left -->
    <rect x="310" y="320" width="130" height="32" rx="16" ry="16" fill="rgba(74,222,128,0.08)" stroke="rgba(74,222,128,0.4)" stroke-width="1.2"/>
    <text x="355" y="341" fill="rgba(74,222,128,0.7)" font-family="monospace" font-size="11">primal.net</text>
    <g filter="url(#green-glow)">
      <polyline points="310,332 314,338 322,328" fill="none" stroke="rgba(74,222,128,0.9)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" transform="translate(8,2)"/>
    </g>

    <!-- Bubble 3 - top right -->
    <rect x="720" y="140" width="150" height="32" rx="16" ry="16" fill="rgba(74,222,128,0.08)" stroke="rgba(74,222,128,0.4)" stroke-width="1.2"/>
    <text x="765" y="161" fill="rgba(74,222,128,0.7)" font-family="monospace" font-size="11">snort.social</text>
    <g filter="url(#green-glow)">
      <polyline points="720,152 724,158 732,148" fill="none" stroke="rgba(74,222,128,0.9)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" transform="translate(8,2)"/>
    </g>
  </g>

  <!-- Denied domain bubbles (with red X marks) -->
  <g filter="url(#bubble-glow)">
    <!-- Bubble 4 - right -->
    <rect x="745" y="330" width="150" height="32" rx="16" ry="16" fill="rgba(248,113,113,0.08)" stroke="rgba(248,113,113,0.4)" stroke-width="1.2"/>
    <text x="790" y="351" fill="rgba(248,113,113,0.7)" font-family="monospace" font-size="11">evil-site.co</text>
    <g filter="url(#red-glow)">
      <line x1="757" y1="340" x2="765" y2="348" stroke="rgba(248,113,113,0.9)" stroke-width="2" stroke-linecap="round"/>
      <line x1="765" y1="340" x2="757" y2="348" stroke="rgba(248,113,113,0.9)" stroke-width="2" stroke-linecap="round"/>
    </g>

    <!-- Bubble 5 - bottom -->
    <rect x="450" y="460" width="140" height="32" rx="16" ry="16" fill="rgba(248,113,113,0.08)" stroke="rgba(248,113,113,0.4)" stroke-width="1.2"/>
    <text x="490" y="481" fill="rgba(248,113,113,0.7)" font-family="monospace" font-size="11">spam.xyz</text>
    <g filter="url(#red-glow)">
      <line x1="462" y1="470" x2="470" y2="478" stroke="rgba(248,113,113,0.9)" stroke-width="2" stroke-linecap="round"/>
      <line x1="470" y1="470" x2="462" y2="478" stroke="rgba(248,113,113,0.9)" stroke-width="2" stroke-linecap="round"/>
    </g>

    <!-- Bubble 6 - bottom right -->
    <rect x="640" y="470" width="160" height="32" rx="16" ry="16" fill="rgba(248,113,113,0.08)" stroke="rgba(248,113,113,0.4)" stroke-width="1.2"/>
    <text x="685" y="491" fill="rgba(248,113,113,0.7)" font-family="monospace" font-size="11">phishing.net</text>
    <g filter="url(#red-glow)">
      <line x1="652" y1="480" x2="660" y2="488" stroke="rgba(248,113,113,0.9)" stroke-width="2" stroke-linecap="round"/>
      <line x1="660" y1="480" x2="652" y2="488" stroke="rgba(248,113,113,0.9)" stroke-width="2" stroke-linecap="round"/>
    </g>
  </g>

  <!-- ============================================ -->
  <!-- CENTER: Shield / Lock icon                   -->
  <!-- ============================================ -->

  <!-- Glow behind shield -->
  <circle cx="600" cy="280" r="100" fill="rgba(167,139,250,0.06)"/>
  <circle cx="600" cy="280" r="75" fill="rgba(167,139,250,0.08)"/>
  <circle cx="600" cy="280" r="50" fill="rgba(139,92,246,0.1)"/>

  <!-- Shield shape -->
  <g filter="url(#shield-glow)">
    <path d="M 600 210 L 660 235 L 660 295 C 660 335 635 360 600 375 C 565 360 540 335 540 295 L 540 235 Z" fill="rgba(167,139,250,0.12)" stroke="rgba(167,139,250,0.7)" stroke-width="2.5"/>
  </g>

  <!-- Lock body inside shield -->
  <rect x="580" y="275" width="40" height="30" rx="4" ry="4" fill="rgba(167,139,250,0.25)" stroke="rgba(167,139,250,0.6)" stroke-width="1.5"/>
  <!-- Lock shackle -->
  <path d="M 588 275 L 588 260 C 588 248 594 242 600 242 C 606 242 612 248 612 260 L 612 275" fill="none" stroke="rgba(167,139,250,0.7)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Lock keyhole -->
  <circle cx="600" cy="288" r="5" fill="rgba(167,139,250,0.5)"/>
  <rect x="598" y="288" width="4" height="8" rx="1" ry="1" fill="rgba(167,139,250,0.5)"/>

  <!-- Small shield glow ring -->
  <circle cx="600" cy="280" r="108" fill="none" stroke="rgba(167,139,250,0.08)" stroke-width="1" stroke-dasharray="2,6"/>

</svg>