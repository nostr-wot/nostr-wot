<svg width="800" height="450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#312e81;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4c1d95;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="43%" r="45%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:0" />
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#a78bfa" flood-opacity="0.5"/>
    </filter>
    <filter id="gear-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#a78bfa" flood-opacity="0.6"/>
    </filter>
    <filter id="slider-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#4ade80" flood-opacity="0.5"/>
    </filter>
    <filter id="formula-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#facc15" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#glow)"/>

  <!-- Trust rings -->
  <circle cx="400" cy="195" r="190" fill="none" stroke="rgba(167,139,250,0.06)" stroke-width="1" stroke-dasharray="4,8"/>
  <circle cx="400" cy="195" r="145" fill="none" stroke="rgba(167,139,250,0.10)" stroke-width="1" stroke-dasharray="4,8"/>
  <circle cx="400" cy="195" r="100" fill="none" stroke="rgba(167,139,250,0.14)" stroke-width="1" stroke-dasharray="4,8"/>

  <!-- Gear icon (center) -->
  <g filter="url(#gear-glow)" transform="translate(400, 180)">
    <g fill="rgba(167,139,250,0.7)" stroke="rgba(167,139,250,0.4)" stroke-width="0.8">
      <rect x="-6" y="-45" width="12" height="12" rx="2" transform="rotate(0)"/>
      <rect x="-6" y="-45" width="12" height="12" rx="2" transform="rotate(30)"/>
      <rect x="-6" y="-45" width="12" height="12" rx="2" transform="rotate(60)"/>
      <rect x="-6" y="-45" width="12" height="12" rx="2" transform="rotate(90)"/>
      <rect x="-6" y="-45" width="12" height="12" rx="2" transform="rotate(120)"/>
      <rect x="-6" y="-45" width="12" height="12" rx="2" transform="rotate(150)"/>
      <rect x="-6" y="-45" width="12" height="12" rx="2" transform="rotate(180)"/>
      <rect x="-6" y="-45" width="12" height="12" rx="2" transform="rotate(210)"/>
      <rect x="-6" y="-45" width="12" height="12" rx="2" transform="rotate(240)"/>
      <rect x="-6" y="-45" width="12" height="12" rx="2" transform="rotate(270)"/>
      <rect x="-6" y="-45" width="12" height="12" rx="2" transform="rotate(300)"/>
      <rect x="-6" y="-45" width="12" height="12" rx="2" transform="rotate(330)"/>
    </g>
    <circle cx="0" cy="0" r="35" fill="rgba(167,139,250,0.12)" stroke="rgba(167,139,250,0.6)" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="16" fill="rgba(30,27,75,0.8)" stroke="rgba(167,139,250,0.4)" stroke-width="1"/>
    <circle cx="0" cy="0" r="4" fill="rgba(167,139,250,0.7)"/>
  </g>

  <!-- Sliders (left side) -->
  <g filter="url(#slider-glow)">
    <!-- Slider 1 -->
    <g transform="translate(150, 130)">
      <text x="0" y="-8" font-family="monospace" font-size="8" fill="rgba(74,222,128,0.6)">Follow</text>
      <rect x="0" y="0" width="130" height="4" rx="2" fill="rgba(167,139,250,0.15)"/>
      <rect x="0" y="0" width="100" height="4" rx="2" fill="rgba(74,222,128,0.5)"/>
      <circle cx="100" cy="2" r="6" fill="rgba(74,222,128,0.8)" stroke="rgba(74,222,128,0.4)" stroke-width="1"/>
    </g>
    <!-- Slider 2 -->
    <g transform="translate(150, 175)">
      <text x="0" y="-8" font-family="monospace" font-size="8" fill="rgba(250,204,21,0.6)">Mute</text>
      <rect x="0" y="0" width="130" height="4" rx="2" fill="rgba(167,139,250,0.15)"/>
      <rect x="0" y="0" width="72" height="4" rx="2" fill="rgba(250,204,21,0.5)"/>
      <circle cx="72" cy="2" r="6" fill="rgba(250,204,21,0.8)" stroke="rgba(250,204,21,0.4)" stroke-width="1"/>
    </g>
    <!-- Slider 3 -->
    <g transform="translate(150, 220)">
      <text x="0" y="-8" font-family="monospace" font-size="8" fill="rgba(248,113,113,0.6)">Report</text>
      <rect x="0" y="0" width="130" height="4" rx="2" fill="rgba(167,139,250,0.15)"/>
      <rect x="0" y="0" width="42" height="4" rx="2" fill="rgba(248,113,113,0.5)"/>
      <circle cx="42" cy="2" r="6" fill="rgba(248,113,113,0.8)" stroke="rgba(248,113,113,0.4)" stroke-width="1"/>
    </g>
  </g>

  <!-- Weight bars (right side) -->
  <g transform="translate(530, 110)">
    <line x1="0" y1="0" x2="0" y2="170" stroke="rgba(167,139,250,0.2)" stroke-width="1"/>
    <line x1="0" y1="170" x2="160" y2="170" stroke="rgba(167,139,250,0.2)" stroke-width="1"/>

    <rect x="10" y="30" width="28" height="140" rx="3" fill="rgba(74,222,128,0.5)" stroke="rgba(74,222,128,0.3)" stroke-width="1"/>
    <rect x="48" y="70" width="28" height="100" rx="3" fill="rgba(250,204,21,0.5)" stroke="rgba(250,204,21,0.3)" stroke-width="1"/>
    <rect x="86" y="120" width="28" height="50" rx="3" fill="rgba(248,113,113,0.5)" stroke="rgba(248,113,113,0.3)" stroke-width="1"/>
    <rect x="124" y="55" width="28" height="115" rx="3" fill="rgba(167,139,250,0.5)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
  </g>

  <!-- Formula (bottom) -->
  <g filter="url(#formula-glow)">
    <rect x="270" y="325" width="260" height="38" rx="8" fill="rgba(250,204,21,0.05)" stroke="rgba(250,204,21,0.25)" stroke-width="1"/>
    <text x="400" y="350" font-family="monospace" font-size="11" fill="rgba(250,204,21,0.7)" text-anchor="middle">
      score = W_f + W_m + W_r / d^n
    </text>
  </g>

  <!-- Connecting lines -->
  <line x1="280" y1="135" x2="362" y2="165" stroke="rgba(74,222,128,0.12)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="280" y1="178" x2="365" y2="180" stroke="rgba(250,204,21,0.1)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="280" y1="223" x2="362" y2="195" stroke="rgba(248,113,113,0.1)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="438" y1="175" x2="530" y2="160" stroke="rgba(167,139,250,0.1)" stroke-width="1" stroke-dasharray="3,3"/>

</svg>