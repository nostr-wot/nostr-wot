<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#312e81;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4c1d95;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:0" />
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#a78bfa" flood-opacity="0.5"/>
    </filter>
    <filter id="gear-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#a78bfa" flood-opacity="0.6"/>
    </filter>
    <filter id="slider-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#4ade80" flood-opacity="0.5"/>
    </filter>
    <filter id="formula-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#facc15" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#glow)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="white" stroke-width="0.5">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="200" y1="0" x2="1200" y2="500"/>
    <line x1="0" y1="200" x2="1000" y2="630"/>
    <line x1="400" y1="0" x2="1200" y2="400"/>
    <line x1="0" y1="400" x2="800" y2="630"/>
    <line x1="1200" y1="0" x2="0" y2="630"/>
    <line x1="1000" y1="0" x2="0" y2="500"/>
    <line x1="1200" y1="200" x2="200" y2="630"/>
  </g>

  <!-- Trust rings -->
  <circle cx="600" cy="280" r="270" fill="none" stroke="rgba(167,139,250,0.06)" stroke-width="1" stroke-dasharray="4,8"/>
  <circle cx="600" cy="280" r="210" fill="none" stroke="rgba(167,139,250,0.10)" stroke-width="1" stroke-dasharray="4,8"/>
  <circle cx="600" cy="280" r="150" fill="none" stroke="rgba(167,139,250,0.14)" stroke-width="1" stroke-dasharray="4,8"/>

  <!-- ============================================ -->
  <!-- CENTRAL GEAR ICON                            -->
  <!-- ============================================ -->
  <g filter="url(#gear-glow)" transform="translate(600, 260)">
    <!-- Gear teeth (12 teeth) -->
    <g fill="rgba(167,139,250,0.7)" stroke="rgba(167,139,250,0.4)" stroke-width="1">
      <rect x="-8" y="-62" width="16" height="16" rx="2" transform="rotate(0)"/>
      <rect x="-8" y="-62" width="16" height="16" rx="2" transform="rotate(30)"/>
      <rect x="-8" y="-62" width="16" height="16" rx="2" transform="rotate(60)"/>
      <rect x="-8" y="-62" width="16" height="16" rx="2" transform="rotate(90)"/>
      <rect x="-8" y="-62" width="16" height="16" rx="2" transform="rotate(120)"/>
      <rect x="-8" y="-62" width="16" height="16" rx="2" transform="rotate(150)"/>
      <rect x="-8" y="-62" width="16" height="16" rx="2" transform="rotate(180)"/>
      <rect x="-8" y="-62" width="16" height="16" rx="2" transform="rotate(210)"/>
      <rect x="-8" y="-62" width="16" height="16" rx="2" transform="rotate(240)"/>
      <rect x="-8" y="-62" width="16" height="16" rx="2" transform="rotate(270)"/>
      <rect x="-8" y="-62" width="16" height="16" rx="2" transform="rotate(300)"/>
      <rect x="-8" y="-62" width="16" height="16" rx="2" transform="rotate(330)"/>
    </g>
    <!-- Gear body -->
    <circle cx="0" cy="0" r="48" fill="rgba(167,139,250,0.12)" stroke="rgba(167,139,250,0.6)" stroke-width="2"/>
    <!-- Inner circle -->
    <circle cx="0" cy="0" r="22" fill="rgba(30,27,75,0.8)" stroke="rgba(167,139,250,0.4)" stroke-width="1.5"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="5" fill="rgba(167,139,250,0.7)"/>
  </g>

  <!-- ============================================ -->
  <!-- SLIDER CONTROLS (left side)                  -->
  <!-- ============================================ -->
  <g filter="url(#slider-glow)">
    <!-- Slider 1 - Follow Weight (high) -->
    <g transform="translate(280, 180)">
      <text x="0" y="-12" font-family="monospace" font-size="10" fill="rgba(74,222,128,0.6)">Follow Weight</text>
      <rect x="0" y="0" width="180" height="6" rx="3" fill="rgba(167,139,250,0.15)"/>
      <rect x="0" y="0" width="140" height="6" rx="3" fill="rgba(74,222,128,0.5)"/>
      <circle cx="140" cy="3" r="8" fill="rgba(74,222,128,0.8)" stroke="rgba(74,222,128,0.4)" stroke-width="1.5"/>
    </g>

    <!-- Slider 2 - Mute Weight (medium) -->
    <g transform="translate(280, 240)">
      <text x="0" y="-12" font-family="monospace" font-size="10" fill="rgba(250,204,21,0.6)">Mute Weight</text>
      <rect x="0" y="0" width="180" height="6" rx="3" fill="rgba(167,139,250,0.15)"/>
      <rect x="0" y="0" width="100" height="6" rx="3" fill="rgba(250,204,21,0.5)"/>
      <circle cx="100" cy="3" r="8" fill="rgba(250,204,21,0.8)" stroke="rgba(250,204,21,0.4)" stroke-width="1.5"/>
    </g>

    <!-- Slider 3 - Report Weight (low) -->
    <g transform="translate(280, 300)">
      <text x="0" y="-12" font-family="monospace" font-size="10" fill="rgba(248,113,113,0.6)">Report Weight</text>
      <rect x="0" y="0" width="180" height="6" rx="3" fill="rgba(167,139,250,0.15)"/>
      <rect x="0" y="0" width="60" height="6" rx="3" fill="rgba(248,113,113,0.5)"/>
      <circle cx="60" cy="3" r="8" fill="rgba(248,113,113,0.8)" stroke="rgba(248,113,113,0.4)" stroke-width="1.5"/>
    </g>

    <!-- Slider 4 - Hop Decay -->
    <g transform="translate(280, 360)">
      <text x="0" y="-12" font-family="monospace" font-size="10" fill="rgba(167,139,250,0.6)">Hop Decay</text>
      <rect x="0" y="0" width="180" height="6" rx="3" fill="rgba(167,139,250,0.15)"/>
      <rect x="0" y="0" width="120" height="6" rx="3" fill="rgba(167,139,250,0.4)"/>
      <circle cx="120" cy="3" r="8" fill="rgba(167,139,250,0.7)" stroke="rgba(167,139,250,0.4)" stroke-width="1.5"/>
    </g>
  </g>

  <!-- ============================================ -->
  <!-- WEIGHT BARS (right side)                     -->
  <!-- ============================================ -->
  <g transform="translate(770, 160)">
    <!-- Bar chart frame -->
    <line x1="0" y1="0" x2="0" y2="240" stroke="rgba(167,139,250,0.2)" stroke-width="1"/>
    <line x1="0" y1="240" x2="220" y2="240" stroke="rgba(167,139,250,0.2)" stroke-width="1"/>

    <!-- Grid lines -->
    <line x1="0" y1="60" x2="220" y2="60" stroke="rgba(167,139,250,0.06)" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="220" y2="120" stroke="rgba(167,139,250,0.06)" stroke-width="0.5"/>
    <line x1="0" y1="180" x2="220" y2="180" stroke="rgba(167,139,250,0.06)" stroke-width="0.5"/>

    <!-- Bar 1 - Follows (tall, green) -->
    <rect x="15" y="40" width="35" height="200" rx="4" fill="rgba(74,222,128,0.5)" stroke="rgba(74,222,128,0.3)" stroke-width="1"/>
    <text x="32" y="258" font-family="monospace" font-size="8" fill="rgba(74,222,128,0.6)" text-anchor="middle">F</text>

    <!-- Bar 2 - Mutes (medium, yellow) -->
    <rect x="65" y="100" width="35" height="140" rx="4" fill="rgba(250,204,21,0.5)" stroke="rgba(250,204,21,0.3)" stroke-width="1"/>
    <text x="82" y="258" font-family="monospace" font-size="8" fill="rgba(250,204,21,0.6)" text-anchor="middle">M</text>

    <!-- Bar 3 - Reports (short, red) -->
    <rect x="115" y="170" width="35" height="70" rx="4" fill="rgba(248,113,113,0.5)" stroke="rgba(248,113,113,0.3)" stroke-width="1"/>
    <text x="132" y="258" font-family="monospace" font-size="8" fill="rgba(248,113,113,0.6)" text-anchor="middle">R</text>

    <!-- Bar 4 - Zaps (medium-tall, purple) -->
    <rect x="165" y="80" width="35" height="160" rx="4" fill="rgba(167,139,250,0.5)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
    <text x="182" y="258" font-family="monospace" font-size="8" fill="rgba(167,139,250,0.6)" text-anchor="middle">Z</text>
  </g>

  <!-- ============================================ -->
  <!-- FORMULA ELEMENT (bottom center)              -->
  <!-- ============================================ -->
  <g filter="url(#formula-glow)">
    <rect x="430" y="440" width="340" height="50" rx="10" fill="rgba(250,204,21,0.05)" stroke="rgba(250,204,21,0.25)" stroke-width="1.5"/>
    <text x="600" y="472" font-family="monospace" font-size="14" fill="rgba(250,204,21,0.7)" text-anchor="middle">
      score = W_f + W_m + W_r / d^n
    </text>
  </g>

  <!-- Connecting lines from sliders to gear -->
  <line x1="460" y1="185" x2="545" y2="240" stroke="rgba(74,222,128,0.15)" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="460" y1="245" x2="548" y2="260" stroke="rgba(250,204,21,0.12)" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="460" y1="305" x2="545" y2="280" stroke="rgba(248,113,113,0.12)" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="460" y1="365" x2="548" y2="295" stroke="rgba(167,139,250,0.12)" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Connecting lines from gear to bars -->
  <line x1="655" y1="240" x2="770" y2="200" stroke="rgba(167,139,250,0.12)" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="655" y1="260" x2="770" y2="280" stroke="rgba(167,139,250,0.12)" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Connecting line from gear to formula -->
  <line x1="600" y1="325" x2="600" y2="440" stroke="rgba(250,204,21,0.1)" stroke-width="1" stroke-dasharray="4,4"/>

</svg>