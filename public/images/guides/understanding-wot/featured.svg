<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#312e81;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4c1d95;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:0" />
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#a78bfa" flood-opacity="0.5"/>
    </filter>
    <filter id="center-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#a78bfa" flood-opacity="0.8"/>
    </filter>
    <filter id="node-glow-green" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#4ade80" flood-opacity="0.6"/>
    </filter>
    <filter id="node-glow-yellow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#facc15" flood-opacity="0.5"/>
    </filter>
    <filter id="node-glow-red" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#f87171" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#glow)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="white" stroke-width="0.5">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="200" y1="0" x2="1200" y2="500"/>
    <line x1="0" y1="200" x2="1000" y2="630"/>
    <line x1="400" y1="0" x2="1200" y2="400"/>
    <line x1="0" y1="400" x2="800" y2="630"/>
    <line x1="1200" y1="0" x2="0" y2="630"/>
    <line x1="1000" y1="0" x2="0" y2="500"/>
    <line x1="1200" y1="200" x2="200" y2="630"/>
  </g>

  <!-- Concentric trust rings (hop levels) -->
  <circle cx="600" cy="285" r="270" fill="none" stroke="rgba(248,113,113,0.12)" stroke-width="1.5" stroke-dasharray="4,8"/>
  <circle cx="600" cy="285" r="200" fill="none" stroke="rgba(250,204,21,0.15)" stroke-width="1.5" stroke-dasharray="4,8"/>
  <circle cx="600" cy="285" r="130" fill="none" stroke="rgba(74,222,128,0.18)" stroke-width="1.5" stroke-dasharray="4,8"/>
  <circle cx="600" cy="285" r="60" fill="none" stroke="rgba(167,139,250,0.25)" stroke-width="1.5" stroke-dasharray="4,8"/>

  <!-- ============================================ -->
  <!-- CONNECTION LINES                             -->
  <!-- ============================================ -->

  <!-- Center to hop-1 (green) connections -->
  <line x1="600" y1="285" x2="490" y2="200" stroke="rgba(74,222,128,0.5)" stroke-width="2"/>
  <line x1="600" y1="285" x2="710" y2="200" stroke="rgba(74,222,128,0.5)" stroke-width="2"/>
  <line x1="600" y1="285" x2="480" y2="330" stroke="rgba(74,222,128,0.5)" stroke-width="2"/>
  <line x1="600" y1="285" x2="720" y2="330" stroke="rgba(74,222,128,0.5)" stroke-width="2"/>
  <line x1="600" y1="285" x2="600" y2="160" stroke="rgba(74,222,128,0.5)" stroke-width="2"/>
  <line x1="600" y1="285" x2="600" y2="410" stroke="rgba(74,222,128,0.5)" stroke-width="2"/>

  <!-- Hop-1 to hop-2 (yellow) connections -->
  <line x1="490" y1="200" x2="390" y2="130" stroke="rgba(250,204,21,0.35)" stroke-width="1.5"/>
  <line x1="490" y1="200" x2="410" y2="230" stroke="rgba(250,204,21,0.35)" stroke-width="1.5"/>
  <line x1="710" y1="200" x2="810" y2="130" stroke="rgba(250,204,21,0.35)" stroke-width="1.5"/>
  <line x1="710" y1="200" x2="790" y2="230" stroke="rgba(250,204,21,0.35)" stroke-width="1.5"/>
  <line x1="480" y1="330" x2="400" y2="400" stroke="rgba(250,204,21,0.35)" stroke-width="1.5"/>
  <line x1="720" y1="330" x2="800" y2="400" stroke="rgba(250,204,21,0.35)" stroke-width="1.5"/>
  <line x1="600" y1="160" x2="520" y2="100" stroke="rgba(250,204,21,0.35)" stroke-width="1.5"/>
  <line x1="600" y1="160" x2="680" y2="100" stroke="rgba(250,204,21,0.35)" stroke-width="1.5"/>
  <line x1="600" y1="410" x2="520" y2="470" stroke="rgba(250,204,21,0.35)" stroke-width="1.5"/>
  <line x1="600" y1="410" x2="680" y2="470" stroke="rgba(250,204,21,0.35)" stroke-width="1.5"/>

  <!-- Hop-2 to hop-3 (red) connections -->
  <line x1="390" y1="130" x2="310" y2="70" stroke="rgba(248,113,113,0.2)" stroke-width="1"/>
  <line x1="390" y1="130" x2="340" y2="170" stroke="rgba(248,113,113,0.2)" stroke-width="1"/>
  <line x1="810" y1="130" x2="890" y2="70" stroke="rgba(248,113,113,0.2)" stroke-width="1"/>
  <line x1="810" y1="130" x2="860" y2="170" stroke="rgba(248,113,113,0.2)" stroke-width="1"/>
  <line x1="410" y1="230" x2="340" y2="280" stroke="rgba(248,113,113,0.2)" stroke-width="1"/>
  <line x1="790" y1="230" x2="860" y2="280" stroke="rgba(248,113,113,0.2)" stroke-width="1"/>
  <line x1="400" y1="400" x2="330" y2="460" stroke="rgba(248,113,113,0.2)" stroke-width="1"/>
  <line x1="800" y1="400" x2="870" y2="460" stroke="rgba(248,113,113,0.2)" stroke-width="1"/>
  <line x1="520" y1="100" x2="445" y2="40" stroke="rgba(248,113,113,0.2)" stroke-width="1"/>
  <line x1="680" y1="100" x2="755" y2="40" stroke="rgba(248,113,113,0.2)" stroke-width="1"/>
  <line x1="520" y1="470" x2="445" y2="540" stroke="rgba(248,113,113,0.2)" stroke-width="1"/>
  <line x1="680" y1="470" x2="755" y2="540" stroke="rgba(248,113,113,0.2)" stroke-width="1"/>

  <!-- Cross-connections within hops -->
  <line x1="490" y1="200" x2="600" y2="160" stroke="rgba(74,222,128,0.15)" stroke-width="1"/>
  <line x1="710" y1="200" x2="600" y2="160" stroke="rgba(74,222,128,0.15)" stroke-width="1"/>
  <line x1="480" y1="330" x2="600" y2="410" stroke="rgba(74,222,128,0.15)" stroke-width="1"/>
  <line x1="720" y1="330" x2="600" y2="410" stroke="rgba(74,222,128,0.15)" stroke-width="1"/>
  <line x1="390" y1="130" x2="520" y2="100" stroke="rgba(250,204,21,0.12)" stroke-width="1"/>
  <line x1="810" y1="130" x2="680" y2="100" stroke="rgba(250,204,21,0.12)" stroke-width="1"/>

  <!-- ============================================ -->
  <!-- NODES                                        -->
  <!-- ============================================ -->

  <!-- Red hop-3 nodes (small, peripheral) -->
  <g filter="url(#node-glow-red)">
    <circle cx="310" cy="70" r="6" fill="rgba(248,113,113,0.5)" stroke="rgba(248,113,113,0.3)" stroke-width="1"/>
    <circle cx="340" cy="170" r="5" fill="rgba(248,113,113,0.45)" stroke="rgba(248,113,113,0.25)" stroke-width="1"/>
    <circle cx="890" cy="70" r="6" fill="rgba(248,113,113,0.5)" stroke="rgba(248,113,113,0.3)" stroke-width="1"/>
    <circle cx="860" cy="170" r="5" fill="rgba(248,113,113,0.45)" stroke="rgba(248,113,113,0.25)" stroke-width="1"/>
    <circle cx="340" cy="280" r="5" fill="rgba(248,113,113,0.4)" stroke="rgba(248,113,113,0.25)" stroke-width="1"/>
    <circle cx="860" cy="280" r="5" fill="rgba(248,113,113,0.4)" stroke="rgba(248,113,113,0.25)" stroke-width="1"/>
    <circle cx="330" cy="460" r="5.5" fill="rgba(248,113,113,0.45)" stroke="rgba(248,113,113,0.25)" stroke-width="1"/>
    <circle cx="870" cy="460" r="5.5" fill="rgba(248,113,113,0.45)" stroke="rgba(248,113,113,0.25)" stroke-width="1"/>
    <circle cx="445" cy="40" r="5" fill="rgba(248,113,113,0.4)" stroke="rgba(248,113,113,0.25)" stroke-width="1"/>
    <circle cx="755" cy="40" r="5" fill="rgba(248,113,113,0.4)" stroke="rgba(248,113,113,0.25)" stroke-width="1"/>
    <circle cx="445" cy="540" r="5" fill="rgba(248,113,113,0.4)" stroke="rgba(248,113,113,0.25)" stroke-width="1"/>
    <circle cx="755" cy="540" r="5" fill="rgba(248,113,113,0.4)" stroke="rgba(248,113,113,0.25)" stroke-width="1"/>
  </g>

  <!-- Yellow hop-2 nodes (medium) -->
  <g filter="url(#node-glow-yellow)">
    <circle cx="390" cy="130" r="9" fill="rgba(250,204,21,0.6)" stroke="rgba(250,204,21,0.35)" stroke-width="1.5"/>
    <circle cx="410" cy="230" r="8" fill="rgba(250,204,21,0.55)" stroke="rgba(250,204,21,0.3)" stroke-width="1.5"/>
    <circle cx="810" cy="130" r="9" fill="rgba(250,204,21,0.6)" stroke="rgba(250,204,21,0.35)" stroke-width="1.5"/>
    <circle cx="790" cy="230" r="8" fill="rgba(250,204,21,0.55)" stroke="rgba(250,204,21,0.3)" stroke-width="1.5"/>
    <circle cx="400" cy="400" r="8.5" fill="rgba(250,204,21,0.55)" stroke="rgba(250,204,21,0.3)" stroke-width="1.5"/>
    <circle cx="800" cy="400" r="8.5" fill="rgba(250,204,21,0.55)" stroke="rgba(250,204,21,0.3)" stroke-width="1.5"/>
    <circle cx="520" cy="100" r="8" fill="rgba(250,204,21,0.55)" stroke="rgba(250,204,21,0.3)" stroke-width="1.5"/>
    <circle cx="680" cy="100" r="8" fill="rgba(250,204,21,0.55)" stroke="rgba(250,204,21,0.3)" stroke-width="1.5"/>
    <circle cx="520" cy="470" r="8" fill="rgba(250,204,21,0.55)" stroke="rgba(250,204,21,0.3)" stroke-width="1.5"/>
    <circle cx="680" cy="470" r="8" fill="rgba(250,204,21,0.55)" stroke="rgba(250,204,21,0.3)" stroke-width="1.5"/>
  </g>

  <!-- Green hop-1 nodes (larger) -->
  <g filter="url(#node-glow-green)">
    <circle cx="490" cy="200" r="13" fill="rgba(74,222,128,0.7)" stroke="rgba(74,222,128,0.4)" stroke-width="2"/>
    <circle cx="710" cy="200" r="13" fill="rgba(74,222,128,0.7)" stroke="rgba(74,222,128,0.4)" stroke-width="2"/>
    <circle cx="480" cy="330" r="12" fill="rgba(74,222,128,0.65)" stroke="rgba(74,222,128,0.35)" stroke-width="2"/>
    <circle cx="720" cy="330" r="12" fill="rgba(74,222,128,0.65)" stroke="rgba(74,222,128,0.35)" stroke-width="2"/>
    <circle cx="600" cy="160" r="13" fill="rgba(74,222,128,0.7)" stroke="rgba(74,222,128,0.4)" stroke-width="2"/>
    <circle cx="600" cy="410" r="13" fill="rgba(74,222,128,0.7)" stroke="rgba(74,222,128,0.4)" stroke-width="2"/>
  </g>

  <!-- ============================================ -->
  <!-- CENTER NODE (You)                            -->
  <!-- ============================================ -->

  <!-- Glow behind center node -->
  <circle cx="600" cy="285" r="45" fill="rgba(167,139,250,0.08)"/>
  <circle cx="600" cy="285" r="32" fill="rgba(167,139,250,0.06)"/>

  <!-- Center node -->
  <g filter="url(#center-glow)">
    <circle cx="600" cy="285" r="22" fill="rgba(167,139,250,0.85)" stroke="rgba(167,139,250,0.5)" stroke-width="2"/>
  </g>
  <!-- Inner highlight -->
  <circle cx="600" cy="285" r="14" fill="rgba(255,255,255,0.15)"/>
  <!-- "You" silhouette in center -->
  <circle cx="600" cy="278" r="6" fill="rgba(255,255,255,0.3)"/>
  <path d="M591,296 C591,289 595,286 600,286 C605,286 609,289 609,296" fill="rgba(255,255,255,0.25)"/>

  <!-- Hop labels -->
  <g opacity="0.5">
    <text x="735" y="170" font-family="monospace" font-size="11" fill="rgba(74,222,128,0.8)">Hop 1</text>
    <text x="830" y="115" font-family="monospace" font-size="10" fill="rgba(250,204,21,0.7)">Hop 2</text>
    <text x="905" y="60" font-family="monospace" font-size="9" fill="rgba(248,113,113,0.6)">Hop 3</text>
  </g>

</svg>