<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#312e81;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4c1d95;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:0" />
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#a78bfa" flood-opacity="0.5"/>
    </filter>
    <filter id="center-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#a78bfa" flood-opacity="0.8"/>
    </filter>
    <filter id="node-glow-green" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#4ade80" flood-opacity="0.6"/>
    </filter>
    <filter id="node-glow-yellow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#facc15" flood-opacity="0.5"/>
    </filter>
    <filter id="node-glow-red" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#f87171" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#glow)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="white" stroke-width="0.5">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="200" y1="0" x2="1200" y2="500"/>
    <line x1="0" y1="200" x2="1000" y2="630"/>
    <line x1="400" y1="0" x2="1200" y2="400"/>
    <line x1="0" y1="400" x2="800" y2="630"/>
    <line x1="1200" y1="0" x2="0" y2="630"/>
    <line x1="1000" y1="0" x2="0" y2="500"/>
    <line x1="1200" y1="200" x2="200" y2="630"/>
  </g>

  <!-- Concentric trust rings with hop-level colors -->
  <circle cx="600" cy="285" r="275" fill="none" stroke="rgba(248,113,113,0.12)" stroke-width="1.5" stroke-dasharray="4,8"/>
  <circle cx="600" cy="285" r="205" fill="none" stroke="rgba(250,204,21,0.15)" stroke-width="1.5" stroke-dasharray="4,8"/>
  <circle cx="600" cy="285" r="135" fill="none" stroke="rgba(74,222,128,0.18)" stroke-width="1.5" stroke-dasharray="4,8"/>
  <circle cx="600" cy="285" r="62" fill="none" stroke="rgba(167,139,250,0.25)" stroke-width="1.5" stroke-dasharray="4,8"/>

  <!-- Center to hop-1 connections -->
  <line x1="600" y1="285" x2="485" y2="195" stroke="rgba(74,222,128,0.5)" stroke-width="2"/>
  <line x1="600" y1="285" x2="715" y2="195" stroke="rgba(74,222,128,0.5)" stroke-width="2"/>
  <line x1="600" y1="285" x2="475" y2="340" stroke="rgba(74,222,128,0.5)" stroke-width="2"/>
  <line x1="600" y1="285" x2="725" y2="340" stroke="rgba(74,222,128,0.5)" stroke-width="2"/>
  <line x1="600" y1="285" x2="600" y2="155" stroke="rgba(74,222,128,0.5)" stroke-width="2"/>
  <line x1="600" y1="285" x2="600" y2="415" stroke="rgba(74,222,128,0.5)" stroke-width="2"/>

  <!-- Hop-1 to hop-2 connections -->
  <line x1="485" y1="195" x2="385" y2="125" stroke="rgba(250,204,21,0.35)" stroke-width="1.5"/>
  <line x1="485" y1="195" x2="405" y2="225" stroke="rgba(250,204,21,0.35)" stroke-width="1.5"/>
  <line x1="715" y1="195" x2="815" y2="125" stroke="rgba(250,204,21,0.35)" stroke-width="1.5"/>
  <line x1="715" y1="195" x2="795" y2="225" stroke="rgba(250,204,21,0.35)" stroke-width="1.5"/>
  <line x1="475" y1="340" x2="395" y2="405" stroke="rgba(250,204,21,0.35)" stroke-width="1.5"/>
  <line x1="725" y1="340" x2="805" y2="405" stroke="rgba(250,204,21,0.35)" stroke-width="1.5"/>
  <line x1="600" y1="155" x2="515" y2="95" stroke="rgba(250,204,21,0.35)" stroke-width="1.5"/>
  <line x1="600" y1="155" x2="685" y2="95" stroke="rgba(250,204,21,0.35)" stroke-width="1.5"/>
  <line x1="600" y1="415" x2="515" y2="475" stroke="rgba(250,204,21,0.35)" stroke-width="1.5"/>
  <line x1="600" y1="415" x2="685" y2="475" stroke="rgba(250,204,21,0.35)" stroke-width="1.5"/>

  <!-- Hop-2 to hop-3 connections -->
  <line x1="385" y1="125" x2="305" y2="65" stroke="rgba(248,113,113,0.2)" stroke-width="1"/>
  <line x1="385" y1="125" x2="335" y2="165" stroke="rgba(248,113,113,0.2)" stroke-width="1"/>
  <line x1="815" y1="125" x2="895" y2="65" stroke="rgba(248,113,113,0.2)" stroke-width="1"/>
  <line x1="815" y1="125" x2="865" y2="165" stroke="rgba(248,113,113,0.2)" stroke-width="1"/>
  <line x1="405" y1="225" x2="335" y2="275" stroke="rgba(248,113,113,0.2)" stroke-width="1"/>
  <line x1="795" y1="225" x2="865" y2="275" stroke="rgba(248,113,113,0.2)" stroke-width="1"/>
  <line x1="395" y1="405" x2="325" y2="465" stroke="rgba(248,113,113,0.2)" stroke-width="1"/>
  <line x1="805" y1="405" x2="875" y2="465" stroke="rgba(248,113,113,0.2)" stroke-width="1"/>
  <line x1="515" y1="95" x2="440" y2="35" stroke="rgba(248,113,113,0.2)" stroke-width="1"/>
  <line x1="685" y1="95" x2="760" y2="35" stroke="rgba(248,113,113,0.2)" stroke-width="1"/>
  <line x1="515" y1="475" x2="440" y2="545" stroke="rgba(248,113,113,0.2)" stroke-width="1"/>
  <line x1="685" y1="475" x2="760" y2="545" stroke="rgba(248,113,113,0.2)" stroke-width="1"/>

  <!-- Cross-connections -->
  <line x1="485" y1="195" x2="600" y2="155" stroke="rgba(74,222,128,0.15)" stroke-width="1"/>
  <line x1="715" y1="195" x2="600" y2="155" stroke="rgba(74,222,128,0.15)" stroke-width="1"/>
  <line x1="475" y1="340" x2="600" y2="415" stroke="rgba(74,222,128,0.15)" stroke-width="1"/>
  <line x1="725" y1="340" x2="600" y2="415" stroke="rgba(74,222,128,0.15)" stroke-width="1"/>
  <line x1="385" y1="125" x2="515" y2="95" stroke="rgba(250,204,21,0.12)" stroke-width="1"/>
  <line x1="815" y1="125" x2="685" y2="95" stroke="rgba(250,204,21,0.12)" stroke-width="1"/>

  <!-- Red hop-3 nodes -->
  <g filter="url(#node-glow-red)">
    <circle cx="305" cy="65" r="6" fill="rgba(248,113,113,0.5)" stroke="rgba(248,113,113,0.3)" stroke-width="1"/>
    <circle cx="335" cy="165" r="5" fill="rgba(248,113,113,0.45)" stroke="rgba(248,113,113,0.25)" stroke-width="1"/>
    <circle cx="895" cy="65" r="6" fill="rgba(248,113,113,0.5)" stroke="rgba(248,113,113,0.3)" stroke-width="1"/>
    <circle cx="865" cy="165" r="5" fill="rgba(248,113,113,0.45)" stroke="rgba(248,113,113,0.25)" stroke-width="1"/>
    <circle cx="335" cy="275" r="5" fill="rgba(248,113,113,0.4)" stroke="rgba(248,113,113,0.25)" stroke-width="1"/>
    <circle cx="865" cy="275" r="5" fill="rgba(248,113,113,0.4)" stroke="rgba(248,113,113,0.25)" stroke-width="1"/>
    <circle cx="325" cy="465" r="5.5" fill="rgba(248,113,113,0.45)" stroke="rgba(248,113,113,0.25)" stroke-width="1"/>
    <circle cx="875" cy="465" r="5.5" fill="rgba(248,113,113,0.45)" stroke="rgba(248,113,113,0.25)" stroke-width="1"/>
    <circle cx="440" cy="35" r="5" fill="rgba(248,113,113,0.4)" stroke="rgba(248,113,113,0.25)" stroke-width="1"/>
    <circle cx="760" cy="35" r="5" fill="rgba(248,113,113,0.4)" stroke="rgba(248,113,113,0.25)" stroke-width="1"/>
    <circle cx="440" cy="545" r="5" fill="rgba(248,113,113,0.4)" stroke="rgba(248,113,113,0.25)" stroke-width="1"/>
    <circle cx="760" cy="545" r="5" fill="rgba(248,113,113,0.4)" stroke="rgba(248,113,113,0.25)" stroke-width="1"/>
  </g>

  <!-- Yellow hop-2 nodes -->
  <g filter="url(#node-glow-yellow)">
    <circle cx="385" cy="125" r="9" fill="rgba(250,204,21,0.6)" stroke="rgba(250,204,21,0.35)" stroke-width="1.5"/>
    <circle cx="405" cy="225" r="8" fill="rgba(250,204,21,0.55)" stroke="rgba(250,204,21,0.3)" stroke-width="1.5"/>
    <circle cx="815" cy="125" r="9" fill="rgba(250,204,21,0.6)" stroke="rgba(250,204,21,0.35)" stroke-width="1.5"/>
    <circle cx="795" cy="225" r="8" fill="rgba(250,204,21,0.55)" stroke="rgba(250,204,21,0.3)" stroke-width="1.5"/>
    <circle cx="395" cy="405" r="8.5" fill="rgba(250,204,21,0.55)" stroke="rgba(250,204,21,0.3)" stroke-width="1.5"/>
    <circle cx="805" cy="405" r="8.5" fill="rgba(250,204,21,0.55)" stroke="rgba(250,204,21,0.3)" stroke-width="1.5"/>
    <circle cx="515" cy="95" r="8" fill="rgba(250,204,21,0.55)" stroke="rgba(250,204,21,0.3)" stroke-width="1.5"/>
    <circle cx="685" cy="95" r="8" fill="rgba(250,204,21,0.55)" stroke="rgba(250,204,21,0.3)" stroke-width="1.5"/>
    <circle cx="515" cy="475" r="8" fill="rgba(250,204,21,0.55)" stroke="rgba(250,204,21,0.3)" stroke-width="1.5"/>
    <circle cx="685" cy="475" r="8" fill="rgba(250,204,21,0.55)" stroke="rgba(250,204,21,0.3)" stroke-width="1.5"/>
  </g>

  <!-- Green hop-1 nodes -->
  <g filter="url(#node-glow-green)">
    <circle cx="485" cy="195" r="13" fill="rgba(74,222,128,0.7)" stroke="rgba(74,222,128,0.4)" stroke-width="2"/>
    <circle cx="715" cy="195" r="13" fill="rgba(74,222,128,0.7)" stroke="rgba(74,222,128,0.4)" stroke-width="2"/>
    <circle cx="475" cy="340" r="12" fill="rgba(74,222,128,0.65)" stroke="rgba(74,222,128,0.35)" stroke-width="2"/>
    <circle cx="725" cy="340" r="12" fill="rgba(74,222,128,0.65)" stroke="rgba(74,222,128,0.35)" stroke-width="2"/>
    <circle cx="600" cy="155" r="13" fill="rgba(74,222,128,0.7)" stroke="rgba(74,222,128,0.4)" stroke-width="2"/>
    <circle cx="600" cy="415" r="13" fill="rgba(74,222,128,0.7)" stroke="rgba(74,222,128,0.4)" stroke-width="2"/>
  </g>

  <!-- Center node -->
  <circle cx="600" cy="285" r="48" fill="rgba(167,139,250,0.08)"/>
  <circle cx="600" cy="285" r="35" fill="rgba(167,139,250,0.06)"/>
  <g filter="url(#center-glow)">
    <circle cx="600" cy="285" r="24" fill="rgba(167,139,250,0.85)" stroke="rgba(167,139,250,0.5)" stroke-width="2"/>
  </g>
  <circle cx="600" cy="285" r="15" fill="rgba(255,255,255,0.15)"/>
  <circle cx="600" cy="278" r="6.5" fill="rgba(255,255,255,0.3)"/>
  <path d="M590,297 C590,290 594,287 600,287 C606,287 610,290 610,297" fill="rgba(255,255,255,0.25)"/>

  <!-- Hop labels with slightly different positioning for OG emphasis -->
  <g opacity="0.55">
    <text x="740" y="168" font-family="monospace" font-size="12" fill="rgba(74,222,128,0.8)">Hop 1</text>
    <text x="835" y="110" font-family="monospace" font-size="11" fill="rgba(250,204,21,0.7)">Hop 2</text>
    <text x="910" y="55" font-family="monospace" font-size="10" fill="rgba(248,113,113,0.6)">Hop 3</text>
  </g>

</svg>