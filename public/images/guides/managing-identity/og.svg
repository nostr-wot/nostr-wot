<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#312e81;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4c1d95;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:0" />
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#a78bfa" flood-opacity="0.5"/>
    </filter>
    <filter id="key-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#facc15" flood-opacity="0.7"/>
    </filter>
    <filter id="shield-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#4ade80" flood-opacity="0.5"/>
    </filter>
    <filter id="element-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#a78bfa" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#glow)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="white" stroke-width="0.5">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="200" y1="0" x2="1200" y2="500"/>
    <line x1="0" y1="200" x2="1000" y2="630"/>
    <line x1="400" y1="0" x2="1200" y2="400"/>
    <line x1="0" y1="400" x2="800" y2="630"/>
    <line x1="1200" y1="0" x2="0" y2="630"/>
    <line x1="1000" y1="0" x2="0" y2="500"/>
    <line x1="1200" y1="200" x2="200" y2="630"/>
  </g>

  <!-- Trust rings -->
  <circle cx="600" cy="280" r="270" fill="none" stroke="rgba(167,139,250,0.06)" stroke-width="1" stroke-dasharray="4,8"/>
  <circle cx="600" cy="280" r="210" fill="none" stroke="rgba(167,139,250,0.10)" stroke-width="1" stroke-dasharray="4,8"/>
  <circle cx="600" cy="280" r="150" fill="none" stroke="rgba(167,139,250,0.14)" stroke-width="1" stroke-dasharray="4,8"/>

  <!-- Shield -->
  <g filter="url(#shield-glow)">
    <path d="M600,115 L705,162 L705,315 C705,388 600,440 600,440 C600,440 495,388 495,315 L495,162 Z" fill="rgba(74,222,128,0.04)" stroke="rgba(74,222,128,0.35)" stroke-width="2"/>
    <path d="M600,135 L690,175 L690,310 C690,372 600,420 600,420 C600,420 510,372 510,310 L510,175 Z" fill="rgba(74,222,128,0.03)" stroke="rgba(74,222,128,0.15)" stroke-width="1" stroke-dasharray="6,4"/>
  </g>

  <!-- Key icon -->
  <g filter="url(#key-glow)">
    <circle cx="600" cy="225" r="42" fill="rgba(250,204,21,0.12)" stroke="rgba(250,204,21,0.8)" stroke-width="2.5"/>
    <circle cx="600" cy="225" r="30" fill="none" stroke="rgba(250,204,21,0.4)" stroke-width="1.5"/>
    <circle cx="600" cy="225" r="16" fill="rgba(250,204,21,0.15)" stroke="rgba(250,204,21,0.6)" stroke-width="1"/>
    <line x1="600" y1="267" x2="600" y2="378" stroke="rgba(250,204,21,0.8)" stroke-width="3"/>
    <line x1="600" y1="335" x2="628" y2="335" stroke="rgba(250,204,21,0.8)" stroke-width="3"/>
    <line x1="628" y1="335" x2="628" y2="350" stroke="rgba(250,204,21,0.8)" stroke-width="3"/>
    <line x1="600" y1="362" x2="622" y2="362" stroke="rgba(250,204,21,0.8)" stroke-width="3"/>
    <line x1="622" y1="362" x2="622" y2="378" stroke="rgba(250,204,21,0.8)" stroke-width="3"/>
  </g>

  <!-- User avatar (left) -->
  <g filter="url(#element-glow)" opacity="0.8">
    <circle cx="375" cy="210" r="28" fill="rgba(167,139,250,0.1)" stroke="rgba(167,139,250,0.5)" stroke-width="1.5"/>
    <path d="M337,270 C337,248 355,238 375,238 C395,238 413,248 413,270" fill="none" stroke="rgba(167,139,250,0.5)" stroke-width="1.5"/>
    <line x1="413" y1="230" x2="556" y2="225" stroke="rgba(167,139,250,0.2)" stroke-width="1" stroke-dasharray="4,4"/>
  </g>

  <!-- Fingerprint (right) -->
  <g filter="url(#element-glow)" opacity="0.7" transform="translate(820, 235)">
    <ellipse cx="0" cy="0" rx="38" ry="48" fill="none" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
    <ellipse cx="0" cy="0" rx="30" ry="38" fill="none" stroke="rgba(167,139,250,0.35)" stroke-width="1"/>
    <ellipse cx="0" cy="0" rx="22" ry="28" fill="none" stroke="rgba(167,139,250,0.4)" stroke-width="1"/>
    <ellipse cx="0" cy="0" rx="14" ry="18" fill="none" stroke="rgba(167,139,250,0.45)" stroke-width="1"/>
    <ellipse cx="0" cy="0" rx="6" ry="9" fill="none" stroke="rgba(167,139,250,0.5)" stroke-width="1"/>
    <path d="M-32,-12 Q-16,-28 0,-28 Q16,-28 32,-12" fill="none" stroke="rgba(167,139,250,0.25)" stroke-width="0.8"/>
    <path d="M-27,5 Q-13,-14 0,-14 Q13,-14 27,5" fill="none" stroke="rgba(167,139,250,0.25)" stroke-width="0.8"/>
    <path d="M-30,22 Q-15,6 0,6 Q15,6 30,22" fill="none" stroke="rgba(167,139,250,0.25)" stroke-width="0.8"/>
    <line x1="-38" y1="0" x2="-178" y2="-10" stroke="rgba(167,139,250,0.2)" stroke-width="1" stroke-dasharray="4,4"/>
  </g>

  <!-- NIP-07 label -->
  <g filter="url(#element-glow)">
    <rect x="537" y="458" width="126" height="38" rx="8" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.35)" stroke-width="1.5"/>
    <text x="600" y="482" font-family="monospace" font-size="17" fill="rgba(167,139,250,0.8)" text-anchor="middle" font-weight="bold">NIP-07</text>
    <line x1="600" y1="458" x2="600" y2="388" stroke="rgba(167,139,250,0.2)" stroke-width="1" stroke-dasharray="4,4"/>
  </g>

  <!-- npub label -->
  <g filter="url(#element-glow)" opacity="0.6">
    <rect x="305" y="335" width="105" height="28" rx="6" fill="rgba(250,204,21,0.06)" stroke="rgba(250,204,21,0.3)" stroke-width="1"/>
    <text x="357" y="354" font-family="monospace" font-size="11" fill="rgba(250,204,21,0.7)" text-anchor="middle">npub1...</text>
    <line x1="410" y1="349" x2="495" y2="315" stroke="rgba(250,204,21,0.15)" stroke-width="1" stroke-dasharray="3,4"/>
  </g>

  <!-- nsec label -->
  <g filter="url(#element-glow)" opacity="0.6">
    <rect x="790" y="335" width="105" height="28" rx="6" fill="rgba(248,113,113,0.06)" stroke="rgba(248,113,113,0.3)" stroke-width="1"/>
    <text x="842" y="354" font-family="monospace" font-size="11" fill="rgba(248,113,113,0.7)" text-anchor="middle">nsec1...</text>
    <line x1="790" y1="349" x2="705" y2="315" stroke="rgba(248,113,113,0.15)" stroke-width="1" stroke-dasharray="3,4"/>
  </g>

  <!-- Lock icons -->
  <g opacity="0.4">
    <rect x="442" y="142" width="14" height="10" rx="2" fill="none" stroke="rgba(74,222,128,0.5)" stroke-width="1"/>
    <path d="M445,142 L445,137 C445,133 447,131 449,131 C451,131 453,133 453,137 L453,142" fill="none" stroke="rgba(74,222,128,0.5)" stroke-width="1"/>
    <rect x="740" y="147" width="14" height="10" rx="2" fill="none" stroke="rgba(74,222,128,0.5)" stroke-width="1"/>
    <path d="M743,147 L743,142 C743,138 745,136 747,136 C749,136 751,138 751,142 L751,147" fill="none" stroke="rgba(74,222,128,0.5)" stroke-width="1"/>
  </g>

</svg>