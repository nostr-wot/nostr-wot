<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#312e81;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4c1d95;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:0" />
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#a78bfa" flood-opacity="0.5"/>
    </filter>
    <filter id="at-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#facc15" flood-opacity="0.6"/>
    </filter>
    <filter id="bolt-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#facc15" flood-opacity="0.7"/>
    </filter>
    <filter id="envelope-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#a78bfa" flood-opacity="0.5"/>
    </filter>
    <filter id="text-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#4ade80" flood-opacity="0.5"/>
    </filter>
    <filter id="energy-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#glow)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="white" stroke-width="0.5">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="200" y1="0" x2="1200" y2="500"/>
    <line x1="0" y1="200" x2="1000" y2="630"/>
    <line x1="400" y1="0" x2="1200" y2="400"/>
    <line x1="0" y1="400" x2="800" y2="630"/>
    <line x1="1200" y1="0" x2="0" y2="630"/>
    <line x1="1000" y1="0" x2="0" y2="500"/>
    <line x1="1200" y1="200" x2="200" y2="630"/>
  </g>

  <!-- Trust rings -->
  <circle cx="600" cy="275" r="280" fill="none" stroke="rgba(167,139,250,0.06)" stroke-width="1" stroke-dasharray="4,8"/>
  <circle cx="600" cy="275" r="210" fill="none" stroke="rgba(167,139,250,0.10)" stroke-width="1" stroke-dasharray="4,8"/>
  <circle cx="600" cy="275" r="140" fill="none" stroke="rgba(167,139,250,0.14)" stroke-width="1" stroke-dasharray="4,8"/>

  <!-- ============================================ -->
  <!-- ENVELOPE SHAPE with lightning energy          -->
  <!-- ============================================ -->

  <!-- Energy particles around envelope -->
  <g opacity="0.4">
    <circle cx="380" cy="200" r="2" fill="#facc15"/>
    <circle cx="820" cy="220" r="2.5" fill="#facc15"/>
    <circle cx="410" cy="380" r="1.5" fill="#facc15"/>
    <circle cx="790" cy="370" r="2" fill="#facc15"/>
    <circle cx="450" cy="150" r="1.5" fill="#a78bfa"/>
    <circle cx="750" cy="140" r="2" fill="#a78bfa"/>
    <circle cx="350" cy="300" r="1.5" fill="#4ade80"/>
    <circle cx="850" cy="310" r="2" fill="#4ade80"/>
    <circle cx="480" cy="420" r="1.5" fill="#facc15"/>
    <circle cx="720" cy="430" r="2" fill="#facc15"/>
  </g>

  <!-- Envelope outline (email shape) -->
  <g filter="url(#envelope-glow)">
    <!-- Envelope body -->
    <rect x="400" y="200" width="400" height="260" rx="8" ry="8" fill="rgba(167,139,250,0.06)" stroke="rgba(167,139,250,0.35)" stroke-width="1.5"/>
    <!-- Envelope flap (V shape) -->
    <path d="M 400 200 L 600 340 L 800 200" fill="none" stroke="rgba(167,139,250,0.4)" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- Bottom fold lines -->
    <line x1="400" y1="460" x2="520" y2="370" stroke="rgba(167,139,250,0.2)" stroke-width="1"/>
    <line x1="800" y1="460" x2="680" y2="370" stroke="rgba(167,139,250,0.2)" stroke-width="1"/>
  </g>

  <!-- Lightning energy streaks along envelope edges -->
  <g opacity="0.5">
    <line x1="400" y1="220" x2="395" y2="240" stroke="#facc15" stroke-width="1.5"/>
    <line x1="395" y1="240" x2="400" y2="260" stroke="#facc15" stroke-width="1.5"/>
    <line x1="800" y1="230" x2="805" y2="250" stroke="#facc15" stroke-width="1.5"/>
    <line x1="805" y1="250" x2="800" y2="270" stroke="#facc15" stroke-width="1.5"/>
    <line x1="420" y1="460" x2="440" y2="455" stroke="#facc15" stroke-width="1"/>
    <line x1="760" y1="460" x2="780" y2="455" stroke="#facc15" stroke-width="1"/>
  </g>

  <!-- ============================================ -->
  <!-- CENTER: @ symbol combined with lightning bolt -->
  <!-- ============================================ -->

  <!-- Glow behind the @ -->
  <circle cx="600" cy="280" r="100" fill="rgba(250,204,21,0.06)"/>
  <circle cx="600" cy="280" r="75" fill="rgba(250,204,21,0.08)"/>
  <circle cx="600" cy="280" r="50" fill="rgba(139,92,246,0.1)"/>

  <!-- @ symbol - outer circle part -->
  <g filter="url(#at-glow)">
    <path d="M 648 280 C 648 310 628 335 600 335 C 565 335 540 310 540 280 C 540 245 565 220 600 220 C 635 220 660 245 660 280 L 660 300 C 660 315 668 320 678 315" fill="none" stroke="rgba(250,204,21,0.85)" stroke-width="4" stroke-linecap="round"/>
    <!-- Inner loop of @ -->
    <circle cx="600" cy="280" r="28" fill="none" stroke="rgba(250,204,21,0.7)" stroke-width="3"/>
  </g>

  <!-- Lightning bolt integrated into @ center -->
  <g filter="url(#bolt-glow)">
    <polygon points="606,255 590,282 602,282 587,308 618,275 605,275 618,255" fill="rgba(250,204,21,0.95)" stroke="rgba(250,204,21,0.4)" stroke-width="0.5"/>
  </g>
  <!-- Inner bolt highlight -->
  <polygon points="605,260 593,280 603,280 591,302 615,278 605,278 615,260" fill="rgba(255,255,255,0.15)"/>

  <!-- ============================================ -->
  <!-- Stylized address text                        -->
  <!-- ============================================ -->

  <g filter="url(#text-glow)">
    <text x="600" y="420" fill="rgba(74,222,128,0.7)" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle" letter-spacing="1">name@zaps.nostr-wot.com</text>
  </g>

  <!-- Decorative underline for address -->
  <line x1="420" y1="432" x2="780" y2="432" stroke="rgba(74,222,128,0.2)" stroke-width="1"/>
  <line x1="460" y1="435" x2="740" y2="435" stroke="rgba(74,222,128,0.1)" stroke-width="0.5"/>

  <!-- Small lightning accents around the address text -->
  <g filter="url(#bolt-glow)" opacity="0.6">
    <polygon points="415,412 410,418 413,418 408,424 420,416 417,416 422,412" fill="rgba(250,204,21,0.8)"/>
    <polygon points="785,412 780,418 783,418 778,424 790,416 787,416 792,412" fill="rgba(250,204,21,0.8)"/>
  </g>

  <!-- Floating energy sparks -->
  <g opacity="0.6">
    <circle cx="350" cy="180" r="3" fill="rgba(250,204,21,0.5)">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="850" cy="190" r="3" fill="rgba(250,204,21,0.5)">
      <animate attributeName="opacity" values="0.5;0.2;0.5" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="350" r="2.5" fill="rgba(167,139,250,0.5)">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="900" cy="340" r="2.5" fill="rgba(167,139,250,0.5)">
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>

</svg>