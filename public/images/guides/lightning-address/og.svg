<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#312e81;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4c1d95;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:0" />
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#a78bfa" flood-opacity="0.5"/>
    </filter>
    <filter id="at-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="14" flood-color="#facc15" flood-opacity="0.65"/>
    </filter>
    <filter id="bolt-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#facc15" flood-opacity="0.7"/>
    </filter>
    <filter id="envelope-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#a78bfa" flood-opacity="0.5"/>
    </filter>
    <filter id="text-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#4ade80" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#glow)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="white" stroke-width="0.5">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="200" y1="0" x2="1200" y2="500"/>
    <line x1="0" y1="200" x2="1000" y2="630"/>
    <line x1="400" y1="0" x2="1200" y2="400"/>
    <line x1="0" y1="400" x2="800" y2="630"/>
    <line x1="1200" y1="0" x2="0" y2="630"/>
    <line x1="1000" y1="0" x2="0" y2="500"/>
    <line x1="1200" y1="200" x2="200" y2="630"/>
  </g>

  <!-- Trust rings -->
  <circle cx="600" cy="275" r="280" fill="none" stroke="rgba(167,139,250,0.06)" stroke-width="1" stroke-dasharray="4,8"/>
  <circle cx="600" cy="275" r="210" fill="none" stroke="rgba(167,139,250,0.10)" stroke-width="1" stroke-dasharray="4,8"/>
  <circle cx="600" cy="275" r="140" fill="none" stroke="rgba(167,139,250,0.14)" stroke-width="1" stroke-dasharray="4,8"/>

  <!-- Energy particles -->
  <g opacity="0.4">
    <circle cx="360" cy="180" r="3" fill="#facc15"/>
    <circle cx="840" cy="195" r="3" fill="#facc15"/>
    <circle cx="390" cy="400" r="2" fill="#facc15"/>
    <circle cx="810" cy="390" r="2.5" fill="#facc15"/>
    <circle cx="430" cy="130" r="2" fill="#a78bfa"/>
    <circle cx="770" cy="125" r="2.5" fill="#a78bfa"/>
    <circle cx="330" cy="320" r="2" fill="#4ade80"/>
    <circle cx="870" cy="330" r="2.5" fill="#4ade80"/>
    <circle cx="460" cy="440" r="2" fill="#facc15"/>
    <circle cx="740" cy="450" r="2.5" fill="#facc15"/>
    <circle cx="280" cy="250" r="1.5" fill="#a78bfa"/>
    <circle cx="920" cy="240" r="1.5" fill="#a78bfa"/>
  </g>

  <!-- Envelope outline -->
  <g filter="url(#envelope-glow)">
    <rect x="385" y="185" width="430" height="280" rx="8" ry="8" fill="rgba(167,139,250,0.06)" stroke="rgba(167,139,250,0.35)" stroke-width="1.5"/>
    <path d="M 385 185 L 600 335 L 815 185" fill="none" stroke="rgba(167,139,250,0.4)" stroke-width="1.5" stroke-linejoin="round"/>
    <line x1="385" y1="465" x2="510" y2="375" stroke="rgba(167,139,250,0.2)" stroke-width="1"/>
    <line x1="815" y1="465" x2="690" y2="375" stroke="rgba(167,139,250,0.2)" stroke-width="1"/>
  </g>

  <!-- Lightning energy along edges -->
  <g opacity="0.5">
    <line x1="385" y1="205" x2="380" y2="228" stroke="#facc15" stroke-width="1.5"/>
    <line x1="380" y1="228" x2="385" y2="250" stroke="#facc15" stroke-width="1.5"/>
    <line x1="385" y1="330" x2="380" y2="350" stroke="#facc15" stroke-width="1"/>
    <line x1="815" y1="215" x2="820" y2="238" stroke="#facc15" stroke-width="1.5"/>
    <line x1="820" y1="238" x2="815" y2="260" stroke="#facc15" stroke-width="1.5"/>
    <line x1="815" y1="340" x2="820" y2="360" stroke="#facc15" stroke-width="1"/>
    <line x1="405" y1="465" x2="425" y2="460" stroke="#facc15" stroke-width="1"/>
    <line x1="795" y1="465" x2="775" y2="460" stroke="#facc15" stroke-width="1"/>
  </g>

  <!-- Center glow -->
  <circle cx="600" cy="275" r="105" fill="rgba(250,204,21,0.06)"/>
  <circle cx="600" cy="275" r="80" fill="rgba(250,204,21,0.08)"/>
  <circle cx="600" cy="275" r="55" fill="rgba(139,92,246,0.1)"/>

  <!-- @ symbol -->
  <g filter="url(#at-glow)">
    <path d="M 652 275 C 652 308 630 340 600 340 C 562 340 537 308 537 275 C 537 240 562 215 600 215 C 638 215 663 240 663 275 L 663 295 C 663 310 672 316 682 310" fill="none" stroke="rgba(250,204,21,0.85)" stroke-width="4.5" stroke-linecap="round"/>
    <circle cx="600" cy="275" r="30" fill="none" stroke="rgba(250,204,21,0.7)" stroke-width="3"/>
  </g>

  <!-- Lightning bolt in @ -->
  <g filter="url(#bolt-glow)">
    <polygon points="608,248 592,278 604,278 588,310 622,270 608,270 622,248" fill="rgba(250,204,21,0.95)" stroke="rgba(250,204,21,0.4)" stroke-width="0.5"/>
  </g>
  <polygon points="607,253 594,276 605,276 591,304 619,273 608,273 619,253" fill="rgba(255,255,255,0.15)"/>

  <!-- Address text with emphasis -->
  <g filter="url(#text-glow)">
    <text x="600" y="425" fill="rgba(74,222,128,0.75)" font-family="monospace" font-size="22" font-weight="bold" text-anchor="middle" letter-spacing="1.5">name@zaps.nostr-wot.com</text>
  </g>

  <!-- Decorative underlines -->
  <line x1="400" y1="438" x2="800" y2="438" stroke="rgba(74,222,128,0.2)" stroke-width="1"/>
  <line x1="440" y1="442" x2="760" y2="442" stroke="rgba(74,222,128,0.1)" stroke-width="0.5"/>

  <!-- Lightning accents around address -->
  <g filter="url(#bolt-glow)" opacity="0.6">
    <polygon points="395,418 390,424 393,424 388,430 400,422 397,422 402,418" fill="rgba(250,204,21,0.8)"/>
    <polygon points="805,418 800,424 803,424 798,430 810,422 807,422 812,418" fill="rgba(250,204,21,0.8)"/>
  </g>

  <!-- Floating sparks -->
  <g opacity="0.6">
    <circle cx="330" cy="170" r="3" fill="rgba(250,204,21,0.5)"/>
    <circle cx="870" cy="180" r="3" fill="rgba(250,204,21,0.5)"/>
    <circle cx="280" cy="360" r="2.5" fill="rgba(167,139,250,0.5)"/>
    <circle cx="920" cy="350" r="2.5" fill="rgba(167,139,250,0.5)"/>
  </g>

</svg>