<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="win-og-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#312e81;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4c1d95;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="win-og-glow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:0" />
    </radialGradient>
    <filter id="win-og-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#a78bfa" flood-opacity="0.5"/>
    </filter>
    <filter id="win-og-user-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#a78bfa" flood-opacity="0.7"/>
    </filter>
    <filter id="win-og-relay-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#4ade80" flood-opacity="0.5"/>
    </filter>
    <filter id="win-og-node-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#4ade80" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#win-og-bg)"/>
  <rect width="100%" height="100%" fill="url(#win-og-glow)"/>

  <!-- Subtle grid -->
  <g opacity="0.05" stroke="white" stroke-width="0.5">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="200" y1="0" x2="1200" y2="500"/>
    <line x1="0" y1="200" x2="1000" y2="630"/>
    <line x1="400" y1="0" x2="1200" y2="400"/>
    <line x1="0" y1="400" x2="800" y2="630"/>
    <line x1="1200" y1="0" x2="0" y2="630"/>
    <line x1="1000" y1="0" x2="0" y2="500"/>
    <line x1="1200" y1="200" x2="200" y2="630"/>
  </g>

  <!-- Trust rings -->
  <circle cx="600" cy="290" r="270" fill="none" stroke="rgba(167,139,250,0.06)" stroke-width="1" stroke-dasharray="4,8"/>
  <circle cx="600" cy="290" r="210" fill="none" stroke="rgba(167,139,250,0.10)" stroke-width="1" stroke-dasharray="4,8"/>
  <circle cx="600" cy="290" r="150" fill="none" stroke="rgba(167,139,250,0.14)" stroke-width="1" stroke-dasharray="4,8"/>

  <!-- Outer network nodes -->
  <g filter="url(#win-og-node-glow)">
    <circle cx="190" cy="170" r="2.5" fill="rgba(248,113,113,0.5)"/>
    <circle cx="1010" cy="190" r="2.5" fill="rgba(248,113,113,0.5)"/>
    <circle cx="170" cy="500" r="2.5" fill="rgba(248,113,113,0.4)"/>
    <circle cx="1030" cy="480" r="2.5" fill="rgba(248,113,113,0.4)"/>
    <circle cx="460" cy="65" r="3" fill="rgba(250,204,21,0.6)"/>
    <circle cx="750" cy="60" r="3" fill="rgba(250,204,21,0.6)"/>
    <circle cx="450" cy="570" r="3" fill="rgba(250,204,21,0.5)"/>
    <circle cx="760" cy="565" r="3" fill="rgba(250,204,21,0.5)"/>
  </g>

  <!-- Central user node — slightly larger for OG -->
  <g filter="url(#win-og-user-glow)">
    <circle cx="600" cy="265" r="25" fill="rgba(167,139,250,0.25)" stroke="rgba(167,139,250,0.85)" stroke-width="2.5"/>
    <circle cx="600" cy="256" r="10" fill="none" stroke="rgba(167,139,250,0.85)" stroke-width="2"/>
    <path d="M582,278 C582,270 589,266 600,266 C611,266 618,270 618,278" fill="none" stroke="rgba(167,139,250,0.85)" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Broadcast signal rings -->
  <circle cx="600" cy="265" r="48" fill="none" stroke="rgba(167,139,250,0.2)" stroke-width="1" stroke-dasharray="3,5"/>
  <circle cx="600" cy="265" r="70" fill="none" stroke="rgba(167,139,250,0.12)" stroke-width="1" stroke-dasharray="3,5"/>

  <!-- Relay 1: top -->
  <g filter="url(#win-og-relay-glow)">
    <circle cx="600" cy="115" r="22" fill="rgba(74,222,128,0.1)" stroke="rgba(74,222,128,0.6)" stroke-width="1.5"/>
    <rect x="590" y="106" width="20" height="18" rx="2" fill="none" stroke="rgba(74,222,128,0.7)" stroke-width="1.2"/>
    <line x1="594" y1="112" x2="606" y2="112" stroke="rgba(74,222,128,0.5)" stroke-width="1"/>
    <line x1="594" y1="117" x2="604" y2="117" stroke="rgba(74,222,128,0.4)" stroke-width="1"/>
  </g>
  <line x1="600" y1="240" x2="600" y2="137" stroke="rgba(74,222,128,0.3)" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Relay 2: top-right -->
  <g filter="url(#win-og-relay-glow)">
    <circle cx="790" cy="165" r="22" fill="rgba(74,222,128,0.1)" stroke="rgba(74,222,128,0.6)" stroke-width="1.5"/>
    <rect x="780" y="156" width="20" height="18" rx="2" fill="none" stroke="rgba(74,222,128,0.7)" stroke-width="1.2"/>
    <line x1="784" y1="162" x2="796" y2="162" stroke="rgba(74,222,128,0.5)" stroke-width="1"/>
    <line x1="784" y1="167" x2="794" y2="167" stroke="rgba(74,222,128,0.4)" stroke-width="1"/>
  </g>
  <line x1="622" y1="252" x2="770" y2="178" stroke="rgba(74,222,128,0.3)" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Relay 3: right -->
  <g filter="url(#win-og-relay-glow)">
    <circle cx="870" cy="325" r="22" fill="rgba(74,222,128,0.1)" stroke="rgba(74,222,128,0.6)" stroke-width="1.5"/>
    <rect x="860" y="316" width="20" height="18" rx="2" fill="none" stroke="rgba(74,222,128,0.7)" stroke-width="1.2"/>
    <line x1="864" y1="322" x2="876" y2="322" stroke="rgba(74,222,128,0.5)" stroke-width="1"/>
    <line x1="864" y1="327" x2="874" y2="327" stroke="rgba(74,222,128,0.4)" stroke-width="1"/>
  </g>
  <line x1="625" y1="270" x2="848" y2="320" stroke="rgba(74,222,128,0.3)" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Relay 4: bottom-right -->
  <g filter="url(#win-og-relay-glow)">
    <circle cx="770" cy="460" r="22" fill="rgba(74,222,128,0.1)" stroke="rgba(74,222,128,0.6)" stroke-width="1.5"/>
    <rect x="760" y="451" width="20" height="18" rx="2" fill="none" stroke="rgba(74,222,128,0.7)" stroke-width="1.2"/>
    <line x1="764" y1="457" x2="776" y2="457" stroke="rgba(74,222,128,0.5)" stroke-width="1"/>
    <line x1="764" y1="462" x2="774" y2="462" stroke="rgba(74,222,128,0.4)" stroke-width="1"/>
  </g>
  <line x1="617" y1="283" x2="752" y2="445" stroke="rgba(74,222,128,0.3)" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Relay 5: bottom-left -->
  <g filter="url(#win-og-relay-glow)">
    <circle cx="430" cy="460" r="22" fill="rgba(74,222,128,0.1)" stroke="rgba(74,222,128,0.6)" stroke-width="1.5"/>
    <rect x="420" y="451" width="20" height="18" rx="2" fill="none" stroke="rgba(74,222,128,0.7)" stroke-width="1.2"/>
    <line x1="424" y1="457" x2="436" y2="457" stroke="rgba(74,222,128,0.5)" stroke-width="1"/>
    <line x1="424" y1="462" x2="434" y2="462" stroke="rgba(74,222,128,0.4)" stroke-width="1"/>
  </g>
  <line x1="583" y1="283" x2="448" y2="445" stroke="rgba(74,222,128,0.3)" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Relay 6: left -->
  <g filter="url(#win-og-relay-glow)">
    <circle cx="330" cy="325" r="22" fill="rgba(74,222,128,0.1)" stroke="rgba(74,222,128,0.6)" stroke-width="1.5"/>
    <rect x="320" y="316" width="20" height="18" rx="2" fill="none" stroke="rgba(74,222,128,0.7)" stroke-width="1.2"/>
    <line x1="324" y1="322" x2="336" y2="322" stroke="rgba(74,222,128,0.5)" stroke-width="1"/>
    <line x1="324" y1="327" x2="334" y2="327" stroke="rgba(74,222,128,0.4)" stroke-width="1"/>
  </g>
  <line x1="575" y1="270" x2="352" y2="320" stroke="rgba(74,222,128,0.3)" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Relay 7: top-left -->
  <g filter="url(#win-og-relay-glow)">
    <circle cx="410" cy="165" r="22" fill="rgba(74,222,128,0.1)" stroke="rgba(74,222,128,0.6)" stroke-width="1.5"/>
    <rect x="400" y="156" width="20" height="18" rx="2" fill="none" stroke="rgba(74,222,128,0.7)" stroke-width="1.2"/>
    <line x1="404" y1="162" x2="416" y2="162" stroke="rgba(74,222,128,0.5)" stroke-width="1"/>
    <line x1="404" y1="167" x2="414" y2="167" stroke="rgba(74,222,128,0.4)" stroke-width="1"/>
  </g>
  <line x1="578" y1="252" x2="430" y2="178" stroke="rgba(74,222,128,0.3)" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Sparkles -->
  <g opacity="0.8">
    <line x1="645" y1="100" x2="645" y2="85" stroke="rgba(74,222,128,0.7)" stroke-width="1.5"/>
    <line x1="637" y1="92" x2="653" y2="92" stroke="rgba(74,222,128,0.7)" stroke-width="1.5"/>
    <line x1="370" y1="150" x2="370" y2="138" stroke="rgba(250,204,21,0.6)" stroke-width="1.5"/>
    <line x1="364" y1="144" x2="376" y2="144" stroke="rgba(250,204,21,0.6)" stroke-width="1.5"/>
    <line x1="905" y1="345" x2="905" y2="358" stroke="rgba(167,139,250,0.7)" stroke-width="1.5"/>
    <line x1="898" y1="351" x2="912" y2="351" stroke="rgba(167,139,250,0.7)" stroke-width="1.5"/>
    <circle cx="300" cy="355" r="2" fill="rgba(74,222,128,0.6)"/>
    <circle cx="830" cy="155" r="2" fill="rgba(250,204,21,0.6)"/>
    <circle cx="490" cy="490" r="2" fill="rgba(167,139,250,0.5)"/>
  </g>

</svg>