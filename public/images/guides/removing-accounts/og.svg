<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#312e81;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4c1d95;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.35" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:0" />
    </radialGradient>
    <filter id="cross-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="14" flood-color="#f87171" flood-opacity="0.75"/>
    </filter>
    <filter id="card-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#a78bfa" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#glow)"/>

  <!-- Subtle grid -->
  <g opacity="0.05" stroke="white" stroke-width="0.5">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="1200" y1="0" x2="0" y2="630"/>
  </g>

  <!-- Left: Title text -->
  <g>
    <text x="80" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="64" fill="white" font-weight="800">Removing</text>
    <text x="80" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="64" fill="white" font-weight="800">an Account</text>
    <text x="80" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="rgba(167,139,250,0.85)" font-weight="500">Nostr WoT Extension Guide</text>

    <!-- Nostr WoT bar -->
    <rect x="80" y="450" width="230" height="42" rx="8" fill="rgba(167,139,250,0.1)" stroke="rgba(167,139,250,0.45)" stroke-width="1.5"/>
    <text x="195" y="477" font-family="monospace" font-size="16" fill="rgba(167,139,250,0.9)" text-anchor="middle" font-weight="bold">nostr-wot.com</text>
  </g>

  <!-- Right: big cross in account row -->
  <g transform="translate(750, 190)">
    <g filter="url(#card-glow)">
      <rect x="0" y="0" width="390" height="100" rx="16" fill="rgba(248,113,113,0.1)" stroke="rgba(248,113,113,0.65)" stroke-width="2.5"/>
      <circle cx="55" cy="50" r="26" fill="rgba(248,113,113,0.16)" stroke="rgba(248,113,113,0.8)" stroke-width="2"/>
      <rect x="95" y="34" width="180" height="12" rx="3" fill="rgba(248,113,113,0.6)"/>
      <rect x="95" y="54" width="140" height="10" rx="3" fill="rgba(248,113,113,0.35)"/>
    </g>
    <g filter="url(#cross-glow)" transform="translate(340, 50)">
      <circle cx="0" cy="0" r="28" fill="rgba(248,113,113,0.18)" stroke="rgba(248,113,113,0.95)" stroke-width="2.5"/>
      <line x1="-13" y1="-13" x2="13" y2="13" stroke="rgba(248,113,113,1)" stroke-width="4" stroke-linecap="round"/>
      <line x1="13" y1="-13" x2="-13" y2="13" stroke="rgba(248,113,113,1)" stroke-width="4" stroke-linecap="round"/>
    </g>
  </g>

  <!-- REMOVE badge -->
  <g filter="url(#cross-glow)" transform="translate(750, 340)">
    <rect x="0" y="0" width="390" height="72" rx="12" fill="rgba(248,113,113,0.1)" stroke="rgba(248,113,113,0.85)" stroke-width="3"/>
    <text x="195" y="49" font-family="monospace" font-size="32" fill="rgba(248,113,113,0.98)" text-anchor="middle" font-weight="bold" letter-spacing="6">REMOVE</text>
    <line x1="360" y1="18" x2="360" y2="54" stroke="rgba(248,113,113,0.7)" stroke-width="2.5"/>
  </g>

  <!-- Dashed connector -->
  <line x1="1090" y1="290" x2="1045" y2="340" stroke="rgba(248,113,113,0.3)" stroke-width="1.2" stroke-dasharray="5,5"/>

  <!-- Bottom strip -->
  <text x="750" y="478" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="rgba(167,139,250,0.75)" font-weight="500">Seed-based accounts require typing REMOVE</text>
</svg>
