<svg width="800" height="450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#312e81;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4c1d95;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="43%" r="45%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:0" />
    </radialGradient>
    <filter id="cross-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#f87171" flood-opacity="0.7"/>
    </filter>
    <filter id="card-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#a78bfa" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#glow)"/>

  <!-- Accounts list frame -->
  <g filter="url(#card-glow)">
    <rect x="220" y="70" width="360" height="310" rx="14" fill="rgba(30,27,75,0.55)" stroke="rgba(167,139,250,0.45)" stroke-width="2"/>
    <text x="400" y="105" font-family="monospace" font-size="15" fill="rgba(167,139,250,0.85)" text-anchor="middle" font-weight="bold">ACCOUNTS</text>
    <line x1="250" y1="120" x2="550" y2="120" stroke="rgba(167,139,250,0.25)" stroke-width="1"/>
  </g>

  <!-- Account row 1 -->
  <g opacity="0.75">
    <rect x="250" y="140" width="300" height="48" rx="8" fill="rgba(167,139,250,0.06)" stroke="rgba(167,139,250,0.25)" stroke-width="1"/>
    <circle cx="278" cy="164" r="14" fill="rgba(250,204,21,0.12)" stroke="rgba(250,204,21,0.5)" stroke-width="1.5"/>
    <rect x="305" y="154" width="140" height="8" rx="3" fill="rgba(167,139,250,0.35)"/>
    <rect x="305" y="168" width="90" height="6" rx="3" fill="rgba(167,139,250,0.2)"/>
  </g>

  <!-- Account row 2 (being removed) -->
  <g filter="url(#card-glow)">
    <rect x="250" y="200" width="300" height="56" rx="8" fill="rgba(248,113,113,0.08)" stroke="rgba(248,113,113,0.6)" stroke-width="2"/>
    <circle cx="278" cy="228" r="15" fill="rgba(248,113,113,0.14)" stroke="rgba(248,113,113,0.7)" stroke-width="1.5"/>
    <rect x="307" y="218" width="140" height="9" rx="3" fill="rgba(248,113,113,0.55)"/>
    <rect x="307" y="233" width="100" height="7" rx="3" fill="rgba(248,113,113,0.3)"/>

    <g filter="url(#cross-glow)" transform="translate(520, 228)">
      <circle cx="0" cy="0" r="15" fill="rgba(248,113,113,0.15)" stroke="rgba(248,113,113,0.85)" stroke-width="1.5"/>
      <line x1="-7" y1="-7" x2="7" y2="7" stroke="rgba(248,113,113,1)" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="7" y1="-7" x2="-7" y2="7" stroke="rgba(248,113,113,1)" stroke-width="2.5" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Account row 3 -->
  <g opacity="0.55">
    <rect x="250" y="268" width="300" height="48" rx="8" fill="rgba(167,139,250,0.06)" stroke="rgba(167,139,250,0.25)" stroke-width="1"/>
    <circle cx="278" cy="292" r="14" fill="rgba(74,222,128,0.12)" stroke="rgba(74,222,128,0.5)" stroke-width="1.5"/>
    <rect x="305" y="282" width="110" height="8" rx="3" fill="rgba(167,139,250,0.3)"/>
    <rect x="305" y="296" width="70" height="6" rx="3" fill="rgba(167,139,250,0.18)"/>
  </g>

  <!-- REMOVE badge -->
  <g filter="url(#cross-glow)">
    <rect x="310" y="330" width="180" height="46" rx="8" fill="rgba(248,113,113,0.1)" stroke="rgba(248,113,113,0.8)" stroke-width="2"/>
    <text x="400" y="360" font-family="monospace" font-size="20" fill="rgba(248,113,113,0.95)" text-anchor="middle" font-weight="bold" letter-spacing="3">REMOVE</text>
  </g>
  <line x1="492" y1="340" x2="492" y2="368" stroke="rgba(248,113,113,0.7)" stroke-width="2"/>

  <!-- Dashed connector -->
  <line x1="520" y1="250" x2="480" y2="330" stroke="rgba(248,113,113,0.25)" stroke-width="1" stroke-dasharray="3,4"/>
</svg>
