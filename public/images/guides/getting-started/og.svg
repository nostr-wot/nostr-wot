<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#312e81;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4c1d95;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:0" />
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#a78bfa" flood-opacity="0.5"/>
    </filter>
    <filter id="puzzle-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#a78bfa" flood-opacity="0.7"/>
    </filter>
    <filter id="node-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#4ade80" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#glow)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="white" stroke-width="0.5">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="200" y1="0" x2="1200" y2="500"/>
    <line x1="0" y1="200" x2="1000" y2="630"/>
    <line x1="400" y1="0" x2="1200" y2="400"/>
    <line x1="0" y1="400" x2="800" y2="630"/>
    <line x1="1200" y1="0" x2="0" y2="630"/>
    <line x1="1000" y1="0" x2="0" y2="500"/>
    <line x1="1200" y1="200" x2="200" y2="630"/>
  </g>

  <!-- Trust rings -->
  <circle cx="600" cy="280" r="270" fill="none" stroke="rgba(167,139,250,0.06)" stroke-width="1" stroke-dasharray="4,8"/>
  <circle cx="600" cy="280" r="210" fill="none" stroke="rgba(167,139,250,0.10)" stroke-width="1" stroke-dasharray="4,8"/>
  <circle cx="600" cy="280" r="150" fill="none" stroke="rgba(167,139,250,0.14)" stroke-width="1" stroke-dasharray="4,8"/>

  <!-- Connection nodes -->
  <g filter="url(#node-glow)">
    <circle cx="340" cy="150" r="4" fill="rgba(74,222,128,0.7)"/>
    <circle cx="270" cy="290" r="3" fill="rgba(74,222,128,0.5)"/>
    <circle cx="380" cy="440" r="3.5" fill="rgba(74,222,128,0.6)"/>
    <circle cx="860" cy="170" r="4" fill="rgba(74,222,128,0.7)"/>
    <circle cx="930" cy="300" r="3" fill="rgba(74,222,128,0.5)"/>
    <circle cx="820" cy="450" r="3.5" fill="rgba(74,222,128,0.6)"/>
    <circle cx="440" cy="95" r="3" fill="rgba(250,204,21,0.6)"/>
    <circle cx="760" cy="85" r="3" fill="rgba(250,204,21,0.6)"/>
    <circle cx="460" cy="520" r="3" fill="rgba(250,204,21,0.5)"/>
    <circle cx="740" cy="530" r="3" fill="rgba(250,204,21,0.5)"/>
    <!-- Extra outer nodes -->
    <circle cx="180" cy="180" r="2.5" fill="rgba(248,113,113,0.5)"/>
    <circle cx="1020" cy="200" r="2.5" fill="rgba(248,113,113,0.5)"/>
    <circle cx="200" cy="480" r="2.5" fill="rgba(248,113,113,0.4)"/>
    <circle cx="1000" cy="460" r="2.5" fill="rgba(248,113,113,0.4)"/>
  </g>

  <!-- Connection lines -->
  <line x1="340" y1="150" x2="465" y2="200" stroke="rgba(74,222,128,0.25)" stroke-width="1"/>
  <line x1="270" y1="290" x2="425" y2="290" stroke="rgba(74,222,128,0.2)" stroke-width="1"/>
  <line x1="860" y1="170" x2="735" y2="200" stroke="rgba(74,222,128,0.25)" stroke-width="1"/>
  <line x1="930" y1="300" x2="775" y2="290" stroke="rgba(74,222,128,0.2)" stroke-width="1"/>
  <line x1="180" y1="180" x2="340" y2="150" stroke="rgba(248,113,113,0.15)" stroke-width="1"/>
  <line x1="1020" y1="200" x2="860" y2="170" stroke="rgba(248,113,113,0.15)" stroke-width="1"/>

  <!-- Browser window -->
  <g filter="url(#shadow)">
    <rect x="385" y="130" width="430" height="340" rx="12" ry="12" fill="none" stroke="rgba(167,139,250,0.4)" stroke-width="2"/>
    <rect x="385" y="130" width="430" height="42" rx="12" ry="12" fill="rgba(167,139,250,0.08)"/>
    <rect x="385" y="160" width="430" height="12" fill="rgba(167,139,250,0.08)"/>
    <circle cx="410" cy="151" r="5" fill="rgba(248,113,113,0.6)"/>
    <circle cx="430" cy="151" r="5" fill="rgba(250,204,21,0.6)"/>
    <circle cx="450" cy="151" r="5" fill="rgba(74,222,128,0.6)"/>
    <rect x="475" y="142" width="210" height="20" rx="4" fill="rgba(167,139,250,0.06)" stroke="rgba(167,139,250,0.15)" stroke-width="1"/>
    <text x="495" y="156" font-family="monospace" font-size="9" fill="rgba(167,139,250,0.4)">chrome://extensions</text>
  </g>

  <!-- Extension toolbar slot -->
  <g opacity="0.3">
    <rect x="700" y="143" width="14" height="14" rx="2" fill="rgba(167,139,250,0.3)" stroke="rgba(167,139,250,0.2)" stroke-width="0.5"/>
    <rect x="720" y="143" width="14" height="14" rx="2" fill="rgba(167,139,250,0.3)" stroke="rgba(167,139,250,0.2)" stroke-width="0.5"/>
    <rect x="740" y="143" width="14" height="14" rx="2" fill="rgba(74,222,128,0.15)" stroke="rgba(74,222,128,0.5)" stroke-width="1"/>
  </g>

  <!-- Puzzle piece -->
  <g filter="url(#puzzle-glow)">
    <path d="M580,240 L580,218 C580,218 569,213 569,202 C569,191 580,186 591,186 C602,186 613,191 613,202 C613,213 602,218 602,218 L602,240 L635,240 C635,240 640,229 651,229 C662,229 667,240 667,251 C667,262 662,272 651,272 C640,272 635,262 635,262 L635,285 L602,285 C602,285 602,296 613,301 C613,301 602,308 591,308 C580,308 569,301 569,301 C580,296 580,285 580,285 L548,285 L548,262 C548,262 537,262 537,251 C537,240 548,240 548,240 Z" fill="rgba(167,139,250,0.85)" stroke="rgba(167,139,250,0.4)" stroke-width="1.5"/>
    <path d="M585,245 L585,226 C585,226 577,222 577,213 C577,204 585,200 593,200 C601,200 607,204 607,213 C607,222 600,226 600,226 L600,245 L627,245 C627,245 631,237 639,237 C647,237 651,245 651,253 C651,261 647,268 639,268 C631,268 627,260 627,260 L627,279 L600,279 C600,279 600,288 607,292 C607,292 600,297 593,297 C586,297 579,292 579,292 C586,288 586,279 586,279 L558,279 L558,265 C558,265 550,265 550,257 C550,249 558,245 558,245 Z" fill="rgba(255,255,255,0.08)"/>
  </g>

  <!-- Snap effect -->
  <circle cx="597" cy="260" r="58" fill="none" stroke="rgba(74,222,128,0.3)" stroke-width="1.5" stroke-dasharray="6,4"/>
  <circle cx="597" cy="260" r="75" fill="none" stroke="rgba(74,222,128,0.15)" stroke-width="1" stroke-dasharray="3,6"/>

  <!-- Sparkles -->
  <g opacity="0.8">
    <line x1="672" y1="208" x2="672" y2="193" stroke="rgba(74,222,128,0.7)" stroke-width="1.5"/>
    <line x1="664" y1="200" x2="680" y2="200" stroke="rgba(74,222,128,0.7)" stroke-width="1.5"/>
    <line x1="528" y1="205" x2="528" y2="193" stroke="rgba(250,204,21,0.6)" stroke-width="1.5"/>
    <line x1="522" y1="199" x2="534" y2="199" stroke="rgba(250,204,21,0.6)" stroke-width="1.5"/>
    <line x1="680" y1="300" x2="680" y2="313" stroke="rgba(167,139,250,0.7)" stroke-width="1.5"/>
    <line x1="673" y1="306" x2="687" y2="306" stroke="rgba(167,139,250,0.7)" stroke-width="1.5"/>
    <circle cx="518" cy="325" r="2" fill="rgba(74,222,128,0.6)"/>
    <circle cx="695" cy="235" r="2" fill="rgba(250,204,21,0.6)"/>
  </g>

  <!-- Arrow indicating snap -->
  <g opacity="0.6">
    <line x1="505" y1="360" x2="555" y2="312" stroke="rgba(74,222,128,0.5)" stroke-width="2" stroke-dasharray="4,3"/>
    <polygon points="555,312 543,317 550,324" fill="rgba(74,222,128,0.5)"/>
  </g>

  <!-- Content placeholders -->
  <g opacity="0.15">
    <rect x="415" y="340" width="170" height="6" rx="3" fill="rgba(167,139,250,0.5)"/>
    <rect x="415" y="355" width="130" height="6" rx="3" fill="rgba(167,139,250,0.4)"/>
    <rect x="415" y="370" width="190" height="6" rx="3" fill="rgba(167,139,250,0.3)"/>
    <rect x="415" y="420" width="360" height="26" rx="6" fill="rgba(74,222,128,0.1)" stroke="rgba(74,222,128,0.3)" stroke-width="1"/>
    <text x="530" y="438" font-family="sans-serif" font-size="11" fill="rgba(74,222,128,0.5)">Install Extension</text>
  </g>

</svg>