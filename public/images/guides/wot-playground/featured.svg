<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#312e81;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4c1d95;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:0" />
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#a78bfa" flood-opacity="0.5"/>
    </filter>
    <filter id="node-glow-green" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#4ade80" flood-opacity="0.5"/>
    </filter>
    <filter id="node-glow-yellow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#facc15" flood-opacity="0.5"/>
    </filter>
    <filter id="node-glow-purple" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#a78bfa" flood-opacity="0.5"/>
    </filter>
    <filter id="node-glow-red" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#f87171" flood-opacity="0.4"/>
    </filter>
    <filter id="magnify-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#a78bfa" flood-opacity="0.5"/>
    </filter>
    <filter id="ui-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#a78bfa" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#glow)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="white" stroke-width="0.5">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="200" y1="0" x2="1200" y2="500"/>
    <line x1="0" y1="200" x2="1000" y2="630"/>
    <line x1="400" y1="0" x2="1200" y2="400"/>
    <line x1="0" y1="400" x2="800" y2="630"/>
    <line x1="1200" y1="0" x2="0" y2="630"/>
    <line x1="1000" y1="0" x2="0" y2="500"/>
    <line x1="1200" y1="200" x2="200" y2="630"/>
  </g>

  <!-- Trust rings -->
  <circle cx="560" cy="300" r="280" fill="none" stroke="rgba(167,139,250,0.06)" stroke-width="1" stroke-dasharray="4,8"/>
  <circle cx="560" cy="300" r="210" fill="none" stroke="rgba(167,139,250,0.10)" stroke-width="1" stroke-dasharray="4,8"/>
  <circle cx="560" cy="300" r="140" fill="none" stroke="rgba(167,139,250,0.14)" stroke-width="1" stroke-dasharray="4,8"/>

  <!-- ============================================ -->
  <!-- GRAPH VISUALIZATION - Nodes and Edges        -->
  <!-- ============================================ -->

  <!-- Edge connections (drawn first, behind nodes) -->
  <!-- Core connections (green, inner ring) -->
  <g stroke="rgba(74,222,128,0.4)" stroke-width="2">
    <line x1="560" y1="280" x2="480" y2="200"/>
    <line x1="560" y1="280" x2="660" y2="210"/>
    <line x1="560" y1="280" x2="450" y2="340"/>
    <line x1="560" y1="280" x2="680" y2="350"/>
    <line x1="560" y1="280" x2="520" y2="400"/>
    <line x1="560" y1="280" x2="620" y2="410"/>
    <line x1="560" y1="280" x2="560" y2="170"/>
  </g>

  <!-- Second-hop connections (yellow) -->
  <g stroke="rgba(250,204,21,0.25)" stroke-width="1.5">
    <line x1="480" y1="200" x2="370" y2="140"/>
    <line x1="480" y1="200" x2="380" y2="250"/>
    <line x1="660" y1="210" x2="770" y2="150"/>
    <line x1="660" y1="210" x2="760" y2="270"/>
    <line x1="450" y1="340" x2="330" y2="350"/>
    <line x1="450" y1="340" x2="360" y2="430"/>
    <line x1="680" y1="350" x2="790" y2="370"/>
    <line x1="680" y1="350" x2="760" y2="440"/>
    <line x1="520" y1="400" x2="440" y2="480"/>
    <line x1="620" y1="410" x2="700" y2="490"/>
    <line x1="560" y1="170" x2="490" y2="100"/>
    <line x1="560" y1="170" x2="640" y2="95"/>
  </g>

  <!-- Third-hop connections (red, faint) -->
  <g stroke="rgba(248,113,113,0.15)" stroke-width="1">
    <line x1="370" y1="140" x2="280" y2="90"/>
    <line x1="370" y1="140" x2="290" y2="180"/>
    <line x1="770" y1="150" x2="860" y2="100"/>
    <line x1="760" y1="270" x2="860" y2="280"/>
    <line x1="330" y1="350" x2="230" y2="330"/>
    <line x1="360" y1="430" x2="270" y2="480"/>
    <line x1="790" y1="370" x2="880" y2="380"/>
    <line x1="760" y1="440" x2="845" y2="490"/>
    <line x1="440" y1="480" x2="370" y2="545"/>
    <line x1="700" y1="490" x2="770" y2="555"/>
    <line x1="490" y1="100" x2="420" y2="45"/>
    <line x1="640" y1="95" x2="720" y2="40"/>
  </g>

  <!-- Cross-connections within hops -->
  <g stroke="rgba(74,222,128,0.15)" stroke-width="1">
    <line x1="480" y1="200" x2="660" y2="210"/>
    <line x1="450" y1="340" x2="520" y2="400"/>
    <line x1="680" y1="350" x2="620" y2="410"/>
    <line x1="480" y1="200" x2="560" y2="170"/>
    <line x1="660" y1="210" x2="560" y2="170"/>
  </g>
  <g stroke="rgba(250,204,21,0.1)" stroke-width="1">
    <line x1="370" y1="140" x2="380" y2="250"/>
    <line x1="770" y1="150" x2="760" y2="270"/>
    <line x1="330" y1="350" x2="360" y2="430"/>
    <line x1="790" y1="370" x2="760" y2="440"/>
    <line x1="490" y1="100" x2="640" y2="95"/>
  </g>

  <!-- ============================================ -->
  <!-- GRAPH NODES                                  -->
  <!-- ============================================ -->

  <!-- Red hop-3 nodes (small, faint) -->
  <g filter="url(#node-glow-red)">
    <circle cx="280" cy="90" r="7" fill="rgba(248,113,113,0.25)" stroke="rgba(248,113,113,0.5)" stroke-width="1"/>
    <circle cx="290" cy="180" r="6" fill="rgba(248,113,113,0.2)" stroke="rgba(248,113,113,0.45)" stroke-width="1"/>
    <circle cx="860" cy="100" r="7" fill="rgba(248,113,113,0.25)" stroke="rgba(248,113,113,0.5)" stroke-width="1"/>
    <circle cx="860" cy="280" r="6" fill="rgba(248,113,113,0.2)" stroke="rgba(248,113,113,0.45)" stroke-width="1"/>
    <circle cx="230" cy="330" r="6" fill="rgba(248,113,113,0.2)" stroke="rgba(248,113,113,0.45)" stroke-width="1"/>
    <circle cx="270" cy="480" r="7" fill="rgba(248,113,113,0.25)" stroke="rgba(248,113,113,0.5)" stroke-width="1"/>
    <circle cx="880" cy="380" r="6" fill="rgba(248,113,113,0.2)" stroke="rgba(248,113,113,0.45)" stroke-width="1"/>
    <circle cx="845" cy="490" r="7" fill="rgba(248,113,113,0.25)" stroke="rgba(248,113,113,0.5)" stroke-width="1"/>
    <circle cx="370" cy="545" r="6" fill="rgba(248,113,113,0.2)" stroke="rgba(248,113,113,0.45)" stroke-width="1"/>
    <circle cx="770" cy="555" r="6" fill="rgba(248,113,113,0.2)" stroke="rgba(248,113,113,0.45)" stroke-width="1"/>
    <circle cx="420" cy="45" r="6" fill="rgba(248,113,113,0.2)" stroke="rgba(248,113,113,0.45)" stroke-width="1"/>
    <circle cx="720" cy="40" r="6" fill="rgba(248,113,113,0.2)" stroke="rgba(248,113,113,0.45)" stroke-width="1"/>
  </g>

  <!-- Yellow hop-2 nodes (medium) -->
  <g filter="url(#node-glow-yellow)">
    <circle cx="370" cy="140" r="10" fill="rgba(250,204,21,0.2)" stroke="rgba(250,204,21,0.6)" stroke-width="1.5"/>
    <circle cx="380" cy="250" r="9" fill="rgba(250,204,21,0.18)" stroke="rgba(250,204,21,0.55)" stroke-width="1.5"/>
    <circle cx="770" cy="150" r="10" fill="rgba(250,204,21,0.2)" stroke="rgba(250,204,21,0.6)" stroke-width="1.5"/>
    <circle cx="760" cy="270" r="9" fill="rgba(250,204,21,0.18)" stroke="rgba(250,204,21,0.55)" stroke-width="1.5"/>
    <circle cx="330" cy="350" r="9" fill="rgba(250,204,21,0.18)" stroke="rgba(250,204,21,0.55)" stroke-width="1.5"/>
    <circle cx="360" cy="430" r="10" fill="rgba(250,204,21,0.2)" stroke="rgba(250,204,21,0.6)" stroke-width="1.5"/>
    <circle cx="790" cy="370" r="9" fill="rgba(250,204,21,0.18)" stroke="rgba(250,204,21,0.55)" stroke-width="1.5"/>
    <circle cx="760" cy="440" r="10" fill="rgba(250,204,21,0.2)" stroke="rgba(250,204,21,0.6)" stroke-width="1.5"/>
    <circle cx="440" cy="480" r="9" fill="rgba(250,204,21,0.18)" stroke="rgba(250,204,21,0.55)" stroke-width="1.5"/>
    <circle cx="700" cy="490" r="9" fill="rgba(250,204,21,0.18)" stroke="rgba(250,204,21,0.55)" stroke-width="1.5"/>
    <circle cx="490" cy="100" r="10" fill="rgba(250,204,21,0.2)" stroke="rgba(250,204,21,0.6)" stroke-width="1.5"/>
    <circle cx="640" cy="95" r="10" fill="rgba(250,204,21,0.2)" stroke="rgba(250,204,21,0.6)" stroke-width="1.5"/>
  </g>

  <!-- Green hop-1 nodes (larger) -->
  <g filter="url(#node-glow-green)">
    <circle cx="480" cy="200" r="14" fill="rgba(74,222,128,0.2)" stroke="rgba(74,222,128,0.7)" stroke-width="2"/>
    <circle cx="660" cy="210" r="14" fill="rgba(74,222,128,0.2)" stroke="rgba(74,222,128,0.7)" stroke-width="2"/>
    <circle cx="450" cy="340" r="13" fill="rgba(74,222,128,0.2)" stroke="rgba(74,222,128,0.7)" stroke-width="2"/>
    <circle cx="680" cy="350" r="13" fill="rgba(74,222,128,0.2)" stroke="rgba(74,222,128,0.7)" stroke-width="2"/>
    <circle cx="520" cy="400" r="13" fill="rgba(74,222,128,0.2)" stroke="rgba(74,222,128,0.7)" stroke-width="2"/>
    <circle cx="620" cy="410" r="13" fill="rgba(74,222,128,0.2)" stroke="rgba(74,222,128,0.7)" stroke-width="2"/>
    <circle cx="560" cy="170" r="14" fill="rgba(74,222,128,0.2)" stroke="rgba(74,222,128,0.7)" stroke-width="2"/>
  </g>

  <!-- Center node (you) -->
  <circle cx="560" cy="280" r="24" fill="rgba(167,139,250,0.15)" stroke="rgba(167,139,250,0.6)" stroke-width="2"/>
  <circle cx="560" cy="280" r="18" fill="rgba(167,139,250,0.1)" stroke="rgba(167,139,250,0.4)" stroke-width="1.5"/>
  <circle cx="560" cy="280" r="8" fill="rgba(167,139,250,0.5)"/>

  <!-- ============================================ -->
  <!-- MAGNIFYING GLASS over the graph              -->
  <!-- ============================================ -->

  <g filter="url(#magnify-glow)" transform="translate(650, 180)">
    <!-- Glass circle -->
    <circle cx="0" cy="0" r="55" fill="rgba(167,139,250,0.04)" stroke="rgba(167,139,250,0.5)" stroke-width="2.5"/>
    <!-- Handle -->
    <line x1="38" y1="38" x2="72" y2="72" stroke="rgba(167,139,250,0.6)" stroke-width="5" stroke-linecap="round"/>
    <!-- Magnified graph detail inside lens -->
    <circle cx="-10" cy="-5" r="5" fill="rgba(74,222,128,0.4)" stroke="rgba(74,222,128,0.7)" stroke-width="1"/>
    <circle cx="15" cy="-12" r="4" fill="rgba(250,204,21,0.4)" stroke="rgba(250,204,21,0.6)" stroke-width="1"/>
    <circle cx="8" cy="15" r="4.5" fill="rgba(167,139,250,0.4)" stroke="rgba(167,139,250,0.6)" stroke-width="1"/>
    <circle cx="-18" cy="18" r="3.5" fill="rgba(250,204,21,0.35)" stroke="rgba(250,204,21,0.5)" stroke-width="1"/>
    <circle cx="25" cy="10" r="3" fill="rgba(248,113,113,0.3)" stroke="rgba(248,113,113,0.5)" stroke-width="1"/>
    <line x1="-10" y1="-5" x2="15" y2="-12" stroke="rgba(74,222,128,0.5)" stroke-width="1"/>
    <line x1="-10" y1="-5" x2="8" y2="15" stroke="rgba(167,139,250,0.4)" stroke-width="1"/>
    <line x1="15" y1="-12" x2="25" y2="10" stroke="rgba(250,204,21,0.4)" stroke-width="1"/>
    <line x1="8" y1="15" x2="-18" y2="18" stroke="rgba(250,204,21,0.3)" stroke-width="1"/>
    <line x1="8" y1="15" x2="25" y2="10" stroke="rgba(248,113,113,0.3)" stroke-width="1"/>
    <!-- Lens shine -->
    <path d="M -30 -20 Q -20 -35 -5 -40" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- ============================================ -->
  <!-- FLOATING UI CONTROLS                         -->
  <!-- ============================================ -->

  <!-- Zoom controls (top right area) -->
  <g filter="url(#ui-glow)" transform="translate(1020, 100)">
    <!-- Zoom in button -->
    <rect x="0" y="0" width="36" height="36" rx="6" ry="6" fill="rgba(167,139,250,0.1)" stroke="rgba(167,139,250,0.4)" stroke-width="1.5"/>
    <line x1="10" y1="18" x2="26" y2="18" stroke="rgba(167,139,250,0.7)" stroke-width="2" stroke-linecap="round"/>
    <line x1="18" y1="10" x2="18" y2="26" stroke="rgba(167,139,250,0.7)" stroke-width="2" stroke-linecap="round"/>
    <!-- Zoom out button -->
    <rect x="0" y="44" width="36" height="36" rx="6" ry="6" fill="rgba(167,139,250,0.1)" stroke="rgba(167,139,250,0.4)" stroke-width="1.5"/>
    <line x1="10" y1="62" x2="26" y2="62" stroke="rgba(167,139,250,0.7)" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Filter buttons (top right, below zoom) -->
  <g filter="url(#ui-glow)" transform="translate(1000, 210)">
    <!-- Hop 1 filter -->
    <rect x="0" y="0" width="75" height="28" rx="5" ry="5" fill="rgba(74,222,128,0.12)" stroke="rgba(74,222,128,0.4)" stroke-width="1"/>
    <text x="37" y="19" fill="rgba(74,222,128,0.7)" font-family="monospace" font-size="11" text-anchor="middle">Hop 1</text>
    <!-- Hop 2 filter -->
    <rect x="0" y="36" width="75" height="28" rx="5" ry="5" fill="rgba(250,204,21,0.12)" stroke="rgba(250,204,21,0.4)" stroke-width="1"/>
    <text x="37" y="55" fill="rgba(250,204,21,0.7)" font-family="monospace" font-size="11" text-anchor="middle">Hop 2</text>
    <!-- Hop 3 filter -->
    <rect x="0" y="72" width="75" height="28" rx="5" ry="5" fill="rgba(248,113,113,0.12)" stroke="rgba(248,113,113,0.4)" stroke-width="1"/>
    <text x="37" y="91" fill="rgba(248,113,113,0.7)" font-family="monospace" font-size="11" text-anchor="middle">Hop 3</text>
  </g>

  <!-- Search/explore bar (bottom) -->
  <g filter="url(#ui-glow)" transform="translate(400, 560)">
    <rect x="0" y="0" width="320" height="34" rx="17" ry="17" fill="rgba(167,139,250,0.06)" stroke="rgba(167,139,250,0.3)" stroke-width="1.5"/>
    <!-- Search icon -->
    <circle cx="22" cy="17" r="7" fill="none" stroke="rgba(167,139,250,0.5)" stroke-width="1.5"/>
    <line x1="27" y1="22" x2="32" y2="27" stroke="rgba(167,139,250,0.5)" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Placeholder text -->
    <text x="42" y="22" fill="rgba(167,139,250,0.35)" font-family="monospace" font-size="12">Search npub or profile...</text>
  </g>

</svg>