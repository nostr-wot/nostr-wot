<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#312e81;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4c1d95;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:0" />
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#a78bfa" flood-opacity="0.5"/>
    </filter>
    <filter id="bolt-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#facc15" flood-opacity="0.6"/>
    </filter>
    <filter id="green-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#4ade80" flood-opacity="0.6"/>
    </filter>
    <filter id="node-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#a78bfa" flood-opacity="0.5"/>
    </filter>
    <filter id="gauge-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#4ade80" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#glow)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="white" stroke-width="0.5">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="200" y1="0" x2="1200" y2="500"/>
    <line x1="0" y1="200" x2="1000" y2="630"/>
    <line x1="400" y1="0" x2="1200" y2="400"/>
    <line x1="0" y1="400" x2="800" y2="630"/>
    <line x1="1200" y1="0" x2="0" y2="630"/>
    <line x1="1000" y1="0" x2="0" y2="500"/>
    <line x1="1200" y1="200" x2="200" y2="630"/>
  </g>

  <!-- Trust rings -->
  <circle cx="600" cy="290" r="280" fill="none" stroke="rgba(167,139,250,0.06)" stroke-width="1" stroke-dasharray="4,8"/>
  <circle cx="600" cy="290" r="210" fill="none" stroke="rgba(167,139,250,0.10)" stroke-width="1" stroke-dasharray="4,8"/>
  <circle cx="600" cy="290" r="140" fill="none" stroke="rgba(167,139,250,0.14)" stroke-width="1" stroke-dasharray="4,8"/>

  <!-- ============================================ -->
  <!-- NETWORK NODES                                -->
  <!-- ============================================ -->

  <!-- Outer ring nodes (purple) -->
  <g filter="url(#node-glow)">
    <circle cx="200" cy="150" r="14" fill="rgba(167,139,250,0.3)" stroke="rgba(167,139,250,0.6)" stroke-width="1.5"/>
    <circle cx="150" cy="350" r="12" fill="rgba(167,139,250,0.25)" stroke="rgba(167,139,250,0.5)" stroke-width="1.5"/>
    <circle cx="280" cy="500" r="13" fill="rgba(167,139,250,0.3)" stroke="rgba(167,139,250,0.6)" stroke-width="1.5"/>
    <circle cx="1000" cy="130" r="14" fill="rgba(167,139,250,0.3)" stroke="rgba(167,139,250,0.6)" stroke-width="1.5"/>
    <circle cx="1050" cy="370" r="12" fill="rgba(167,139,250,0.25)" stroke="rgba(167,139,250,0.5)" stroke-width="1.5"/>
    <circle cx="920" cy="520" r="13" fill="rgba(167,139,250,0.3)" stroke="rgba(167,139,250,0.6)" stroke-width="1.5"/>
  </g>

  <!-- Middle ring nodes (green) -->
  <g filter="url(#node-glow)">
    <circle cx="370" cy="180" r="16" fill="rgba(74,222,128,0.2)" stroke="rgba(74,222,128,0.6)" stroke-width="1.5"/>
    <circle cx="320" cy="370" r="15" fill="rgba(74,222,128,0.2)" stroke="rgba(74,222,128,0.6)" stroke-width="1.5"/>
    <circle cx="830" cy="170" r="16" fill="rgba(74,222,128,0.2)" stroke="rgba(74,222,128,0.6)" stroke-width="1.5"/>
    <circle cx="880" cy="380" r="15" fill="rgba(74,222,128,0.2)" stroke="rgba(74,222,128,0.6)" stroke-width="1.5"/>
    <circle cx="500" cy="450" r="15" fill="rgba(74,222,128,0.2)" stroke="rgba(74,222,128,0.6)" stroke-width="1.5"/>
    <circle cx="700" cy="460" r="15" fill="rgba(74,222,128,0.2)" stroke="rgba(74,222,128,0.6)" stroke-width="1.5"/>
  </g>

  <!-- ============================================ -->
  <!-- CONNECTION LINES between nodes               -->
  <!-- ============================================ -->
  <g stroke="rgba(167,139,250,0.15)" stroke-width="1">
    <line x1="200" y1="150" x2="370" y2="180"/>
    <line x1="150" y1="350" x2="320" y2="370"/>
    <line x1="280" y1="500" x2="500" y2="450"/>
    <line x1="1000" y1="130" x2="830" y2="170"/>
    <line x1="1050" y1="370" x2="880" y2="380"/>
    <line x1="920" y1="520" x2="700" y2="460"/>
  </g>
  <g stroke="rgba(74,222,128,0.25)" stroke-width="1.5">
    <line x1="370" y1="180" x2="600" y2="250"/>
    <line x1="320" y1="370" x2="600" y2="310"/>
    <line x1="830" y1="170" x2="600" y2="250"/>
    <line x1="880" y1="380" x2="600" y2="310"/>
    <line x1="500" y1="450" x2="600" y2="310"/>
    <line x1="700" y1="460" x2="600" y2="310"/>
  </g>

  <!-- ============================================ -->
  <!-- LIGHTNING BOLTS flying between nodes         -->
  <!-- ============================================ -->
  <g filter="url(#bolt-glow)">
    <!-- Bolt from left node to center -->
    <polygon points="430,210 420,222 426,222 416,234 440,220 434,220 444,210" fill="rgba(250,204,21,0.9)"/>
    <!-- Bolt from right node to center -->
    <polygon points="770,210 760,222 766,222 756,234 780,220 774,220 784,210" fill="rgba(250,204,21,0.9)"/>
    <!-- Bolt from bottom-left to center -->
    <polygon points="410,370 400,382 406,382 396,394 420,380 414,380 424,370" fill="rgba(250,204,21,0.85)"/>
    <!-- Bolt from bottom-right to center -->
    <polygon points="790,370 780,382 786,382 776,394 800,380 794,380 804,370" fill="rgba(250,204,21,0.85)"/>
    <!-- Flying bolt top -->
    <polygon points="520,130 510,142 516,142 506,154 530,140 524,140 534,130" fill="rgba(250,204,21,0.7)"/>
    <!-- Flying bolt bottom -->
    <polygon points="680,490 670,502 676,502 666,514 690,500 684,500 694,490" fill="rgba(250,204,21,0.7)"/>
  </g>

  <!-- Sat symbols scattered -->
  <text x="460" y="165" fill="rgba(250,204,21,0.5)" font-family="monospace" font-size="16" font-weight="bold">&#x20BF;</text>
  <text x="740" y="155" fill="rgba(250,204,21,0.4)" font-family="monospace" font-size="14" font-weight="bold">&#x20BF;</text>
  <text x="350" y="310" fill="rgba(250,204,21,0.35)" font-family="monospace" font-size="13" font-weight="bold">&#x20BF;</text>
  <text x="850" y="300" fill="rgba(250,204,21,0.4)" font-family="monospace" font-size="15" font-weight="bold">&#x20BF;</text>
  <text x="550" y="480" fill="rgba(250,204,21,0.35)" font-family="monospace" font-size="12" font-weight="bold">&#x20BF;</text>
  <text x="650" y="130" fill="rgba(250,204,21,0.3)" font-family="monospace" font-size="11" font-weight="bold">&#x20BF;</text>
  <text x="230" y="260" fill="rgba(250,204,21,0.25)" font-family="monospace" font-size="12" font-weight="bold">&#x20BF;</text>
  <text x="970" y="250" fill="rgba(250,204,21,0.25)" font-family="monospace" font-size="12" font-weight="bold">&#x20BF;</text>

  <!-- ============================================ -->
  <!-- CENTER: Auto-Approve Badge with Gauge        -->
  <!-- ============================================ -->

  <!-- Glow behind center badge -->
  <circle cx="600" cy="280" r="95" fill="rgba(74,222,128,0.06)"/>
  <circle cx="600" cy="280" r="70" fill="rgba(74,222,128,0.08)"/>
  <circle cx="600" cy="280" r="48" fill="rgba(139,92,246,0.1)"/>

  <!-- Gauge arc (threshold indicator) -->
  <g filter="url(#gauge-glow)">
    <!-- Gauge background arc -->
    <path d="M 540 310 A 70 70 0 0 1 660 310" fill="none" stroke="rgba(167,139,250,0.3)" stroke-width="6" stroke-linecap="round"/>
    <!-- Gauge filled arc (showing threshold met) -->
    <path d="M 540 310 A 70 70 0 0 1 640 248" fill="none" stroke="rgba(74,222,128,0.8)" stroke-width="6" stroke-linecap="round"/>
    <!-- Gauge tick marks -->
    <line x1="538" y1="305" x2="530" y2="310" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <line x1="550" y1="265" x2="542" y2="260" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <line x1="580" y1="240" x2="576" y2="232" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <line x1="620" y1="240" x2="624" y2="232" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <line x1="650" y1="265" x2="658" y2="260" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <line x1="662" y1="305" x2="670" y2="310" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  </g>

  <!-- Shield / badge shape -->
  <g filter="url(#green-glow)">
    <path d="M 600 230 L 635 248 L 635 285 C 635 305 620 318 600 325 C 580 318 565 305 565 285 L 565 248 Z" fill="rgba(74,222,128,0.15)" stroke="rgba(74,222,128,0.7)" stroke-width="2"/>
  </g>

  <!-- Checkmark inside shield -->
  <polyline points="582,278 595,292 620,262" fill="none" stroke="rgba(74,222,128,0.95)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Small "AUTO" text below badge -->
  <text x="600" y="348" fill="rgba(74,222,128,0.6)" font-family="monospace" font-size="13" font-weight="bold" text-anchor="middle" letter-spacing="3">AUTO</text>

  <!-- Lightning bolt accent on top of badge -->
  <g filter="url(#bolt-glow)">
    <polygon points="603,210 592,225 600,225 590,240 612,222 604,222 614,210" fill="rgba(250,204,21,0.9)" stroke="rgba(250,204,21,0.4)" stroke-width="0.5"/>
  </g>

</svg>