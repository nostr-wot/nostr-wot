<svg width="800" height="450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#312e81;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4c1d95;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="43%" r="45%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:0" />
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#a78bfa" flood-opacity="0.5"/>
    </filter>
    <filter id="bolt-glow-green" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#4ade80" flood-opacity="0.6"/>
    </filter>
    <filter id="bolt-glow-yellow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#facc15" flood-opacity="0.5"/>
    </filter>
    <filter id="bolt-glow-red" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#f87171" flood-opacity="0.4"/>
    </filter>
    <filter id="center-bolt-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#facc15" flood-opacity="0.7"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#glow)"/>

  <!-- Trust rings -->
  <circle cx="400" cy="195" r="190" fill="none" stroke="rgba(167,139,250,0.06)" stroke-width="1" stroke-dasharray="4,8"/>
  <circle cx="400" cy="195" r="145" fill="none" stroke="rgba(167,139,250,0.10)" stroke-width="1" stroke-dasharray="4,8"/>
  <circle cx="400" cy="195" r="100" fill="none" stroke="rgba(167,139,250,0.14)" stroke-width="1" stroke-dasharray="4,8"/>

  <!-- ============================================ -->
  <!-- CONNECTION LINES                             -->
  <!-- ============================================ -->

  <!-- Center to green hop-1 -->
  <line x1="360" y1="145" x2="295" y2="110" stroke="rgba(74,222,128,0.5)" stroke-width="1.5"/>
  <line x1="345" y1="200" x2="275" y2="205" stroke="rgba(74,222,128,0.5)" stroke-width="1.5"/>
  <line x1="370" y1="255" x2="300" y2="290" stroke="rgba(74,222,128,0.5)" stroke-width="1.5"/>
  <line x1="440" y1="145" x2="510" y2="105" stroke="rgba(74,222,128,0.5)" stroke-width="1.5"/>
  <line x1="455" y1="200" x2="530" y2="200" stroke="rgba(74,222,128,0.5)" stroke-width="1.5"/>
  <line x1="440" y1="255" x2="515" y2="295" stroke="rgba(74,222,128,0.5)" stroke-width="1.5"/>
  <line x1="400" y1="130" x2="400" y2="85" stroke="rgba(74,222,128,0.5)" stroke-width="1.5"/>
  <line x1="400" y1="270" x2="400" y2="315" stroke="rgba(74,222,128,0.5)" stroke-width="1.5"/>

  <!-- Green to yellow hop-2 -->
  <line x1="295" y1="110" x2="220" y2="65" stroke="rgba(250,204,21,0.35)" stroke-width="1"/>
  <line x1="275" y1="205" x2="195" y2="210" stroke="rgba(250,204,21,0.35)" stroke-width="1"/>
  <line x1="300" y1="290" x2="230" y2="340" stroke="rgba(250,204,21,0.35)" stroke-width="1"/>
  <line x1="510" y1="105" x2="585" y2="60" stroke="rgba(250,204,21,0.35)" stroke-width="1"/>
  <line x1="530" y1="200" x2="610" y2="195" stroke="rgba(250,204,21,0.35)" stroke-width="1"/>
  <line x1="515" y1="295" x2="585" y2="345" stroke="rgba(250,204,21,0.35)" stroke-width="1"/>
  <line x1="400" y1="85" x2="345" y2="35" stroke="rgba(250,204,21,0.35)" stroke-width="1"/>
  <line x1="400" y1="85" x2="460" y2="35" stroke="rgba(250,204,21,0.35)" stroke-width="1"/>
  <line x1="400" y1="315" x2="345" y2="375" stroke="rgba(250,204,21,0.35)" stroke-width="1"/>
  <line x1="400" y1="315" x2="465" y2="370" stroke="rgba(250,204,21,0.35)" stroke-width="1"/>

  <!-- Yellow to red hop-3 -->
  <line x1="220" y1="65" x2="155" y2="25" stroke="rgba(248,113,113,0.2)" stroke-width="1"/>
  <line x1="195" y1="210" x2="120" y2="215" stroke="rgba(248,113,113,0.2)" stroke-width="1"/>
  <line x1="585" y1="60" x2="655" y2="20" stroke="rgba(248,113,113,0.2)" stroke-width="1"/>
  <line x1="610" y1="195" x2="685" y2="190" stroke="rgba(248,113,113,0.2)" stroke-width="1"/>
  <line x1="230" y1="340" x2="170" y2="395" stroke="rgba(248,113,113,0.2)" stroke-width="1"/>
  <line x1="585" y1="345" x2="650" y2="400" stroke="rgba(248,113,113,0.2)" stroke-width="1"/>

  <!-- Cross-connections -->
  <line x1="295" y1="110" x2="400" y2="85" stroke="rgba(74,222,128,0.2)" stroke-width="1"/>
  <line x1="510" y1="105" x2="400" y2="85" stroke="rgba(74,222,128,0.2)" stroke-width="1"/>
  <line x1="220" y1="65" x2="345" y2="35" stroke="rgba(250,204,21,0.15)" stroke-width="1"/>
  <line x1="585" y1="60" x2="460" y2="35" stroke="rgba(250,204,21,0.15)" stroke-width="1"/>

  <!-- ============================================ -->
  <!-- LIGHTNING BOLT NODES                         -->
  <!-- ============================================ -->

  <!-- Red hop-3 bolts (small) -->
  <g filter="url(#bolt-glow-red)">
    <polygon points="155,18 150,25 153,25 148,32 162,23 159,23 164,18" fill="rgba(248,113,113,0.6)"/>
    <polygon points="120,208 115,215 118,215 113,222 127,213 124,213 129,208" fill="rgba(248,113,113,0.5)"/>
    <polygon points="655,13 650,20 653,20 648,27 662,18 659,18 664,13" fill="rgba(248,113,113,0.6)"/>
    <polygon points="685,183 680,190 683,190 678,197 692,188 689,188 694,183" fill="rgba(248,113,113,0.5)"/>
    <polygon points="170,388 165,395 168,395 163,402 177,393 174,393 179,388" fill="rgba(248,113,113,0.55)"/>
    <polygon points="650,393 645,400 648,400 643,407 657,398 654,398 659,393" fill="rgba(248,113,113,0.55)"/>
  </g>

  <!-- Yellow hop-2 bolts (medium) -->
  <g filter="url(#bolt-glow-yellow)">
    <polygon points="220,55 213,65 217,65 210,75 230,63 226,63 233,55" fill="rgba(250,204,21,0.8)"/>
    <polygon points="195,200 188,210 192,210 185,220 205,208 201,208 208,200" fill="rgba(250,204,21,0.7)"/>
    <polygon points="230,330 223,340 227,340 220,350 240,338 236,338 243,330" fill="rgba(250,204,21,0.75)"/>
    <polygon points="585,50 578,60 582,60 575,70 595,58 591,58 598,50" fill="rgba(250,204,21,0.8)"/>
    <polygon points="610,185 603,195 607,195 600,205 620,193 616,193 623,185" fill="rgba(250,204,21,0.7)"/>
    <polygon points="585,335 578,345 582,345 575,355 595,343 591,343 598,335" fill="rgba(250,204,21,0.75)"/>
    <polygon points="345,25 338,35 342,35 335,45 355,33 351,33 358,25" fill="rgba(250,204,21,0.7)"/>
    <polygon points="460,25 453,35 457,35 450,45 470,33 466,33 473,25" fill="rgba(250,204,21,0.7)"/>
    <polygon points="345,365 338,375 342,375 335,385 355,373 351,373 358,365" fill="rgba(250,204,21,0.7)"/>
    <polygon points="465,360 458,370 462,370 455,380 475,368 471,368 478,360" fill="rgba(250,204,21,0.7)"/>
  </g>

  <!-- Green hop-1 bolts (larger) -->
  <g filter="url(#bolt-glow-green)">
    <polygon points="295,98 285,110 290,110 280,122 308,106 303,106 313,98" fill="rgba(74,222,128,0.9)"/>
    <polygon points="275,193 265,205 270,205 260,217 288,201 283,201 293,193" fill="rgba(74,222,128,0.85)"/>
    <polygon points="300,278 290,290 295,290 285,302 313,286 308,286 318,278" fill="rgba(74,222,128,0.85)"/>
    <polygon points="510,93 500,105 505,105 495,117 523,101 518,101 528,93" fill="rgba(74,222,128,0.9)"/>
    <polygon points="530,188 520,200 525,200 515,212 543,196 538,196 548,188" fill="rgba(74,222,128,0.85)"/>
    <polygon points="515,283 505,295 510,295 500,307 528,291 523,291 533,283" fill="rgba(74,222,128,0.85)"/>
    <polygon points="400,73 390,85 395,85 385,97 413,81 408,81 418,73" fill="rgba(74,222,128,0.9)"/>
    <polygon points="400,303 390,315 395,315 385,327 413,311 408,311 418,303" fill="rgba(74,222,128,0.9)"/>
  </g>

  <!-- ============================================ -->
  <!-- CENTER LIGHTNING BOLT                        -->
  <!-- ============================================ -->

  <!-- Glow behind center bolt -->
  <circle cx="400" cy="198" r="68" fill="rgba(250,204,21,0.08)"/>
  <circle cx="400" cy="198" r="50" fill="rgba(250,204,21,0.06)"/>
  <circle cx="400" cy="198" r="32" fill="rgba(139,92,246,0.1)"/>

  <!-- Large center lightning bolt -->
  <g filter="url(#center-bolt-glow)">
    <polygon points="410,140 375,198 395,198 365,255 435,185 412,185 440,140" fill="rgba(250,204,21,0.95)" stroke="rgba(250,204,21,0.4)" stroke-width="1"/>
  </g>

  <!-- Inner highlight -->
  <polygon points="408,150 380,195 397,195 372,245 428,190 413,190 435,150" fill="rgba(255,255,255,0.15)"/>

</svg>
