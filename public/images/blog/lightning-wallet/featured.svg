<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#312e81;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4c1d95;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:0" />
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#a78bfa" flood-opacity="0.5"/>
    </filter>
    <filter id="bolt-glow-green" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#4ade80" flood-opacity="0.6"/>
    </filter>
    <filter id="bolt-glow-yellow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#facc15" flood-opacity="0.5"/>
    </filter>
    <filter id="bolt-glow-red" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#f87171" flood-opacity="0.4"/>
    </filter>
    <filter id="logo-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="center-bolt-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#facc15" flood-opacity="0.7"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#glow)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="white" stroke-width="0.5">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="200" y1="0" x2="1200" y2="500"/>
    <line x1="0" y1="200" x2="1000" y2="630"/>
    <line x1="400" y1="0" x2="1200" y2="400"/>
    <line x1="0" y1="400" x2="800" y2="630"/>
    <line x1="1200" y1="0" x2="0" y2="630"/>
    <line x1="1000" y1="0" x2="0" y2="500"/>
    <line x1="1200" y1="200" x2="200" y2="630"/>
  </g>

  <!-- Trust rings centered on the logo -->
  <circle cx="600" cy="270" r="270" fill="none" stroke="rgba(167,139,250,0.06)" stroke-width="1" stroke-dasharray="4,8"/>
  <circle cx="600" cy="270" r="210" fill="none" stroke="rgba(167,139,250,0.10)" stroke-width="1" stroke-dasharray="4,8"/>
  <circle cx="600" cy="270" r="150" fill="none" stroke="rgba(167,139,250,0.14)" stroke-width="1" stroke-dasharray="4,8"/>

  <!-- ============================================ -->
  <!-- CONNECTION LINES                             -->
  <!-- ============================================ -->

  <!-- Connections from center to green hop-1 bolts -->
  <line x1="545" y1="200" x2="460" y2="160" stroke="rgba(74,222,128,0.5)" stroke-width="2"/>
  <line x1="520" y1="270" x2="420" y2="280" stroke="rgba(74,222,128,0.5)" stroke-width="2"/>
  <line x1="555" y1="350" x2="450" y2="390" stroke="rgba(74,222,128,0.5)" stroke-width="2"/>
  <line x1="655" y1="200" x2="745" y2="155" stroke="rgba(74,222,128,0.5)" stroke-width="2"/>
  <line x1="680" y1="270" x2="775" y2="270" stroke="rgba(74,222,128,0.5)" stroke-width="2"/>
  <line x1="655" y1="350" x2="750" y2="395" stroke="rgba(74,222,128,0.5)" stroke-width="2"/>
  <line x1="600" y1="180" x2="600" y2="120" stroke="rgba(74,222,128,0.5)" stroke-width="2"/>
  <line x1="600" y1="370" x2="600" y2="430" stroke="rgba(74,222,128,0.5)" stroke-width="2"/>

  <!-- Connections from green hop-1 to yellow hop-2 -->
  <line x1="460" y1="160" x2="365" y2="100" stroke="rgba(250,204,21,0.35)" stroke-width="1.5"/>
  <line x1="420" y1="280" x2="320" y2="285" stroke="rgba(250,204,21,0.35)" stroke-width="1.5"/>
  <line x1="450" y1="390" x2="355" y2="445" stroke="rgba(250,204,21,0.35)" stroke-width="1.5"/>
  <line x1="745" y1="155" x2="840" y2="95" stroke="rgba(250,204,21,0.35)" stroke-width="1.5"/>
  <line x1="775" y1="270" x2="875" y2="265" stroke="rgba(250,204,21,0.35)" stroke-width="1.5"/>
  <line x1="750" y1="395" x2="845" y2="450" stroke="rgba(250,204,21,0.35)" stroke-width="1.5"/>
  <line x1="600" y1="120" x2="530" y2="60" stroke="rgba(250,204,21,0.35)" stroke-width="1.5"/>
  <line x1="600" y1="120" x2="680" y2="55" stroke="rgba(250,204,21,0.35)" stroke-width="1.5"/>
  <line x1="600" y1="430" x2="530" y2="500" stroke="rgba(250,204,21,0.35)" stroke-width="1.5"/>
  <line x1="600" y1="430" x2="680" y2="505" stroke="rgba(250,204,21,0.35)" stroke-width="1.5"/>

  <!-- Connections from yellow hop-2 to red hop-3 -->
  <line x1="365" y1="100" x2="280" y2="50" stroke="rgba(248,113,113,0.2)" stroke-width="1"/>
  <line x1="320" y1="285" x2="225" y2="290" stroke="rgba(248,113,113,0.2)" stroke-width="1"/>
  <line x1="355" y1="445" x2="270" y2="510" stroke="rgba(248,113,113,0.2)" stroke-width="1"/>
  <line x1="840" y1="95" x2="930" y2="45" stroke="rgba(248,113,113,0.2)" stroke-width="1"/>
  <line x1="875" y1="265" x2="970" y2="260" stroke="rgba(248,113,113,0.2)" stroke-width="1"/>
  <line x1="845" y1="450" x2="935" y2="510" stroke="rgba(248,113,113,0.2)" stroke-width="1"/>
  <line x1="530" y1="60" x2="450" y2="15" stroke="rgba(248,113,113,0.2)" stroke-width="1"/>
  <line x1="680" y1="55" x2="760" y2="10" stroke="rgba(248,113,113,0.2)" stroke-width="1"/>
  <line x1="530" y1="500" x2="450" y2="560" stroke="rgba(248,113,113,0.2)" stroke-width="1"/>
  <line x1="680" y1="505" x2="765" y2="565" stroke="rgba(248,113,113,0.2)" stroke-width="1"/>

  <!-- Cross-connections -->
  <line x1="460" y1="160" x2="600" y2="120" stroke="rgba(74,222,128,0.2)" stroke-width="1"/>
  <line x1="745" y1="155" x2="600" y2="120" stroke="rgba(74,222,128,0.2)" stroke-width="1"/>
  <line x1="450" y1="390" x2="600" y2="430" stroke="rgba(74,222,128,0.2)" stroke-width="1"/>
  <line x1="750" y1="395" x2="600" y2="430" stroke="rgba(74,222,128,0.2)" stroke-width="1"/>
  <line x1="365" y1="100" x2="530" y2="60" stroke="rgba(250,204,21,0.15)" stroke-width="1"/>
  <line x1="840" y1="95" x2="680" y2="55" stroke="rgba(250,204,21,0.15)" stroke-width="1"/>
  <line x1="355" y1="445" x2="530" y2="500" stroke="rgba(250,204,21,0.12)" stroke-width="1"/>
  <line x1="845" y1="450" x2="680" y2="505" stroke="rgba(250,204,21,0.12)" stroke-width="1"/>

  <!-- ============================================ -->
  <!-- LIGHTNING BOLT NODES                         -->
  <!-- ============================================ -->

  <!-- Red hop-3 bolts (small, peripheral) -->
  <g filter="url(#bolt-glow-red)">
    <polygon points="280,42 274,50 278,50 272,58 286,48 282,48 288,42" fill="rgba(248,113,113,0.6)"/>
    <polygon points="225,282 219,290 223,290 217,298 231,288 227,288 233,282" fill="rgba(248,113,113,0.5)"/>
    <polygon points="270,502 264,510 268,510 262,518 276,508 272,508 278,502" fill="rgba(248,113,113,0.55)"/>
    <polygon points="930,37 924,45 928,45 922,53 936,43 932,43 938,37" fill="rgba(248,113,113,0.6)"/>
    <polygon points="970,252 964,260 968,260 962,268 976,258 972,258 978,252" fill="rgba(248,113,113,0.5)"/>
    <polygon points="935,502 929,510 933,510 927,518 941,508 937,508 943,502" fill="rgba(248,113,113,0.55)"/>
    <polygon points="450,7 444,15 448,15 442,23 456,13 452,13 458,7" fill="rgba(248,113,113,0.5)"/>
    <polygon points="760,2 754,10 758,10 752,18 766,8 762,8 768,2" fill="rgba(248,113,113,0.5)"/>
    <polygon points="450,552 444,560 448,560 442,568 456,558 452,558 458,552" fill="rgba(248,113,113,0.5)"/>
    <polygon points="765,557 759,565 763,565 757,573 771,563 767,563 773,557" fill="rgba(248,113,113,0.5)"/>
  </g>

  <!-- Yellow hop-2 bolts (medium) -->
  <g filter="url(#bolt-glow-yellow)">
    <polygon points="365,88 355,100 361,100 351,112 373,96 367,96 377,88" fill="rgba(250,204,21,0.8)"/>
    <polygon points="320,273 311,285 316,285 307,297 331,282 326,282 335,273" fill="rgba(250,204,21,0.7)"/>
    <polygon points="355,433 346,445 351,445 342,457 368,442 363,442 372,433" fill="rgba(250,204,21,0.75)"/>
    <polygon points="840,83 831,95 836,95 827,107 853,92 848,92 857,83" fill="rgba(250,204,21,0.8)"/>
    <polygon points="875,253 866,265 871,265 862,277 888,262 883,262 892,253" fill="rgba(250,204,21,0.7)"/>
    <polygon points="845,438 836,450 841,450 832,462 858,447 853,447 862,438" fill="rgba(250,204,21,0.75)"/>
    <polygon points="530,48 521,60 526,60 517,72 543,57 538,57 547,48" fill="rgba(250,204,21,0.7)"/>
    <polygon points="680,43 671,55 676,55 667,67 693,52 688,52 697,43" fill="rgba(250,204,21,0.7)"/>
    <polygon points="530,488 521,500 526,500 517,512 543,497 538,497 547,488" fill="rgba(250,204,21,0.7)"/>
    <polygon points="680,493 671,505 676,505 667,517 693,502 688,502 697,493" fill="rgba(250,204,21,0.7)"/>
  </g>

  <!-- Green hop-1 bolts (larger) -->
  <g filter="url(#bolt-glow-green)">
    <polygon points="460,145 447,160 454,160 441,175 475,155 468,155 481,145" fill="rgba(74,222,128,0.9)"/>
    <polygon points="420,265 407,280 414,280 401,295 435,275 428,275 441,265" fill="rgba(74,222,128,0.85)"/>
    <polygon points="450,375 437,390 444,390 431,405 465,385 458,385 471,375" fill="rgba(74,222,128,0.85)"/>
    <polygon points="745,140 732,155 739,155 726,170 760,150 753,150 766,140" fill="rgba(74,222,128,0.9)"/>
    <polygon points="775,255 762,270 769,270 756,285 790,265 783,265 796,255" fill="rgba(74,222,128,0.85)"/>
    <polygon points="750,380 737,395 744,395 731,410 765,390 758,390 771,380" fill="rgba(74,222,128,0.85)"/>
    <polygon points="600,105 587,120 594,120 581,135 615,115 608,115 621,105" fill="rgba(74,222,128,0.9)"/>
    <polygon points="600,415 587,430 594,430 581,445 615,425 608,425 621,415" fill="rgba(74,222,128,0.9)"/>
  </g>

  <!-- ============================================ -->
  <!-- CENTER LIGHTNING BOLT (replaces ostrich)     -->
  <!-- ============================================ -->

  <!-- Glow behind the center bolt -->
  <circle cx="600" cy="275" r="95" fill="rgba(250,204,21,0.08)"/>
  <circle cx="600" cy="275" r="70" fill="rgba(250,204,21,0.06)"/>
  <circle cx="600" cy="275" r="45" fill="rgba(139,92,246,0.1)"/>

  <!-- Large center lightning bolt -->
  <g filter="url(#center-bolt-glow)">
    <polygon points="615,195 570,280 598,280 555,355 645,260 612,260 650,195" fill="rgba(250,204,21,0.95)" stroke="rgba(250,204,21,0.4)" stroke-width="1"/>
  </g>

  <!-- Inner highlight on center bolt -->
  <polygon points="612,210 578,275 600,275 568,340 635,265 614,265 642,210" fill="rgba(255,255,255,0.15)"/>

</svg>
