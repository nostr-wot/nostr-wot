<svg width="800" height="450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg)"/>

  <!-- Profile widget mock -->
  <g transform="translate(80, 100)">
    <rect width="240" height="170" rx="14" fill="url(#card)" stroke="#a78bfa" stroke-width="2"/>
    <circle cx="48" cy="48" r="28" fill="url(#accent)"/>
    <rect x="86" y="32" width="120" height="11" rx="3" fill="#e2e8f0"/>
    <rect x="86" y="50" width="90" height="8" rx="3" fill="#94a3b8"/>
    <rect x="24" y="92" width="192" height="8" rx="3" fill="#475569"/>
    <rect x="24" y="108" width="150" height="8" rx="3" fill="#475569"/>
    <rect x="24" y="134" width="80" height="22" rx="11" fill="url(#accent)"/>
    <text x="64" y="150" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="white" text-anchor="middle">Follow</text>
  </g>

  <!-- Feed widget mock -->
  <g transform="translate(480, 100)">
    <rect width="240" height="170" rx="14" fill="url(#card)" stroke="#a78bfa" stroke-width="2"/>
    <rect x="16" y="16" width="208" height="36" rx="6" fill="#1e293b"/>
    <circle cx="34" cy="34" r="10" fill="url(#accent)"/>
    <rect x="52" y="26" width="80" height="7" rx="2" fill="#e2e8f0"/>
    <rect x="52" y="38" width="150" height="6" rx="2" fill="#64748b"/>
    <rect x="16" y="62" width="208" height="36" rx="6" fill="#1e293b"/>
    <circle cx="34" cy="80" r="10" fill="url(#accent)"/>
    <rect x="52" y="72" width="100" height="7" rx="2" fill="#e2e8f0"/>
    <rect x="52" y="84" width="130" height="6" rx="2" fill="#64748b"/>
    <rect x="16" y="108" width="208" height="36" rx="6" fill="#1e293b"/>
    <circle cx="34" cy="126" r="10" fill="url(#accent)"/>
    <rect x="52" y="118" width="60" height="7" rx="2" fill="#e2e8f0"/>
    <rect x="52" y="130" width="170" height="6" rx="2" fill="#64748b"/>
  </g>

  <text x="400" y="340" font-family="system-ui, sans-serif" font-size="38" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-1">Nostr Widgets</text>
  <text x="400" y="380" font-family="system-ui, sans-serif" font-size="16" fill="#a78bfa" text-anchor="middle">Embed Nostr in any website with one line of HTML</text>
</svg>
