<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg)"/>

  <!-- Decorative grid -->
  <g opacity="0.08" stroke="#a78bfa" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Profile widget mock -->
  <g transform="translate(120, 180)">
    <rect width="320" height="220" rx="18" fill="url(#card)" stroke="#a78bfa" stroke-width="2"/>
    <circle cx="64" cy="64" r="36" fill="url(#accent)"/>
    <rect x="116" y="42" width="160" height="14" rx="4" fill="#e2e8f0"/>
    <rect x="116" y="64" width="120" height="10" rx="3" fill="#94a3b8"/>
    <rect x="32" y="120" width="256" height="10" rx="3" fill="#475569"/>
    <rect x="32" y="140" width="200" height="10" rx="3" fill="#475569"/>
    <rect x="32" y="172" width="100" height="28" rx="14" fill="url(#accent)"/>
    <text x="82" y="190" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">Follow</text>
  </g>

  <!-- Follow button widget mock -->
  <g transform="translate(490, 270)">
    <rect width="220" height="44" rx="22" fill="url(#accent)"/>
    <text x="110" y="29" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="white" text-anchor="middle">⚡ Follow on Nostr</text>
  </g>

  <!-- Feed widget mock -->
  <g transform="translate(760, 180)">
    <rect width="320" height="220" rx="18" fill="url(#card)" stroke="#a78bfa" stroke-width="2"/>
    <rect x="20" y="20" width="280" height="50" rx="8" fill="#1e293b"/>
    <circle cx="44" cy="45" r="14" fill="url(#accent)"/>
    <rect x="68" y="34" width="100" height="9" rx="3" fill="#e2e8f0"/>
    <rect x="68" y="50" width="200" height="7" rx="2" fill="#64748b"/>
    <rect x="20" y="84" width="280" height="50" rx="8" fill="#1e293b"/>
    <circle cx="44" cy="109" r="14" fill="url(#accent)"/>
    <rect x="68" y="98" width="120" height="9" rx="3" fill="#e2e8f0"/>
    <rect x="68" y="114" width="180" height="7" rx="2" fill="#64748b"/>
    <rect x="20" y="148" width="280" height="50" rx="8" fill="#1e293b"/>
    <circle cx="44" cy="173" r="14" fill="url(#accent)"/>
    <rect x="68" y="162" width="80" height="9" rx="3" fill="#e2e8f0"/>
    <rect x="68" y="178" width="220" height="7" rx="2" fill="#64748b"/>
  </g>

  <!-- Title -->
  <text x="600" y="500" font-family="system-ui, sans-serif" font-size="56" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-1">Nostr Widgets</text>
  <text x="600" y="550" font-family="system-ui, sans-serif" font-size="22" fill="#a78bfa" text-anchor="middle" letter-spacing="0.5">Embed Nostr in any website with one line of HTML</text>
</svg>
