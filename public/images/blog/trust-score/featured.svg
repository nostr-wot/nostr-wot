<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4c1d95;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0" />
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#8b5cf6" flood-opacity="0.5"/>
    </filter>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Subtle grid -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(139,92,246,0.05)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Trust distance rings -->
  <circle cx="600" cy="300" r="80" fill="none" stroke="rgba(74,222,128,0.15)" stroke-width="1" stroke-dasharray="6,4"/>
  <circle cx="600" cy="300" r="160" fill="none" stroke="rgba(250,204,21,0.12)" stroke-width="1" stroke-dasharray="6,4"/>
  <circle cx="600" cy="300" r="240" fill="none" stroke="rgba(248,113,113,0.08)" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Connection lines -->
  <line x1="600" y1="300" x2="680" y2="240" stroke="rgba(74,222,128,0.6)" stroke-width="2"/>
  <line x1="600" y1="300" x2="520" y2="230" stroke="rgba(74,222,128,0.6)" stroke-width="2"/>
  <line x1="600" y1="300" x2="540" y2="370" stroke="rgba(74,222,128,0.6)" stroke-width="2"/>
  <line x1="600" y1="300" x2="680" y2="360" stroke="rgba(74,222,128,0.6)" stroke-width="2"/>

  <line x1="680" y1="240" x2="780" y2="200" stroke="rgba(250,204,21,0.4)" stroke-width="1.5"/>
  <line x1="680" y1="240" x2="760" y2="300" stroke="rgba(250,204,21,0.4)" stroke-width="1.5"/>
  <line x1="520" y1="230" x2="420" y2="180" stroke="rgba(250,204,21,0.4)" stroke-width="1.5"/>
  <line x1="540" y1="370" x2="440" y2="400" stroke="rgba(250,204,21,0.4)" stroke-width="1.5"/>
  <line x1="680" y1="360" x2="780" y2="400" stroke="rgba(250,204,21,0.4)" stroke-width="1.5"/>

  <line x1="780" y1="200" x2="870" y2="160" stroke="rgba(248,113,113,0.3)" stroke-width="1"/>
  <line x1="420" y1="180" x2="340" y2="140" stroke="rgba(248,113,113,0.3)" stroke-width="1"/>
  <line x1="440" y1="400" x2="350" y2="440" stroke="rgba(248,113,113,0.3)" stroke-width="1"/>
  <line x1="780" y1="400" x2="870" y2="440" stroke="rgba(248,113,113,0.3)" stroke-width="1"/>

  <!-- Hop 3 nodes -->
  <circle cx="870" cy="160" r="8" fill="rgba(248,113,113,0.5)" filter="url(#glow-filter)"/>
  <text x="870" y="145" text-anchor="middle" fill="rgba(248,113,113,0.7)" font-family="monospace" font-size="11" font-weight="bold">0.25</text>
  <circle cx="340" cy="140" r="8" fill="rgba(248,113,113,0.5)" filter="url(#glow-filter)"/>
  <text x="340" y="125" text-anchor="middle" fill="rgba(248,113,113,0.7)" font-family="monospace" font-size="11" font-weight="bold">0.20</text>
  <circle cx="350" cy="440" r="8" fill="rgba(248,113,113,0.5)" filter="url(#glow-filter)"/>
  <text x="350" y="462" text-anchor="middle" fill="rgba(248,113,113,0.7)" font-family="monospace" font-size="11" font-weight="bold">0.30</text>
  <circle cx="870" cy="440" r="8" fill="rgba(248,113,113,0.5)" filter="url(#glow-filter)"/>
  <text x="870" y="462" text-anchor="middle" fill="rgba(248,113,113,0.7)" font-family="monospace" font-size="11" font-weight="bold">0.22</text>

  <!-- Hop 2 nodes -->
  <circle cx="780" cy="200" r="11" fill="rgba(250,204,21,0.7)" filter="url(#glow-filter)"/>
  <text x="780" y="183" text-anchor="middle" fill="rgba(250,204,21,0.9)" font-family="monospace" font-size="12" font-weight="bold">0.50</text>
  <circle cx="760" cy="300" r="11" fill="rgba(250,204,21,0.7)" filter="url(#glow-filter)"/>
  <text x="785" y="305" text-anchor="start" fill="rgba(250,204,21,0.9)" font-family="monospace" font-size="12" font-weight="bold">0.45</text>
  <circle cx="420" cy="180" r="11" fill="rgba(250,204,21,0.7)" filter="url(#glow-filter)"/>
  <text x="420" y="163" text-anchor="middle" fill="rgba(250,204,21,0.9)" font-family="monospace" font-size="12" font-weight="bold">0.55</text>
  <circle cx="440" cy="400" r="11" fill="rgba(250,204,21,0.7)" filter="url(#glow-filter)"/>
  <text x="440" y="423" text-anchor="middle" fill="rgba(250,204,21,0.9)" font-family="monospace" font-size="12" font-weight="bold">0.48</text>
  <circle cx="780" cy="400" r="11" fill="rgba(250,204,21,0.7)" filter="url(#glow-filter)"/>
  <text x="780" y="423" text-anchor="middle" fill="rgba(250,204,21,0.9)" font-family="monospace" font-size="12" font-weight="bold">0.42</text>

  <!-- Hop 1 nodes -->
  <circle cx="680" cy="240" r="14" fill="rgba(74,222,128,0.8)" filter="url(#glow-filter)"/>
  <text x="680" y="218" text-anchor="middle" fill="rgba(74,222,128,1)" font-family="monospace" font-size="13" font-weight="bold">0.85</text>
  <circle cx="520" cy="230" r="14" fill="rgba(74,222,128,0.8)" filter="url(#glow-filter)"/>
  <text x="520" y="208" text-anchor="middle" fill="rgba(74,222,128,1)" font-family="monospace" font-size="13" font-weight="bold">0.90</text>
  <circle cx="540" cy="370" r="14" fill="rgba(74,222,128,0.8)" filter="url(#glow-filter)"/>
  <text x="540" y="395" text-anchor="middle" fill="rgba(74,222,128,1)" font-family="monospace" font-size="13" font-weight="bold">0.80</text>
  <circle cx="680" cy="360" r="14" fill="rgba(74,222,128,0.8)" filter="url(#glow-filter)"/>
  <text x="680" y="385" text-anchor="middle" fill="rgba(74,222,128,1)" font-family="monospace" font-size="13" font-weight="bold">0.88</text>

  <!-- Center node (You) -->
  <circle cx="600" cy="300" r="24" fill="rgba(139,92,246,0.3)" filter="url(#shadow)"/>
  <circle cx="600" cy="300" r="18" fill="#8b5cf6"/>
  <text x="600" y="305" text-anchor="middle" fill="white" font-family="sans-serif" font-size="11" font-weight="bold">YOU</text>
  <text x="600" y="272" text-anchor="middle" fill="white" font-family="monospace" font-size="13" font-weight="bold">1.00</text>

  <!-- Legend -->
  <rect x="50" y="510" width="300" height="90" rx="12" fill="rgba(0,0,0,0.3)"/>
  <circle cx="80" cy="535" r="6" fill="rgba(74,222,128,0.9)"/>
  <text x="95" y="539" fill="rgba(255,255,255,0.8)" font-family="sans-serif" font-size="12">Hop 1 — Score 0.80-1.00</text>
  <circle cx="80" cy="558" r="6" fill="rgba(250,204,21,0.8)"/>
  <text x="95" y="562" fill="rgba(255,255,255,0.8)" font-family="sans-serif" font-size="12">Hop 2 — Score 0.40-0.60</text>
  <circle cx="80" cy="581" r="6" fill="rgba(248,113,113,0.6)"/>
  <text x="95" y="585" fill="rgba(255,255,255,0.8)" font-family="sans-serif" font-size="12">Hop 3 — Score 0.15-0.30</text>

  <!-- Title -->
  <text x="600" y="560" text-anchor="middle" fill="white" font-family="sans-serif" font-size="32" font-weight="bold" filter="url(#shadow)">Nostr Trust Score Explained</text>
  <text x="600" y="590" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-family="sans-serif" font-size="16">How trust is calculated in the Web of Trust</text>
</svg>